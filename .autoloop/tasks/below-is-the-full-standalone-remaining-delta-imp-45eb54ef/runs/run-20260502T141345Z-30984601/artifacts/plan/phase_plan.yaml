phases:
  - phase_id: "migrate-exported-workflow-contracts"
    title: "Migrate Exported Workflow Packages"
    objective: "Convert the 16 exported workflow packages to ctx-only hooks and python_step handlers while preserving workflow behavior, routes, prompts, and artifact outputs."
    status: "planned"
    in_scope:
      - "Update lifecycle hooks in the listed workflows/*/workflow.py files to use hook(ctx) only."
      - "Remove hook state-replacement returns and move state updates onto ctx.state."
      - "Convert exported python_step handlers from (state, ctx) to (ctx) and keep only supported control returns."
    out_of_scope:
      - "Changes to autoloop core runtime/compiler compatibility rules."
      - "Non-exported workflows or unrelated documentation rewrites."
    dependencies: []
    acceptance_criteria:
      - id: "AC-1"
        text: "Each affected exported workflow compiles individually under compile_workflow(...) without hook-arity or python-step signature errors."
      - id: "AC-2"
        text: "No affected exported workflow file still defines multi-argument lifecycle hooks or python_step(state, ctx) handlers."
      - id: "AC-3"
        text: "Hooks in the affected exported workflows no longer return replacement state models and instead update ctx.state directly."
    deliverables:
      - "Migrated workflow.py files for the 16 affected exported packages."
      - "Ctx-based hook and python-step implementations that preserve existing artifact and route behavior."
    risks:
      - "Field reset parity can regress when returned state models are converted into ctx.state mutation."
      - "Outcome-derived fields can drift if hook bodies do not fully remap legacy outcome arguments onto ctx.outcome."
    rollback:
      - "Revert the touched workflow.py files for the affected exported packages."
      - "Keep runtime/compiler contract enforcement unchanged."
  - phase_id: "migrate-runtime-test-surfaces"
    title: "Migrate Runtime Test Surfaces"
    objective: "Update workflow-specific tests so they exercise the final ctx-only package surface instead of legacy WorkflowClass.on_* helper forms."
    status: "planned"
    in_scope:
      - "Replace direct WorkflowClass.on_* calls in affected runtime suites with declaration-local or compiled behavior-surface invocation."
      - "Update assertions that currently expect returned replacement state models or tuple-based helper results."
      - "Cover bootstrap, capture-context, route-skipping, publish, and after-verifier behaviors through the migrated invocation pattern without making compiled wrappers the only contract gate."
    out_of_scope:
      - "Adding new runtime compatibility helpers just to preserve old test call sites."
      - "Broad refactors of unaffected runtime test suites."
    dependencies:
      - "migrate-exported-workflow-contracts"
    acceptance_criteria:
      - id: "AC-1"
        text: "Affected runtime suites no longer treat WorkflowClass.on_* helper entry points as supported API."
      - id: "AC-2"
        text: "Direct behavior tests assert against ctx.state plus normalized handler returns after invoking declaration-local or compiled callables chosen for behavior coverage rather than legacy helper compatibility."
      - id: "AC-3"
        text: "Representative direct-call coverage remains in place for migrated package behaviors, especially the workflow_run_traces_to_optimization_candidates suite."
    deliverables:
      - "Updated runtime tests for affected workflow packages."
      - "Ctx-based direct invocation coverage for bootstrap, publish, route, and hook behaviors."
    risks:
      - "Test churn is wide because many suites currently call package-local handler helpers directly."
      - "Using inconsistent replacement patterns across suites could hide regressions in state mutation semantics."
    rollback:
      - "Revert only the touched test modules if the new direct invocation pattern proves incorrect."
      - "Do not restore legacy package-local helper compatibility surfaces."
  - phase_id: "enforce-repo-compatibility-gate"
    title: "Enforce Repo Compatibility Gate"
    objective: "Make the discovered exported workflow compile sweep and related strictness tests the regression gate for the final public contract."
    status: "planned"
    in_scope:
      - "Require zero failures in the discovered exported workflow compile sweep."
      - "Adjust parity or strictness tests so discovered exported workflows are audited at the raw declaration/source level for one-argument python-step handlers and one-argument hooks."
      - "Scan exported workflow.py files for banned hook state-return patterns such as return ctx.state, return ctx.state.model_copy(...), and return state.model_copy(...)."
      - "Validate the migrated package set with parity and package runtime suites under the repo virtualenv."
    out_of_scope:
      - "New workflow authoring features beyond this contract migration."
      - "Changes to unrelated package discovery behavior."
    dependencies:
      - "migrate-runtime-test-surfaces"
    acceptance_criteria:
      - id: "AC-1"
        text: "tests/runtime/test_workflow_integration_parity.py asserts zero compile failures for discovered exported workflow packages."
      - id: "AC-2"
        text: "Fast strictness/public-surface coverage inspects discovered exported workflows and fails if raw python-step declarations or hooks use removed multi-argument forms."
      - id: "AC-3"
        text: "Targeted validation under .venv covers the parity sweep, the raw exported-workflow contract audit, and the affected workflow runtime suites, including banned hook state-return snippets."
    deliverables:
      - "Repo-level regression coverage for discovered exported workflow package compatibility."
      - "A validation command set that exercises parity, raw exported-workflow contract audits, and affected workflow runtime suites."
    risks:
      - "The compile sweep can reveal additional package defects only after the first contract errors are removed."
      - "Parity coverage may pass while raw declaration signatures or banned hook return forms regress unless the raw contract audit runs alongside behavior tests."
    rollback:
      - "Revert only the touched test expectations or compile-sweep assertions if they prove inconsistent with the enforced contract."
      - "Do not weaken the runtime contract to restore legacy exported package forms."
