phases:
- phase_id: public-surface-cleanup
  title: Public Surface Cleanup
  objective: Remove deprecated public authoring/compiler surfaces and make the final
    route and artifact vocabulary authoritative.
  status: planned
  in_scope:
  - Remove public `on_route` and internal `on_route_hook` from declarations, compiled
    metadata, execution, topology, and capability/debug payloads.
  - Remove public aliases and markers for `outputs`, `review_outputs`, `produces`,
    auto-installed `on_<step>` handlers, and dunder-based simple declaration discovery.
  - Restrict the public compiler path to step-local routes and explicit declarations
    only.
  out_of_scope:
  - Deleting or rejecting route effects before helper parity exists.
  - Changing strict/internal authoring beyond what is required to isolate it from
    the public path.
  - Adding compatibility shims or fallback lowering for removed public APIs.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: Public declarations reject `on_route`, and compiled steps no longer expose
      `on_route_hook`.
  - id: AC-2
    text: Capability, topology, and static-graph payloads emit only `writes`, `producer_writes`,
      and `verifier_writes`.
  deliverables:
  - Compiler/discovery cleanup for the final public authoring surface.
  - Fail-fast validation coverage for removed declarations and aliases.
  risks:
  - Discovery and capability payload changes can break tests and docs that still assume
    hybrid public/internal surfaces.
  rollback:
  - Revert declaration/compiler surface removals as one slice if downstream runtime
    work is not ready.
- phase_id: hook-control-unification
  title: Hook And Control Unification
  objective: Make all public hooks `hook(ctx)`, unify hook and python-step control
    returns, and refactor finalization around explicit control data.
  status: planned
  in_scope:
  - Introduce a normalized hook result model for hook phases, route `on_taken`, and
    python-step handler returns.
  - Allow `before`, `before_producer`, and `before_verifier` to short-circuit with
    route tags or direct runtime controls.
  - Remove `AfterStepResult`, hook state replacement returns, and multi-arity hook
    invocation.
  - Move hook/finalization logic into `HookRunner`, `RouteFinalizer`, and `StepDispatcher`
    as real owners.
  out_of_scope:
  - Keeping positional hook compatibility.
  - Returning replacement state models from hooks or python steps.
  dependencies:
  - public-surface-cleanup
  acceptance_criteria:
  - id: AC-1
    text: All public hook slots validate exactly one positional `ctx` argument and
      reject old arities.
  - id: AC-2
    text: Before hooks and pair lifecycle hooks can finalize a route or direct control
      without invoking provider execution.
  - id: AC-3
    text: Python-step handlers accept only `None`, route tags, `Event`, `RequestInput`,
      `Goto`, or `Fail`.
  deliverables:
  - Unified hook/python-step control normalization.
  - Explicit finalization data structures replacing tuple or flag-heavy control flow.
  risks:
  - Route finalization and retry attribution can regress if old and new control paths
    coexist too long.
  rollback:
  - Revert hook normalization and collaborator ownership changes together if provider
    or checkpoint semantics diverge.
- phase_id: scoped-state-worklists
  title: Scoped State And Worklists
  objective: Guarantee scoped step and item runtime state, add worklist helpers, and
    then remove route effects after helper parity.
  status: planned
  in_scope:
  - Always expose built-in `ctx.step_item_state` for scoped steps while keeping runtime-owned
    fields read-only.
  - Introduce a built-in runtime-owned `ctx.item_state` model for active scoped items
    with `status`, `last_step`, and `last_route`, while keeping optional custom declared
    item-state fields mutable.
  - Add `ctx.worklist(name)`, `ctx.worklists`, `ctx.current_worklist`, and `WorklistRuntimeView`
    helper methods.
  - Checkpoint and trace helper-driven selection/status mutations, migrate route-effect
    behaviors to helpers plus `on_taken`, and delete route-effect declarations and
    engine execution only after parity tests pass.
  out_of_scope:
  - Implicit helper-driven routing on exhaustion or status changes.
  dependencies:
  - hook-control-unification
  acceptance_criteria:
  - id: AC-1
    text: Scoped steps expose `ctx.step_item_state` even without custom declared step-item
      state.
  - id: AC-2
    text: Active scoped items expose built-in `ctx.item_state` fields `status`, `last_step`,
      and `last_route`; built-in fields are read-only and optional custom item-state
      fields remain mutable.
  - id: AC-3
    text: Worklist helper methods mutate selection/status, emit runtime events, and
      checkpoint current runtime state without auto-routing.
  - id: AC-4
    text: Route effects are fully removed only after equivalent workflows run through
      `on_taken` hooks plus worklist helpers.
  deliverables:
  - Public worklist runtime API.
  - Scoped state/runtime updates aligned with helper tracing and checkpointing.
  risks:
  - Selection persistence and mutable source persistence can drift if helper semantics
    are not wired through a single runtime path.
  rollback:
  - Revert helper API introduction and route-effect deletion together if checkpoint
    or selection restoration becomes inconsistent.
- phase_id: failure-trace-optimizer-alignment
  title: Failure, Trace, And Optimizer Alignment
  objective: Finish typed failure handling and align trace/history/optimizer semantics
    with hook-originated control flow and no-provider attempts.
  status: planned
  in_scope:
  - Replace dynamic exception metadata mutation and `getattr` readers with typed failure
    data carriers.
  - Persist current mutated runtime data on all failure paths.
  - Trace provider, producer, and verifier attempt booleans plus candidate/final route,
    runtime control, target step, pending input id, and source attribution.
  - Update history derivation and optimizer normalization for direct controls and
    final status vocabulary.
  out_of_scope:
  - Changing external terminal names away from `FINISH`, `AWAIT_INPUT`, and `FAIL`.
  - Treating every direct control as a provider failure in telemetry.
  dependencies:
  - scoped-state-worklists
  acceptance_criteria:
  - id: AC-1
    text: Engine, operation recording, and checkpoint paths no longer depend on `getattr(exc,
      ...)` metadata recovery.
  - id: AC-2
    text: Trace and history distinguish provider-selected routes, hook-selected routes,
      and hook-selected direct controls.
  - id: AC-3
    text: Optimizer normalization understands `AWAIT_INPUT` terminal vs `question`
      route tag vs `awaiting_input` status.
  deliverables:
  - Typed failure model wired through execution, checkpointing, tracing, and history.
  - Updated optimizer/runtime consumers for the final control vocabulary.
  risks:
  - Telemetry and optimizer consumers can silently misclassify runs if trace fields
    change without same-turn parser updates.
  rollback:
  - Revert trace/history/optimizer schema changes as one slice if derived telemetry
    diverges from runtime behavior.
- phase_id: docs-and-tests
  title: Docs And Tests
  objective: Migrate documentation and test coverage to the final hook, worklist,
    and failure model.
  status: planned
  in_scope:
  - Update authoring docs and workflow examples to show only final hook style, direct
    controls, and worklist helpers.
  - Replace removed-surface tests with fail-fast coverage and helper-based equivalents.
  - Run the contract, unit, runtime, static-graph, history, and optimizer suites covering
    the touched behavior.
  out_of_scope:
  - Documenting legacy authoring forms kept only for historical reference.
  - Leaving stale removed-surface examples in active docs.
  dependencies:
  - failure-trace-optimizer-alignment
  acceptance_criteria:
  - id: AC-1
    text: Active docs no longer describe positional hooks, `AfterStepResult`, `on_route`,
      route effects, or old artifact vocabulary.
  - id: AC-2
    text: The touched test suites cover hook short-circuiting, worklist helpers, structured
      failures, direct controls, and removed-surface validation.
  deliverables:
  - Updated docs/examples for the final public authoring model.
  - Test coverage proving the intentional public breaks and new runtime semantics.
  risks:
  - Docs and examples can lag the implementation and reintroduce removed public surfaces
    through copy/paste drift.
  rollback:
  - Revert doc/example migrations only with the matching implementation rollback;
    do not leave mixed contracts published.
