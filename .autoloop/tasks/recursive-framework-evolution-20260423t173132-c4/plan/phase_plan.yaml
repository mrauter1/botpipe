phases:
- phase_id: workflow-catalog-seam
  title: Workflow Catalog Seam
  objective: Add a reusable pure workflow-catalog discovery seam and an additive authoring
    helper that can publish a workflow-local portfolio snapshot without changing the
    public CLI or manifest schema.
  status: planned
  in_scope:
  - Factor or add shared workflow catalog discovery for workflow package metadata
    and linked docs/code paths.
  - Expose an additive authoring helper that writes a workflow-local portfolio snapshot
    artifact for portfolio-routing workflows.
  - Update authoring guidance and unit coverage for the new helper boundary.
  out_of_scope:
  - Automatic runtime workflow routing or implicit child execution.
  - Adding new workflow.toml fields.
  - Recursive wrapper/template cleanup in recursive_autoloop.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: Implementation provides one shared reusable discovery seam for workflow
      portfolio metadata rather than duplicating ad hoc repo scraping inside the new
      workflow package.
  - id: AC-2
    text: An additive helper can publish a workflow-local portfolio snapshot artifact
      without importing runtime-owned routing behavior into workflow packages.
  - id: AC-3
    text: Docs and unit tests make the new helper boundary explicit and preserve the
      current metadata-only manifest doctrine.
  deliverables:
  - Shared workflow catalog discovery module or equivalent refactor.
  - Workflow-local portfolio snapshot helper and exports.
  - Updated authoring documentation and helper-focused test coverage.
  risks:
  - Discovery refactors can regress workflow listing or package resolution if shared
    logic diverges from runtime expectations.
  - Helper design can accidentally widen stdlib/runtime coupling unless the seam stays
    pure and additive.
  rollback:
  - Revert the shared catalog seam and restore existing loader-local discovery logic.
  - Remove the new helper and documentation updates if they cannot remain additive.
- phase_id: task-to-workflow-strategy-package
  title: Task To Workflow Strategy Package
  objective: Implement the new front-door workflow package that turns an arbitrary
    task into an explicit strategy package choosing run-existing, compose, adapt,
    or create-new.
  status: planned
  in_scope:
  - Add the task_to_workflow_strategy workflow package, params model, contracts, prompts,
    assets, and package docs.
  - Use the catalog/snapshot seam in a deterministic portfolio-capture step.
  - Publish a stable terminal strategy package, machine-readable summary, and next-action
    artifact.
  - Add runtime tests covering discovery, compilation, legal routes, and end-to-end
    strategy publication.
  out_of_scope:
  - Automatically executing the selected downstream workflow.
  - Migrating existing domain workflows behind the new front door.
  - Adding new reserved routes or widening runtime-injected control metadata.
  dependencies:
  - workflow-catalog-seam
  acceptance_criteria:
  - id: AC-1
    text: The workflow explicitly compares at least three candidates, includes the
      builder baseline, and chooses task_to_workflow_strategy with a recorded rationale.
  - id: AC-2
    text: The workflow definition, prompt templates, route contracts, and artifact
      contract make the selected strategy route and next-action package explicit and
      inspectable.
  - id: AC-3
    text: Runtime proof covers successful publication of strategy artifacts and keeps
      the workflow end state at strategy packaging rather than hidden downstream execution.
  deliverables:
  - workflows/task_to_workflow_strategy/ package with prompts, assets, contracts,
    params, and workflow definition.
  - docs/workflows/task_to_workflow_strategy.md.
  - tests/runtime/test_task_to_workflow_strategy.py.
  risks:
  - The workflow may drift into a narrow discovery-only building block or an over-automated
    router unless the terminal outcome stays explicit.
  - Route-specific outputs may become hard to validate unless terminal artifacts are
    normalized.
  rollback:
  - Remove the new workflow package, docs, and tests as one unit if the package does
    not reach a clear terminal strategy contract.
  - Keep existing workflows untouched if the front-door workflow cannot ship cleanly.
- phase_id: closeout-memory-and-regression-proof
  title: Closeout Memory And Regression Proof
  objective: Update recursive memory and baseline-doc tests for the new cycle-4 baseline,
    then run targeted regression validation across the new and existing workflow portfolio.
  status: planned
  in_scope:
  - Update all four standing recursive memory files with cycle-4 outcomes and deferred
    follow-ons.
  - Extend architecture-baseline documentation tests to protect the new cycle-4 memory
    baseline.
  - Run targeted regression tests spanning the shared seam, the new strategy workflow,
    and the previously shipped builder/building-block workflows.
  out_of_scope:
  - Unrelated recursive_autoloop wrapper/template fixes.
  - Retrofitting existing workflows to depend on task_to_workflow_strategy immediately.
  - Manifest-schema changes or CLI migrations.
  dependencies:
  - workflow-catalog-seam
  - task-to-workflow-strategy-package
  acceptance_criteria:
  - id: AC-1
    text: Recursive memory records that the builder remained credible, task_to_workflow_strategy
      shipped as the chosen addition, and the catalog/snapshot seam shipped as the
      paired framework improvement.
  - id: AC-2
    text: Baseline-doc tests protect the updated cycle-4 recursive memory state.
  - id: AC-3
    text: Targeted pytest coverage passes across the helper seam, the new workflow,
      and the previously shipped builder/evidence/security portfolio surfaces.
  deliverables:
  - Updated .autoloop_recursive memory files.
  - Updated tests/test_architecture_baseline_docs.py.
  - Targeted pytest proof for cycle-4 closeout.
  risks:
  - Recursive memory drift can mislead later cycles if cycle-4 outcomes are not recorded
    precisely.
  - Discovery refactors can surface regressions in older workflow tests late unless
    the closeout suite includes them.
  rollback:
  - Revert cycle-4 recursive memory updates if the shipped implementation direction
    changes before merge.
  - Treat any failing regression gate as blocking closeout until the seam or workflow
    package is corrected.
