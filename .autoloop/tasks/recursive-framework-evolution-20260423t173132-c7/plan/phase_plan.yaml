phases:
- phase_id: evaluation-helper-seam
  title: Evaluation Helper Seam
  objective: Add a narrow authoring-only helper for validating and canonicalizing
    workflow-local evaluation case manifests against one selected workflow.
  status: planned
  in_scope:
  - Add `stdlib/evaluation.py` with workflow-local eval-case manifest validation.
  - Export the new helper from `stdlib/__init__.py`.
  - Document the helper boundary in `docs/authoring.md`.
  - Extend unit coverage in `tests/unit/test_stdlib_and_extensions.py`.
  out_of_scope:
  - CLI changes.
  - Runtime-owned evaluation execution.
  - New `workflow.toml` semantics.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: The helper writes only under `ctx.workflow_folder` and does not introduce
      runtime-owned routing or execution behavior.
  - id: AC-2
    text: Eval-case validation reuses the shared selected-workflow capability and
      workflow-parameter coercion paths instead of duplicating loader logic.
  - id: AC-3
    text: Authoring docs and unit tests freeze the helper boundary and its non-goals.
  deliverables:
  - '`stdlib/evaluation.py`'
  - '`stdlib/__init__.py`'
  - '`docs/authoring.md`'
  - '`tests/unit/test_stdlib_and_extensions.py`'
  risks:
  - The helper seam may become too broad and start owning policy that should remain
    visible in workflow code.
  - Validation may drift from the selected workflow's real artifact or parameter surface
    if it does not delegate to the shared inspection path.
  rollback:
  - Revert the new stdlib helper, export, doc section, and helper-specific unit tests
    together.
- phase_id: workflow-to-eval-suite-package
  title: Workflow To Eval Suite
  objective: Ship `workflow_to_eval_suite` as a reusable workflow building block that
    publishes a validated evaluation-suite package for one selected workflow.
  status: planned
  in_scope:
  - Add the workflow package under `workflows/workflow_to_eval_suite/`.
  - Implement params, contracts, explicit per-step prompt templates, checklist asset,
    workflow logic, and publish-time validation.
  - Add the workflow decision/contract doc under `docs/workflows/workflow_to_eval_suite.md`.
  - Add runtime proof in `tests/runtime/test_workflow_to_eval_suite.py`.
  out_of_scope:
  - Auto-running the selected workflow.
  - Refinement workflow execution.
  - Portfolio front-door behavior changes.
  dependencies:
  - evaluation-helper-seam
  acceptance_criteria:
  - id: AC-1
    text: Workflow discovery and compilation succeed from the repo root and expose
      explicit typed control contracts on the pair steps.
  - id: AC-2
    text: A scripted runtime proof publishes the eval suite, summary, next action,
      validated eval-case manifest, and receipt without executing the selected workflow.
  - id: AC-3
    text: Publish-time validation rejects malformed case kinds, duplicate case ids,
      invalid per-case workflow parameters, unknown expected artifacts, and summary
      drift.
  - id: AC-4
    text: Each producer/verifier prompt makes required reads, required writes, legal
      routes, evidence expectations, and forbidden actions explicit for its step-local
      work item.
  deliverables:
  - '`workflows/workflow_to_eval_suite/`'
  - '`docs/workflows/workflow_to_eval_suite.md`'
  - '`tests/runtime/test_workflow_to_eval_suite.py`'
  risks:
  - Artifact sprawl may blur the work-item boundary if framing, design, and packaging
    responsibilities are not kept separate.
  - The publish step may become too bespoke unless it stays focused on deterministic
    validation and receipt writing.
  rollback:
  - Remove the new workflow package, workflow doc, and runtime test together if terminal
    publication proof does not hold.
- phase_id: cycle-seven-closeout
  title: Cycle Seven Closeout
  objective: Update recursive memory and regression-proof docs/tests so cycle 7 becomes
    the new explicit baseline for future recursive framework work.
  status: planned
  in_scope:
  - Update `.autoloop_recursive/framework_evolution_charter.md`.
  - Update `.autoloop_recursive/framework_roadmap.md`.
  - Update `.autoloop_recursive/framework_gap_ledger.md`.
  - Update `.autoloop_recursive/workflow_candidate_ledger.md`.
  - Update `tests/test_architecture_baseline_docs.py` and any cycle-closeout expectations
    affected by the new baseline.
  - Run targeted pytest proof for the helper seam, new workflow, and baseline portfolio
    surfaces.
  out_of_scope:
  - '`recursive_autoloop/` wrapper/template cleanup.'
  - Runtime-owned refinement automation.
  - Compatibility shims for the stale `src/autoloop/...` request paths.
  dependencies:
  - evaluation-helper-seam
  - workflow-to-eval-suite-package
  acceptance_criteria:
  - id: AC-1
    text: The four standing recursive-memory files record that the builder stayed
      credible, `workflow_to_eval_suite` shipped, and the evaluation helper seam is
      the chosen framework improvement.
  - id: AC-2
    text: Architecture-baseline docs/tests and any closeout-proof assertions describe
      cycle 7 accurately.
  - id: AC-3
    text: Targeted pytest proof passes without widening runtime/provider control surfaces
      or changing public CLI/runtime contracts.
  deliverables:
  - Updated `.autoloop_recursive/*.md` standing memory files
  - '`tests/test_architecture_baseline_docs.py`'
  - Recorded targeted validation command/result in cycle-7 closeout docs
  risks:
  - Recursive memory or baseline tests may drift from the actual shipped behavior
    if updated separately from code and proof.
  - Portfolio/baseline tests that assert exact workflow lists or deferred ideas may
    need additive updates for the new workflow.
  rollback:
  - Revert cycle-7 memory and baseline-test updates if they claim behavior the implementation
    or proof does not actually ship.
