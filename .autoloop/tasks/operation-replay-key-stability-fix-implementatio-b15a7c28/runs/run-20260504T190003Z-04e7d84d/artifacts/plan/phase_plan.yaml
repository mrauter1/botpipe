phases:
- phase_id: align-operation-replay-keying
  title: Align Operation Replay Keying
  objective: Constrain operation replay identity to step, kind, and occurrence while
    preserving callsite-based fingerprint mismatch detection and destructive legacy-store
    migration.
  status: planned
  in_scope:
  - Confirm `OPERATION_REPLAY_SCHEMA` is `autoloop.operation_replay/v2` in `autoloop/core/schema_registry.py`.
  - Ensure `_next_occurrence` and `_operation_replay_key` in `autoloop/core/operations.py`
    exclude `callsite` from their signatures and payloads.
  - Ensure `_run_operation` still computes `callsite_id` and passes it only to `_operation_fingerprint`.
  - Use a named `_migrate_operation_replay_store` that drops legacy records and preserves
    diagnostic attempts.
  - Verify helper usage is limited to `_run_operation` and avoid changes outside the
    two requested files.
  out_of_scope:
  - Adding explicit stable operation identifiers or prompt-only replay addressing.
  - Changing public `llm_call`, `classify_call`, or `execute_step_operation` signatures.
  - Broadening replay semantics beyond the specified key, fingerprint, and migration
    behavior.
  - Introducing a legacy compatibility layer for v1 replay records.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: '`autoloop/core/schema_registry.py` advertises only `autoloop.operation_replay/v2`
      for operation replay payloads.'
  - id: AC-2
    text: '`autoloop/core/operations.py` derives occurrence and replay keys without
      `callsite`, while `_operation_fingerprint` still includes `callsite`.'
  - id: AC-3
    text: Legacy/schemaless replay payloads are migrated by a named function that
      returns an empty `records` map and preserves list-shaped `attempts`.
  - id: AC-4
    text: Repository grep confirms `_next_occurrence` and `_operation_replay_key`
      are only called from `_run_operation`.
  - id: AC-5
    text: Focused replay contract coverage passes, including fingerprint-mismatch
      warn/fail behavior.
  deliverables:
  - Implementation-ready alignment of `autoloop/core/operations.py` to the requested
    replay-key, fingerprint, and migration invariants.
  - Confirmed `autoloop/core/schema_registry.py` replay schema version at `v2`.
  - Validation evidence from grep/inspection and focused operation replay test execution.
  risks:
  - A partial edit could leave `callsite` in the counter or replay key and silently
    preserve the old cache-miss behavior.
  - Removing `callsite` from the fingerprint would hide branch-order mismatches and
    permit wrong-value replays.
  - Preserving legacy records would create incompatible key reuse across schema versions.
  rollback:
  - Revert the `schema_registry.py` and `operations.py` changes together rather than
    partially.
  - Discard any generated v2 `operation_replay.json` artifacts if rollback is needed.
