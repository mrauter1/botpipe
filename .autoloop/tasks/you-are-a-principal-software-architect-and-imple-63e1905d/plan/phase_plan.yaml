phases:
  - phase_id: book-architecture-core
    title: Book-Architecture Core
    objective: Remove compatibility behavior from the workflow core and freeze the target architecture in the required decision record before broader runtime or workflow migration.
    status: planned
    in_scope:
      - Write autoloop_v3/ARCHITECTURE_DECISIONS.md with 3 candidates per material decision.
      - Delete workflow compat machinery and legacy-normalization behavior from compiler, validation, engine, and root workflow exports.
      - Enforce strict handler signatures, explicit entry, and explicit session-opening rules.
    out_of_scope:
      - Autoloop_v1 parity harness relocation.
      - Final runtime/workspace refactor.
    dependencies: []
    acceptance_criteria:
      - id: AC-1
        text: ARCHITECTURE_DECISIONS.md exists and covers all material decisions named in the request with 3 candidates each.
      - id: AC-2
        text: workflow.compat, Verdict, on_verdict, SessionLifecycle, handler arity adaptation, and inferred-entry fallback are removed from the strict core.
      - id: AC-3
        text: Strict unit and engine-contract tests prove missing session bindings fail instead of auto-opening.
    deliverables:
      - autoloop_v3/ARCHITECTURE_DECISIONS.md
      - strict workflow-core code changes
      - updated unit and contract tests for no-compat invariants
    risks:
      - Existing workflows and tests may still rely on removed compatibility behavior.
      - Root workflow imports may still point at legacy classes unless updated explicitly.
    rollback:
      - Revert only strict-core edits from this phase if new strict tests cannot be stabilized.
      - Do not restore compat behavior as a temporary runtime workaround.
  - phase_id: generic-runtime-boundary
    title: Generic Runtime Boundary
    objective: Reduce autoloop_v3.runtime to workflow-agnostic filesystem execution so phase/pair semantics no longer leak into the core harness.
    status: planned
    in_scope:
      - Remove phase-plan, pair/phase CLI, and slot-name-specific session behavior from runtime core modules.
      - Keep only generic request snapshot, checkpoint, session persistence, and prompt-resolution behavior.
      - Add a toy workflow proof that unrelated step names run end to end without runtime knowledge of phases.
    out_of_scope:
      - Final Autoloop_v1 parity logic.
      - Legacy-output matching for decisions and raw logs.
    dependencies:
      - book-architecture-core
    acceptance_criteria:
      - id: AC-1
        text: runtime modules no longer own phases, plan/implement/test naming, or Autoloop-specific config and workspace scaffolding.
      - id: AC-2
        text: Generic runtime/session store behavior is expressed without hardcoded plan_session or phase_session special cases.
      - id: AC-3
        text: A toy workflow with unrelated step names passes through the generic runner and proves runtime agnosticism.
    deliverables:
      - refactored autoloop_v3/runtime modules
      - toy workflow or equivalent test fixture
      - updated generic runtime tests
    risks:
      - Session-path persistence may regress during removal of slot-name-specific logic.
      - Existing prompt lookup may break once legacy roots are removed from the generic runner.
    rollback:
      - Revert runtime-boundary edits as one slice if the generic runner stops supporting request snapshots or checkpoint resume.
      - Preserve strict-core removals from earlier phases.
  - phase_id: workflow-migration-parity
    title: Workflow Migration And Autoloop_v1 Parity
    objective: Finish strict migration of autoloop_v1.py and Ralph_loop.py while moving all remaining Autoloop-specific behavior into workflow-owned helpers or harness code.
    status: planned
    in_scope:
      - Rewrite workflows to import only canonical strict symbols and use explicit prompt paths and session openings.
      - Create workflow-owned Autoloop_v1 helpers for phase-plan parsing, legacy artifact conventions, session path policy, and clarification persistence.
      - Preserve legacy-equivalent Autoloop_v1 run behavior using the new strict engine.
    out_of_scope:
      - Preserving support for malformed legacy workflow authoring.
      - Reintroducing generic runtime compatibility knobs.
    dependencies:
      - generic-runtime-boundary
    acceptance_criteria:
      - id: AC-1
        text: autoloop_v1.py and Ralph_loop.py compile and run without loader injection, on_verdict, SessionLifecycle, or relaxed handlers.
      - id: AC-2
        text: Autoloop_v1 explicit session opening moments and phase-session sharing are proven by tests.
      - id: AC-3
        text: Legacy workspace outputs, clarification behavior, session files, and overall run behavior are matched for Autoloop_v1.
    deliverables:
      - migrated autoloop_v1.py and Ralph_loop.py
      - autoloop_v1-owned helper or harness modules
      - updated parity and workflow-integration tests
    risks:
      - Parity helpers could accidentally become a renamed compat layer if kept generic instead of workflow-owned.
      - Resume/clarification behavior can regress if session note placement changes.
    rollback:
      - Revert workflow-owned parity helper changes if legacy parity tests fail broadly.
      - Keep generic runtime and strict-core reductions intact.
  - phase_id: proof-suite-and-docs
    title: Proof Suite And Final Docs
    objective: Replace stale compatibility documentation and tests with the final strict architecture, migration guidance, and parity proof suite.
    status: planned
    in_scope:
      - Add README, MIGRATION, architecture decisions, and any final authoring/parity notes required by the request.
      - Replace doc-gating tests that currently require the compatibility architecture.
      - Run the full test suite and capture final parity evidence.
    out_of_scope:
      - New runtime features beyond what the request requires.
      - Additional workflow examples not needed for proof.
    dependencies:
      - workflow-migration-parity
    acceptance_criteria:
      - id: AC-1
        text: Required final docs exist and describe the strict public API, explicit session model, compat removal, workflow/runtime boundary, configuration, and parity meaning.
      - id: AC-2
        text: Tests prove engine contracts, no-compat behavior, strict workflow execution, toy-workflow runtime agnosticism, and legacy parity for Autoloop_v1.
      - id: AC-3
        text: The final suite passes without retaining any hidden compatibility shims.
    deliverables:
      - autoloop_v3/README.md
      - autoloop_v3/MIGRATION.md
      - final documentation and gating tests
    risks:
      - Stale docs/tests may still encode removed compatibility behavior and fail late.
      - Final parity claims may be under-specified unless evidence is captured in tests and docs together.
    rollback:
      - Revert doc/test-gate changes from this phase if they overconstrain before implementation stabilizes.
      - Keep the functional strict/parity code changes from earlier phases.
