phases:
- phase_id: rendered-provider-boundary
  title: Rendered Provider Boundary
  objective: Introduce the shared rendered-turn/provider-transport boundary and remove
    workflow rendering and outcome parsing from CLI runtime providers.
  status: planned
  in_scope:
  - Add core provider turn, context, rendering, parsing, and wrapper modules.
  - Refactor Codex and Claude runtime providers into ProviderTransport implementations.
  - Update provider backend resolution and transport-purity/runtime-provider tests.
  out_of_scope:
  - Changing public CLI flags or provider config semantics.
  - Removing semantic ScriptedLLMProvider support.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: Runtime provider files no longer import semantic request/response types,
      render verifier packets, or parse workflow outcome JSON.
  - id: AC-2
    text: RenderedLLMProvider owns semantic-request translation, shared markdown prompt
      rendering, and outcome parsing for verifier and llm turns.
  - id: AC-3
    text: Renderer output includes the runtime step contract sections and excludes
      raw-output content and metadata.
  deliverables:
  - core/providers/turns.py, rendering.py, parsing.py, and rendered.py
  - Refactored runtime/providers/codex.py, runtime/providers/claude.py, and runtime/provider_backends.py
  - Updated provider runtime and backend tests, including transport purity coverage
  risks:
  - Session resume behavior can regress if transport refactors disturb provider metadata
    handling.
  - Baseline provider tests currently assert runtime-owned verifier rendering and
    must be rewritten carefully.
  rollback:
  - Temporarily point runtime/provider_backends.py back to the pre-wrapper provider
    classes if transport integration fails.
  - Keep parsing and rendering modules additive until the refactor passes provider
    tests.
- phase_id: engine-retries-and-contract-enrichment
  title: Retry Loop And Contract Enrichment
  objective: Compile retry policy into provider-mediated steps, enrich provider requests
    with artifact and route metadata, and add engine-owned retry handling.
  status: planned
  in_scope:
  - Add ProviderRetryPolicy and retry-feedback generation.
  - Add retry_policy to LLMStep and PairStep and reject it on SystemStep.
  - Build provider artifact refs and route-required artifact maps in the engine.
  - Retry only provider-mediated failures, with PairStep retries restarting producer
    plus verifier.
  out_of_scope:
  - Retrying middleware, SystemStep, extension, handler, or missing-input failures.
  - Changing artifact validation semantics beyond retry classification and feedback.
  dependencies:
  - rendered-provider-boundary
  acceptance_criteria:
  - id: AC-1
    text: Default provider retry budget is 3 and max_attempts=1 preserves the previous
      single-attempt behavior.
  - id: AC-2
    text: Illegal route, invalid payload, provider transport failure, malformed provider
      output, and output-artifact validation failures retry with rendered retry feedback.
  - id: AC-3
    text: Missing required input artifacts and middleware or system routing failures
      do not retry.
  deliverables:
  - core/providers/retries.py and step/compiler/validation export updates
  - Engine request-building helpers and provider retry loop in core/engine.py
  - Retry-focused engine contract and validation tests
  risks:
  - Retry logic can accidentally duplicate logs or misclassify downstream failures.
  - PairStep retries can become inconsistent if producer and verifier sessions are
    not rebuilt from canonical session state.
  rollback:
  - Disable the retry loop behind compiled max_attempts=1 semantics while preserving
    the rendered provider boundary.
  - Keep failure-context additions additive so checkpoint consumers continue to read
    older shapes.
- phase_id: route-handoff-persistence
  title: Route Handoff Persistence
  objective: Add explicit route handoff authoring, runtime persistence, scoped delivery,
    and resume-safe consumption.
  status: planned
  in_scope:
  - Add Handoff effect, Event.handoff, PendingHandoff, and checkpoint persistence
    fields.
  - Resolve and persist handoffs after route resolution, including worklist-scoped
    destination overrides.
  - Inject combined static and dynamic handoffs into the matching target provider
    turn only.
  - Add validation that rejects handoff delivery to SystemStep targets.
  out_of_scope:
  - Adding max_chars or other truncation controls to Handoff.
  - Making handoffs available to unrelated steps or unrelated worklist items.
  dependencies:
  - engine-retries-and-contract-enrichment
  acceptance_criteria:
  - id: AC-1
    text: Static Handoff and dynamic Event.handoff are persisted, survive resume,
      and are consumed once after dispatch begins.
  - id: AC-2
    text: Handoffs are delivered only to the resolved target step and are scoped by
      worklist item when relevant.
  - id: AC-3
    text: Validation rejects handoff-to-SystemStep routes under the chosen Option
      A policy.
  deliverables:
  - Effect, primitive, store, and engine updates for handoff persistence
  - Handoff rendering support in the shared provider renderer
  - Unit and engine tests covering handoff compilation, scoping, resume, and consumption
  risks:
  - Resolved-target handoff delivery can drift if route effects override destinations
    after the handoff is captured.
  - Checkpoint compatibility can regress if pending_handoffs is not deserialized additively.
  rollback:
  - Leave checkpoint readers tolerant of pending_handoffs while disabling delivery
    logic if scoped routing proves unstable.
  - Keep handoff validation explicit so invalid authoring fails fast rather than leaking
    at runtime.
- phase_id: docs-baselines-and-suite-validation
  title: Docs Baselines And Full Validation
  objective: Update the docs and prompt baseline language to the new runtime contract
    and verify the repository with targeted and full tests.
  status: planned
  in_scope:
  - Update docs/architecture.md, docs/authoring.md, and affected workflow prompt READMEs.
  - Revise baseline-doc assertions and any runtime/provider tests coupled to the old
    verifier packet contract.
  - Run the targeted pytest list from the request and then the full suite.
  out_of_scope:
  - Changing workflow authoring APIs beyond the requested additive retry and handoff
    surfaces.
  - Adding new public runtime modes or provider factory configuration.
  dependencies:
  - route-handoff-persistence
  acceptance_criteria:
  - id: AC-1
    text: Docs and workflow prompt READMEs describe the compact human-readable runtime
      step contract and explicitly state that raw provider output remains telemetry
      only.
  - id: AC-2
    text: Baseline-doc tests, runtime-provider tests, engine contract tests, validation
      tests, and primitives/store tests pass.
  - id: AC-3
    text: Full pytest passes without reintroducing runtime-side prompt rendering or
      prompt-level raw-output leakage.
  deliverables:
  - Updated docs and workflow prompt README baselines
  - Adjusted baseline test expectations and any remaining provider/runtime assertions
  - Targeted and full-suite validation results
  risks:
  - A large number of prompt README baselines may drift if repository-wide replacements
    miss edge cases.
  - Full-suite failures may expose hidden dependencies on the old verifier packet
    contract.
  rollback:
  - Revert only the documentation and baseline assertion changes if implementation
    work is deferred.
  - Keep narrow search-based diffs so failed doc changes are easy to isolate.
