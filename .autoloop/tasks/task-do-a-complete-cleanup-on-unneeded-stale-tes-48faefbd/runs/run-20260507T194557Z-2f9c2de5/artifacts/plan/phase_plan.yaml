phases:
  - phase_id: "unblock-shared-suite"
    title: "Unblock Shared Suite"
    objective: "Remove immediate collection blockers and delete clearly out-of-scope parity/docs/recursive coverage from tests."
    status: "planned"
    in_scope:
      - "Delete stale parity and docs baseline files from tests."
      - "Rewrite wheel smoke coverage to shared package and CLI expectations only."
      - "Remove recursive wrapper, bundled-workflow export, and docs-text assertions that no longer belong in tests."
      - "Replace top-level autoloop.workflows contract imports in shared tests with local test fixtures."
    out_of_scope:
      - "Moving deleted coverage into workflow-owned or recursive-owned directories."
      - "Changing runtime or packaging code outside tests."
    dependencies: []
    acceptance_criteria:
      - id: "AC-1"
        text: "pytest can collect the retained tests tree without import failures from autoloop.workflows contract modules."
      - id: "AC-2"
        text: "tests no longer contain the v1 parity file, the architecture/docs baseline file, or recursive wrapper assertions."
    deliverables:
      - "Updated/deleted shared test files that remove immediate blockers and obviously misowned coverage."
      - "A smaller wheel smoke test that validates build/install/CLI/import behavior only."
    risks:
      - "Accidentally dropping a shared runtime assertion while removing recursive/docs-coupled checks."
      - "Replacing imported contract constants inconsistently across the large stdlib/extensions file."
    rollback:
      - "Restore individual deleted tests from git if collection succeeds but a shared contract gap is discovered."
      - "Revert the wheel smoke rewrite if public package exposure is no longer asserted."
  - phase_id: "remove-misowned-workflow-suites"
    title: "Remove Misowned Workflow Suites"
    objective: "Delete workflow-owner and docs-owner suites from tests and convert surviving shared tests to synthetic fixtures only."
    status: "planned"
    in_scope:
      - "Delete the 15 workflow-package runtime suites that validate concrete repo-owned workflow assets."
      - "Rewrite optimizer and shared stdlib/extensions tests to stop copytree/read patterns against repo-root workflows and docs."
      - "Narrow strictness scanning to maintained shared roots."
      - "Avoid marker-based quarantine logic for removed suites."
    out_of_scope:
      - "Re-homing removed workflow tests into autoloop/workflows owners."
      - "Adding pytest configuration outside tests."
    dependencies:
      - "unblock-shared-suite"
    acceptance_criteria:
      - id: "AC-1"
        text: "No retained test under tests reads concrete assets from REPO_ROOT/docs, REPO_ROOT/recursive_autoloop, or REPO_ROOT/autoloop/workflows."
      - id: "AC-2"
        text: "Shared workflow discovery, workspace, and optimizer helper tests still execute through tmp_path-generated fixtures."
    deliverables:
      - "Deleted workflow-owner runtime files removed from tests."
      - "Shared tests rewritten to use local synthetic workflow/doc fixtures."
      - "Strictness coverage limited to maintained shared roots and compatibility bans."
    risks:
      - "Deleting a file that also contained framework-shared assertions."
      - "Synthetic fixture replacements missing metadata that downstream assertions expect."
    rollback:
      - "Restore a removed runtime file temporarily if analysis shows it mixes owner-specific and shared assertions, then carve out only the shared portion."
      - "Back out individual fixture rewrites and keep the prior assertions while rebuilding equivalent tmp_path inputs."
  - phase_id: "split-retained-monoliths"
    title: "Split Retained Monoliths"
    objective: "Restructure the remaining oversized shared test files into smaller ownership-aligned modules without changing semantics."
    status: "planned"
    in_scope:
      - "Split tests/unit/test_stdlib_and_extensions.py into domain-aligned shared test modules."
      - "Split tests/contract/test_engine_contracts.py into tests/contract/engine modules."
      - "Keep helper sharing minimal and mechanical."
    out_of_scope:
      - "Any new abstraction layer or helper framework added only for the split."
      - "Further behavior changes beyond the intentional removals already planned."
    dependencies:
      - "remove-misowned-workflow-suites"
    acceptance_criteria:
      - id: "AC-1"
        text: "The split modules preserve the retained assertions and pass collection under their new paths."
      - id: "AC-2"
        text: "No split step reintroduces repo-owned workflow/docs/recursive dependencies into shared tests."
    deliverables:
      - "Smaller unit and contract test modules with clearer ownership boundaries."
      - "Stable helper placement that does not require cross-file circular imports."
    risks:
      - "Helper scope changes creating hidden import-order regressions."
      - "Large file moves obscuring whether failures come from structural changes or earlier cleanup."
    rollback:
      - "Revert file moves while retaining prior deletions and fixture rewrites if the split becomes noisy."
      - "Keep monoliths intact if the cleanup is otherwise complete and the split adds churn without risk reduction."
