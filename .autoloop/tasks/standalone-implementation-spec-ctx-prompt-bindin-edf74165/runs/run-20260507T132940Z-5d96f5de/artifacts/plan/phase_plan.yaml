    objective: "Bring prompt validation, runtime context construction, and regression coverage into line with the requested `ctx.message` versus `ctx.input` contract."
    status: planned
    in_scope:
      - "Remove built-in `ctx.input.message` acceptance unless the workflow `Input` model explicitly declares `message`."
      - "Restore file-backed lazy `ctx.message` behavior for root engine contexts, resumed contexts, and branch/fan-in clones when a run-local `request_file` is authoritative."
      - "Update provider prompt, operation prompt, workflow-step, and runtime context tests to use `ctx.message` for request text and to cover the unreadable-snapshot path."
    out_of_scope:
      - "Broad reopening of the full `ctx.*` feature surface."
      - "Changes to supported `ctx.request.*`, `ctx.state.*`, `ctx.params.*`, or artifact-path rejection semantics."
      - "Workspace layout or CLI contract changes."
    dependencies: []
    acceptance_criteria:
      - id: AC-1
        text: "`{ctx.input.message}` fails validation and runtime rendering unless `Input.message` is explicitly declared."
      - id: AC-2
        text: "`{ctx.message}` continues to render correctly in provider prompts, operation prompts, and `workflow_step(message=...)` paths."
      - id: AC-3
        text: "Runner-backed fresh and resumed contexts continue reading the run-local `request.md` snapshot even after task-level request text changes."
      - id: AC-4
        text: "An engine/runner-backed context raises `WorkflowExecutionError(\"run request snapshot could not be read: <path>\")` when the authoritative run-local snapshot becomes unreadable after context construction."
      - id: AC-5
        text: "Child typed input remains distinct from request text, and branch/fan-in clones preserve snapshot-path authority instead of cached message text."
    deliverables:
