phases:
- phase_id: extract-shared-publication-validation
  title: Extract Shared Publication Validation
  objective: Add additive shared validation helpers for repeated publish-step mechanics
    without widening runtime-owned behavior.
  status: planned
  in_scope:
  - Add minimal shared publication-boundary and required-artifact validation helpers
    in existing stdlib validation seams.
  - Cover hidden-execution detection, required text reads, authoritative-artifact
    subset checks, and mechanical readiness-flag validation with focused unit tests.
  - Keep helper scope mechanical so workflow-specific policy remains local.
  out_of_scope:
  - New workflows or building blocks.
  - Runtime-owned routing, CLI, provider, or workflow.toml behavior changes.
  - A generic publication framework or registry.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: Shared helpers cover the duplicated mechanical publish checks currently
      repeated in the scoped governance and diagnostic workflow family.
  - id: AC-2
    text: Unit coverage proves helper behavior for required-artifact existence, non-empty
      text reads, publication-boundary validation, and hidden-execution rejection.
  - id: AC-3
    text: The helper boundary stays additive and does not move workflow-specific publish
      policy into runtime or root authoring surfaces.
  deliverables:
  - Updated stdlib validation helper surface for publication mechanics.
  - Focused unit-test coverage for the new helper behavior.
  risks:
  - Over-generalizing the helper surface could hide workflow-specific policy and make
    publish handlers harder to reason about.
  - Changing hidden-execution detection semantics could weaken existing publish-time
    guardrails.
  rollback:
  - Remove the additive helper functions and restore workflow-local validation if
    the shared seam obscures policy or breaks current tests.
  - Keep runtime, CLI, and artifact contracts unchanged so helper rollback is code-local.
- phase_id: migrate-governance-and-diagnostic-publishers
  title: Migrate Governance And Diagnostic Publishers
  objective: Refactor the highest-pressure publish handlers to consume the shared
    publication-validation seam while preserving their artifact contracts.
  status: planned
  in_scope:
  - Migrate workflow_portfolio_to_operating_system publish-time mechanics to the shared
    helpers.
  - Migrate company_operation_to_recursive_improvement_cycle publish-time mechanics
    to the shared helpers.
  - Migrate workflow_run_history_to_failure_modes publish-time mechanics to the shared
    helpers.
  - Delete replaced local helper tails when the shared seam fully covers them.
  out_of_scope:
  - Changing workflow artifact names, receipt filenames, route tags, or prompt paths.
  - Forced migration of adjacent workflows unless the fit is directly mechanical and
    low-risk.
  - Domain-policy rewrites for lifecycle, recursive-improvement, or failure-mode semantics.
  dependencies:
  - extract-shared-publication-validation
  acceptance_criteria:
  - id: AC-1
    text: The three scoped workflows use the shared helpers for repeated mechanical
      publish checks and keep only domain-specific publish assertions local.
  - id: AC-2
    text: Targeted runtime suites for the scoped workflows continue to pass without
      artifact-contract drift.
  - id: AC-3
    text: Publish handlers are materially shorter and clearer than before, with repeated
      local helper definitions removed where replaced.
  deliverables:
  - Refactored publish handlers in the scoped governance and diagnostic workflow family.
  - Targeted runtime regression coverage for the migrated workflows.
  risks:
  - Exact publish-time failure messages may drift and break tests that pin them.
  - Merging publish mechanics too aggressively could accidentally change workflow-local
    behavior.
  rollback:
  - Revert individual workflow migrations while keeping the shared helper seam additive
    if one workflow proves to need a narrower boundary.
  - Restore local helper tails for any workflow whose publish policy no longer reads
    clearly after migration.
- phase_id: docs-memory-and-proof-closeout
  title: Docs Memory And Proof Closeout
  objective: Document the shared publication-validation boundary, update recursive-memory
    ledgers, and close the cycle with targeted proof and accounting.
  status: planned
  in_scope:
  - Update docs/authoring.md to describe the new publication-validation helper boundary
    and its non-goals.
  - Update framework roadmap, framework gap ledger, workflow candidate ledger, and
    validation debt ledger for the cycle outcome.
  - Run targeted unit, runtime, and architecture-doc proof for the migrated family.
  - Record closeout accounting for boilerplate reduction and preserved compatibility.
  out_of_scope:
  - Unrelated recursive-memory cleanup outside the cycle outcome.
  - Broad repo-wide test expansion beyond the changed helper and workflow family.
  - Changes to verifier-owned criteria.md.
  dependencies:
  - migrate-governance-and-diagnostic-publishers
  acceptance_criteria:
  - id: AC-1
    text: docs/authoring.md and recursive-memory files describe the helper boundary,
      chosen consolidation, preserved contracts, and deferred debt consistently.
  - id: AC-2
    text: Targeted proof covers the new helper surface, the three migrated workflows,
      and the architecture-baseline docs.
  - id: AC-3
    text: Closeout explicitly reports no new workflow, preserved CLI/runtime/provider/ctx.invoke_workflow
      compatibility, and the boilerplate-reduction accounting required by the cycle
      request.
  deliverables:
  - Updated docs/authoring.md.
  - Updated recursive-memory ledgers and roadmap entries for cycle 9.
  - Recorded targeted proof results and closeout accounting.
  risks:
  - Docs and memory may drift from the actual helper boundary if closeout is treated
    as an afterthought.
  - Targeted proof may miss regressions if opportunistic workflow migrations expand
    beyond the scoped family.
  rollback:
  - Revert docs and recursive-memory updates together with code if the implementation
    direction changes materially.
  - Narrow the proof surface back to the mandatory migrated family if opportunistic
    expansion proves unstable.
