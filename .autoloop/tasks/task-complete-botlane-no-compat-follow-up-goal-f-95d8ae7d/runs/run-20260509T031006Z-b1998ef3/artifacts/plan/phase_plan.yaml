phases:
- phase_id: botlane-no-compat-contract-lock
  title: Lock Botlane-Only Contract
  objective: Finish the no-compat follow-up by removing the remaining active-state
    compatibility gap, tightening strictness coverage against hidden legacy-name construction,
    and rerunning the required validation and smoke tests.
  status: planned
  in_scope:
  - Update `botlane_optimizer/candidate_surfaces.py` so validation overlays exclude
    `.botlane` and no production code preserves any hidden `.autoloop` ignore path.
  - Re-audit maintained production Python under `botlane/` and `botlane_optimizer/`
    for split-string, adjacent-literal, join-based, or f-string reconstruction of
    legacy Autoloop identifiers.
  - Audit persisted-data schema surfaces in `botlane/core/schema_registry.py`, `botlane/core/operations.py`,
    and current runtime/optimizer readers so active schema identifiers remain `botlane.*`
    only and explicit legacy `autoloop.*` schema strings stay unsupported.
  - Tighten `tests/strictness/test_no_compat.py` so literal legacy names stay isolated
    there, the exact historical-doc allowlist remains narrow, and the AST scanner
    explicitly proves detection of hidden legacy-name construction forms.
  - Keep or strengthen negative runtime/package tests for `.autoloop/workflows`, legacy
    simple-flow markers, legacy imports and module entrypoints, legacy schema-prefix
    rejection, Botlane-only console scripts, and Botlane help output without Autoloop
    branding.
  - Add an optimizer regression test proving `.botlane/sentinel.txt` under the actual
    copied source root is absent from the temporary validation overlay while candidate
    workflow files still copy into the overlay and validation still runs from overlay
    cwd.
  - Run the maintained-tree literal scan, targeted optimizer and strictness pytest
    buckets, and the full pytest suite.
  out_of_scope:
  - Adding any Autoloop compatibility alias, migration helper, workspace fallback,
    schema migration, or legacy CLI forwarding.
  - Broadening the historical allowlist beyond the existing exact `legacy_docs/*.md`
    inventory.
  - Editing planner/verifier runtime artifacts outside the current run-local plan,
    feedback, and decision files.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: No production code recognizes `.autoloop` workspace state or `__autoloop_simple_flow_spec__`,
      maintained production files do not reconstruct legacy Autoloop names indirectly,
      and active persisted schema identifiers remain `botlane.*` only.
  - id: AC-2
    text: Validation overlays exclude `.botlane`, do not exclude `.autoloop`, and
      the regression test proves the copied overlay omits `.botlane` while still containing
      candidate workflow files and running validation from overlay cwd.
  - id: AC-3
    text: Strictness coverage confines literal legacy names to `tests/strictness/test_no_compat.py`
      plus the exact historical-doc allowlist, catches hidden construction of `autoloop`,
      `Autoloop`, `AUTOLOOP`, `.autoloop`, `autoloop_optimizer`, `_autoloop_workspace_workflows`,
      and the old simple-flow sentinel, and preserves rejection of explicit `autoloop.*`
      schema strings.
  - id: AC-4
    text: Validation evidence includes passing targeted optimizer, strictness, and
      operation-replay schema tests, passing positive `botlane` and `botlane_optimizer`
      import smoke, passing negative `autoloop` and `autoloop_optimizer` import smoke,
      `python -m autoloop` failure, successful `botlane --help` output without legacy
      branding, and a full pytest pass.
  deliverables:
  - Updated `botlane_optimizer/candidate_surfaces.py` overlay ignore handling.
  - Updated `tests/strictness/test_no_compat.py` scanner, persisted-schema rejection
    coverage, and Botlane-only regression coverage.
  - Updated `tests/unit/optimizer/test_candidate_surfaces.py` overlay regression coverage
    for `.botlane` exclusion.
  - Validation output from maintained-tree scans and `.venv/bin/python -m pytest`
    runs.
  risks:
  - Editing already-correct runtime marker logic could reintroduce workspace-root
    or simple-flow regressions.
  - Hidden-construction scan expansion could false-positive if the exact self-test
    and historical-doc exclusions drift.
  - A narrow runtime cleanup could miss persisted schema readers and silently leave
    `autoloop.*` schema acceptance or migration behavior in place.
  - CLI help assertions could become brittle if they depend on full formatted output
    instead of stable tokens.
  rollback:
  - Revert only the `.botlane` overlay-ignore edit if it alone causes unexpected validation
    regressions.
  - Revert only newly added strictness or smoke assertions that prove environment-specific
    or over-broad, without restoring any legacy compatibility path.
