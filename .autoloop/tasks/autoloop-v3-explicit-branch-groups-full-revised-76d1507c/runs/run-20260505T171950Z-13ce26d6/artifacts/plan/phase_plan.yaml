phases:
  - phase_id: "authoring-and-compile-model"
    title: "Authoring And Compile Model"
    objective: "Add explicit branch-group declarations and compile-time metadata so branch groups exist as validated composite workflow steps."
    status: "planned"
    in_scope:
      - "Public `parallel(...)`, `fan_out(...)`, and `FanIn` declarations plus exports."
      - "Composite branch-group step shape and internal branch-spec metadata."
      - "Compile-time validation for names, helper legality, placeholder legality, supported branch and fan-in step kinds, fan-out input serializability, and branch-only fresh-session rules."
    out_of_scope:
      - "Runtime branch scheduling."
      - "Checkpoint/resume changes beyond composite-step modeling."
      - "Automatic DAG scheduling, worklist-derived fan-out, and child workflow branch execution."
    dependencies: []
    acceptance_criteria:
      - id: "AC-1"
        text: "Branch groups compile as one external workflow step with deterministic exposed routes and ordered internal branch specs."
      - id: "AC-2"
        text: "Provider-backed branch steps fail compilation unless they explicitly declare `Session.fresh()`, while non-branch provider steps retain existing default-session behavior."
      - id: "AC-3"
        text: "Fan-in accepts LLM, produce-verify, Python, and operation steps, and rejects child-workflow fan-in in v1."
    deliverables:
      - "Branch-group public declarations in `autoloop/simple.py` and `autoloop/__init__.py`."
      - "Branch-group models/lowering/validation under `autoloop/core/branch_groups/`."
      - "Compiler and discovery integration in `autoloop/core/{steps,discovery,validation,compiler,lowering}.py`."
    risks:
      - "Branch-only session validation could accidentally tighten ordinary step behavior if wired after default-session lowering."
      - "Composite route exposure can drift from fan-in or outcome semantics if validation and lowering diverge."
    rollback:
      - "Remove public branch-group exports and declaration lowering."
      - "Revert composite-step additions from compiler/discovery if runtime work has not started."
  - phase_id: "shared-context-and-session-scaffolding"
    title: "Shared Context And Session Scaffolding"
    objective: "Make context state, values, and sessions support shared branch execution while keeping parent semantics deterministic."
    status: "planned"
    in_scope:
      - "Shared `StateCell` support in `Context` and runtime helpers."
      - "Optional `ctx.branch` and `ctx.fan_in` metadata surfaces."
      - "Branch-scoped session-store view and context-bound session selection/persistence."
      - "Branch-scoped bookkeeping keys for visits, routes, retries, and execution ids."
    out_of_scope:
      - "Full branch runtime orchestration."
      - "Artifact manifest/context generation."
      - "Partial branch resume."
    dependencies:
      - "authoring-and-compile-model"
    acceptance_criteria:
      - id: "AC-1"
        text: "Branch contexts share one parent state cell and one values mapping, and state assignment through `Context.state` or runtime helpers reaches the shared cell."
      - id: "AC-2"
        text: "Branch-created fresh provider sessions can be persisted and reused inside that branch execution without replacing the parent active session slot nondeterministically."
    deliverables:
      - "Context/state metadata changes in `autoloop/core/context.py` and `autoloop/core/branch_groups/context.py`."
      - "Branch session-store view and activation rules in `autoloop/core/branch_groups/sessions.py`."
      - "Session selection/persistence adjustments in `autoloop/core/engine.py` and `autoloop/core/operations.py`."
    risks:
      - "Current direct `Engine.session_store` reads can bypass branch-local session views."
      - "Any code that reaches `context._state` or `context._values` directly can miss the shared-cell contract if not audited."
    rollback:
      - "Revert context-bound session-store usage to the engine-global store."
      - "Remove shared-cell plumbing while preserving compile-time branch-group declarations."
  - phase_id: "composite-runtime-and-evidence"
    title: "Composite Runtime And Evidence"
    objective: "Execute branch groups concurrently as composite barriers, capture ordered branch results, and resolve through fan-in or mechanical outcomes."
    status: "planned"
    in_scope:
      - "Dedicated `BranchGroupRuntime` collaborator and dispatcher integration."
      - "Bounded branch scheduling with `concurrency` and `settle` semantics."
      - "Ordered branch-result capture from `StepExecutionResult` without following branch destinations."
      - "Runtime-owned `_branch_groups/<group>/results.json` and `context.md` outputs with the requested schema/content contract."
      - "Fan-in execution plus explicit `success_routes`, built-in outcome, and custom-aggregator routing semantics."
      - "Composite-boundary checkpoint behavior."
    out_of_scope:
      - "Branch-specific checkpoint resume."
      - "Workspace isolation or conflict detection."
      - "Automatic artifact/state merge logic."
    dependencies:
      - "shared-context-and-session-scaffolding"
    acceptance_criteria:
      - id: "AC-1"
        text: "Branch groups execute ordered branch specs under the declared settlement policy and resolve only after manifest/context writing and optional fan-in/outcome selection complete."
      - id: "AC-2"
        text: "Branch `Goto`, `Fail`, and `RequestInput` results are captured in the manifest without advancing the parent workflow cursor or checkpointing mid-branch."
      - id: "AC-3"
        text: "The runtime writes `autoloop.branch_results/v1` manifests and deterministic context markdown, and no-fan-in routing honors the requested `success_routes`, `all_done`, `all_settled`, `any_done`, and custom aggregator semantics."
    deliverables:
      - "Runtime modules under `autoloop/core/branch_groups/{runtime,manifest,outcomes}.py`."
      - "Dispatcher and minimal engine wiring in `autoloop/core/engine_collaborators.py` and `autoloop/core/engine.py`."
      - "Composite runtime evidence under the runtime-owned `_branch_groups` namespace."
    risks:
      - "Threaded execution can expose state/value replacement races if locking is incomplete."
      - "Manifest or context write failures can leave fan-in or outcome routing in a partially progressed state if failure ordering is wrong."
    rollback:
      - "Disable dispatcher support for branch-group composite steps."
      - "Remove runtime-only `branch_groups` modules while keeping compile-time declarations dark."
  - phase_id: "surface-hardening-and-regression-suite"
    title: "Surface Hardening And Regression Suite"
    objective: "Finish placeholder, topology, tracing, and test coverage work so branch groups ship without regressing existing workflow behavior."
    status: "planned"
    in_scope:
      - "Runtime placeholder rendering for `{branch.*}` and `{fan_in.*}`."
      - "Relative templated artifact rooting fix."
      - "Additive branch-group metadata in static graph/topology outputs and runtime events."
      - "Compile-time, contract, unit, and runtime tests for the requested acceptance matrix and key regressions."
    out_of_scope:
      - "Schema-version churn for existing topology/checkpoint payloads unless additive fields prove insufficient."
      - "Unrelated workflow rewrites."
    dependencies:
      - "composite-runtime-and-evidence"
    acceptance_criteria:
      - id: "AC-1"
        text: "Branch and fan-in placeholders render only in legal contexts, and templated relative artifact paths remain rooted under the owning step directory."
      - id: "AC-2"
        text: "Static graph, topology, runtime-event, and regression tests cover branch-group behavior without changing existing non-branch workflow contracts."
    deliverables:
      - "Placeholder/rooting updates in `autoloop/core/{artifacts,engine,operations,discovery}.py`."
      - "Static graph and tracing updates in `autoloop/runtime/{static_graph,tracing}.py`."
      - "Branch-group coverage across `tests/unit`, `tests/contract`, and `tests/runtime`."
    risks:
      - "Additive topology changes can still break strict test expectations if ordering or field naming is unstable."
      - "Rooting fixes may change current behavior for non-branch templated artifacts and need regression coverage."
    rollback:
      - "Revert additive topology/tracing fields if they break downstream consumers."
      - "Back out placeholder/rooting changes independently from runtime branch execution if needed."
