phases:
  - phase_id: "align-prompt-route-wording"
    title: "Align Prompt Route Wording"
    objective: "Update workflow prompt bodies and prompt-package tests to match the shipped route model, then add a shared prompt-body regression guard."
    status: "planned"
    in_scope:
      - "Replace retired reserved-route wording in affected non-README workflow prompt bodies."
      - "Update runtime prompt-package tests that currently assert retired reserved-route phrases."
      - "Add shared baseline coverage that scans prompt bodies directly."
    out_of_scope:
      - "Runtime engine behavior changes."
      - "Workflow graph or route topology changes."
      - "Broad docs or README rewrites unless implementation finds route-model drift there."
    dependencies: []
    acceptance_criteria:
      - id: "AC-1"
        text: "No non-README workflow prompt body under workflows/*/prompts/*.md contains `Reserved routes` or a reserved/default route set of `question`, `blocked`, and `failed`."
      - id: "AC-2"
        text: "Updated prompt bodies frame `question` as the only default runtime control route and authored `blocked`/`failed` as ordinary application routes."
      - id: "AC-3"
        text: "The runtime prompt-package suites with retired wording assertions are updated to the shipped wording and pass."
      - id: "AC-4"
        text: "Shared baseline coverage fails if prompt bodies reintroduce the retired reserved-route wording, independent of workflow docs and prompt README checks."
    deliverables:
      - "Updated workflow prompt bodies with shipped route-model wording."
      - "Updated runtime prompt-package assertions for the affected suites."
      - "Shared baseline prompt-body regression test coverage."
    risks:
      - "Large prompt-only edit count can introduce inconsistent phrasing if not normalized."
      - "An overly strict shared baseline could create brittle false failures."
      - "Prompt families without package-local wording assertions depend on the shared baseline being comprehensive."
    rollback:
      - "Revert prompt-body wording edits and paired runtime test updates together if wording alignment causes unexpected failures."
      - "Relax the shared baseline assertions instead of reintroducing retired route vocabulary if only the guard is too strict."
