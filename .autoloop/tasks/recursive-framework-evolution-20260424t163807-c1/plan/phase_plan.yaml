phases:
- phase_id: shared-workflow-validation-seam
  title: Shared Workflow Validation Seam
  objective: Consolidate repeated workflow-local validation helpers into stdlib without
    widening runtime behavior or the root authoring surface.
  status: planned
  in_scope:
  - Extend `stdlib/validation.py` with additive helpers for workflow-local JSON-object
    reads, mapping checks, optional-string normalization, deduped string-list normalization,
    duplicate guards, and positive-int validation.
  - Export the shared helper surface from `stdlib/__init__.py`.
  - Add focused helper coverage in `tests/unit/test_validation.py` and `tests/unit/test_stdlib_and_extensions.py`.
  out_of_scope:
  - CLI, runtime, provider, or `workflow.toml` contract changes.
  - Prompt-template rewrites beyond any wording needed to keep docs accurate.
  - New workflow packages.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: The shared validation seam remains additive under stdlib, writes no hidden
      artifacts, and does not widen runtime-owned policy or the root `workflow` import
      surface.
  - id: AC-2
    text: The helper API covers the repeated validation idioms currently copied across
      the selected-workflow and governance workflow family.
  - id: AC-3
    text: Unit coverage freezes helper behavior closely enough to migrate workflows
      without silent contract drift.
  deliverables:
  - stdlib/validation.py
  - stdlib/__init__.py
  - tests/unit/test_validation.py
  - tests/unit/test_stdlib_and_extensions.py
  risks:
  - If helper semantics are stricter than the copied workflow helpers, migrated workflows
    could reject inputs they previously normalized.
  - An over-broad helper surface would turn a local consolidation into new framework
    machinery.
  rollback:
  - Revert the additive stdlib validation helper changes and their unit-test updates
    together.
- phase_id: workflow-validation-migrations-and-closeout
  title: Workflow Migrations And Closeout
  objective: Migrate the high-duplication workflow family to the shared validation
    seam and close the cycle with targeted docs, tests, and recursive-memory updates.
  status: planned
  in_scope:
  - Migrate `task_to_candidate_workflow_set`, `task_to_workflow_strategy`, `candidate_workflow_to_adapted_execution_plan`,
    `workflow_to_eval_suite`, `workflow_run_history_to_failure_modes`, `workflow_portfolio_to_operating_system`,
    `company_operation_to_recursive_improvement_cycle`, `workflow_and_eval_to_refined_workflow_package`,
    and `workflow_package_to_composable_building_blocks` to the shared validation
    seam.
  - Remove duplicated workflow-local helper tails from the migrated workflows while
    leaving domain-specific publication checks local.
  - Update `docs/authoring.md`, targeted runtime tests, and recursive-memory files
    to record the new consolidation baseline.
  out_of_scope:
  - Migration of the older domain workflows `investigation_request_to_evidence_pack`,
    `security_finding_to_verified_remediation`, `release_candidate_to_go_no_go`, and
    `incident_to_hardening_program`.
  - Prompt/readme simplification as a primary deliverable.
  - Any runtime-owned publication or routing abstraction.
  dependencies:
  - shared-workflow-validation-seam
  acceptance_criteria:
  - id: AC-1
    text: The migrated workflows compile and keep their existing artifact, route,
      and publication contracts while using the shared validation helpers.
  - id: AC-2
    text: The targeted runtime suites for the migrated workflows continue to pass,
      proving no regression in publication behavior or selected-workflow/governance
      boundaries.
  - id: AC-3
    text: Authoring docs and recursive-memory files record that the cycle chose consolidation
      over a new workflow and that generic validation now belongs in stdlib rather
      than workflow-local helper tails.
  deliverables:
  - workflows/task_to_candidate_workflow_set/workflow.py
  - workflows/task_to_workflow_strategy/workflow.py
  - workflows/candidate_workflow_to_adapted_execution_plan/workflow.py
  - workflows/workflow_to_eval_suite/workflow.py
  - workflows/workflow_run_history_to_failure_modes/workflow.py
  - workflows/workflow_portfolio_to_operating_system/workflow.py
  - workflows/company_operation_to_recursive_improvement_cycle/workflow.py
  - workflows/workflow_and_eval_to_refined_workflow_package/workflow.py
  - workflows/workflow_package_to_composable_building_blocks/workflow.py
  - docs/authoring.md
  - tests/runtime/test_task_to_candidate_workflow_set.py
  - tests/runtime/test_task_to_workflow_strategy.py
  - tests/runtime/test_candidate_workflow_to_adapted_execution_plan.py
  - tests/runtime/test_workflow_to_eval_suite.py
  - tests/runtime/test_workflow_run_history_to_failure_modes.py
  - tests/runtime/test_workflow_portfolio_to_operating_system.py
  - tests/runtime/test_company_operation_to_recursive_improvement_cycle.py
  - tests/runtime/test_workflow_and_eval_to_refined_workflow_package.py
  - tests/runtime/test_workflow_package_to_composable_building_blocks.py
  - tests/test_architecture_baseline_docs.py
  - .autoloop_recursive/framework_evolution_charter.md
  - .autoloop_recursive/framework_roadmap.md
  - .autoloop_recursive/framework_gap_ledger.md
  - .autoloop_recursive/workflow_candidate_ledger.md
  - .autoloop_recursive/validation_debt_ledger.md
  risks:
  - A partial migration would leave the repository with two competing validation idioms
    and reduce the value of the new seam.
  - Moving too much publication logic into stdlib would blur the workflow/runtime/provider
    boundary instead of clarifying it.
  rollback:
  - Revert the workflow migrations, authoring-doc updates, targeted runtime-test updates,
    and recursive-memory closeout together if the shared seam does not hold across
    the migrated family.
