phases:
- phase_id: compatibility-bridge-removal
  title: Remove Compatibility Bridges
  objective: Move production code and the maintained regression surface to canonical
    imports before deleting the deprecated autoloop_v3.core bridge.
  status: planned
  in_scope:
  - Rewrite production imports in autoloop, runtime, and extensions from autoloop_v3.core
    to core.
  - Migrate maintained tests and fixtures that still import autoloop_v3.core to canonical
    core or autoloop imports.
  - Remove root bridge wiring, autoloop_v3/core/__init__.py, and core/_compat.py.
  - Update strictness coverage so only intentional failure assertions still reference
    autoloop_v3.core.
  out_of_scope:
  - Changing public autoloop API names beyond the spec.
  - Telemetry or state model behavior changes.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: No production or maintained non-strictness test/fixture file imports autoloop_v3.core
      or core._compat.
  - id: AC-2
    text: Importing autoloop_v3.core fails intentionally, while canonical autoloop
      and core imports still work across the maintained regression surface.
  deliverables:
  - Canonicalized production imports and deleted compatibility bridge files.
  - Migrated maintained tests and fixtures to canonical imports.
  - Updated strictness coverage for removed compatibility surfaces.
  risks:
  - Broad import touch set can break runtime, extensions, or tests if any path is
    missed.
  rollback:
  - Restore bridge files and revert production plus maintained-test import rewrites
    as one slice if canonical imports prove incomplete.
- phase_id: hook-rerouting
  title: Enable Hook Rerouting
  objective: Allow validated hook redirects with chaining, rollback safety, and trace
    visibility.
  status: planned
  in_scope:
  - Update engine after-hook and route-hook handling to accept route-tag and Event
    redirects.
  - Implement chained route-finalization with a max redirect cap.
  - Add hook redirect trace/event payloads and update contract tests.
  out_of_scope:
  - StateVar sugar or scoped state authoring.
  - History reader APIs.
  dependencies:
  - compatibility-bridge-removal
  acceptance_criteria:
  - id: AC-1
    text: after/on_route/on_taken hooks can redirect to declared route tags and the
      final route drives transition plus artifact validation.
  - id: AC-2
    text: Redirect cycles fail with a clear max-hook-redirects error and emit redirect
      trace events.
  deliverables:
  - Engine hook-chain implementation with rollback snapshots.
  - Updated hook contract and tracing tests.
  risks:
  - Route redirect loops can deadlock execution or misclassify provider-attributable
    failures.
  rollback:
  - Revert hook redirect logic and associated tracing/tests while keeping compatibility
    removal intact.
- phase_id: state-surfaces
  title: Add Built-In Step State
  objective: Make runtime-owned built-in step state canonical and add StateVar-backed
    simple step state sugar.
  status: planned
  in_scope:
  - Add built-in runtime step models and reserved-name validation.
  - Reintroduce public StateVar for inline step state sugar.
  - Persist built-in and custom step state through checkpoints and resume.
  out_of_scope:
  - Worklist item_state and step_item_state support.
  - Derived history telemetry.
  dependencies:
  - hook-rerouting
  acceptance_criteria:
  - id: AC-1
    text: Every step exposes visits, last_route, and last_reason; produce_verify_step
      also exposes rework_count and replan_count.
  - id: AC-2
    text: StateVar sugar compiles to Pydantic-backed state, rejects ambiguous None,
      and rejects reserved-name collisions.
  deliverables:
  - Runtime-owned step state models wired through compiler, context, engine, and checkpoints.
  - Simple-surface StateVar export and validation coverage.
  risks:
  - Mixing built-in and custom state can corrupt checkpoint restore semantics if model
    normalization is inconsistent.
  rollback:
  - Revert built-in state plumbing and StateVar export while preserving hook rerouting.
- phase_id: scoped-item-state
  title: Implement Scoped Item State
  objective: Add worklist item_state and per-step step_item_state with prompt/runtime
    access and checkpoint persistence.
  status: planned
  in_scope:
  - Add item_state authoring to Worklist and step item_state authoring to scoped steps.
  - Expose ctx.item_state and ctx.step_item_state for scoped executions.
  - Support {item.state.*} and {step_name.item_state.*} prompt references with field
    validation.
  out_of_scope:
  - Effective required write rendering changes.
  - History aggregation APIs.
  dependencies:
  - state-surfaces
  acceptance_criteria:
  - id: AC-1
    text: Scoped workflows can read and persist worklist item state and step-item
      state independently per item.
  - id: AC-2
    text: Prompt placeholders for item.state and step.item_state resolve only against
      declared Pydantic models.
  deliverables:
  - Scoped item-state runtime and checkpoint plumbing.
  - Prompt-validation and scoped-state regression tests.
  risks:
  - Aggregate step state and per-item state can collide or leak across items if keys
    are not kept distinct.
  rollback:
  - Revert scoped item-state additions without removing aggregate built-in step state.
- phase_id: effective-required-writes
  title: Normalize Effective Required Writes
  objective: Make effective route required writes consistent across runtime validation,
    provider contracts, and topology artifacts.
  status: planned
  in_scope:
  - Preserve semantic difference between required_writes=None and required_writes=[].
  - Render explicit and effective required writes in provider/topology outputs.
  - Validate final routed artifacts against effective required writes.
  out_of_scope:
  - Hook redirect logic.
  - History/telemetry derivation.
  dependencies:
  - scoped-item-state
  acceptance_criteria:
  - id: AC-1
    text: Artifact-level required=True writes appear as effective required writes
      when a route does not override them.
  - id: AC-2
    text: Provider contracts, topology.json, and route_table.md expose explicit and
      effective required-write sets consistently.
  deliverables:
  - Shared effective-required-write helper used by runtime and static outputs.
  - Required-write regression coverage for None versus empty-list semantics.
  risks:
  - Split producer/verifier contracts can regress if verifier contract starts requiring
    producer outputs implicitly.
  rollback:
  - Revert effective-required-write rendering and helper changes while keeping prior
    state/scoped-state work.
- phase_id: history-telemetry
  title: Add Read-Only History
  objective: Provide ctx.history with derived telemetry backed by trace/events/checkpoint
    data and exact runtime instrumentation.
  status: planned
  in_scope:
  - Add core/history.py and bind it into Context.
  - Instrument provider attempts, hook redirects, artifact validation, token usage,
    and step execution ids.
  - Derive per-step and scoped telemetry with trace fallback to events-only mode.
  out_of_scope:
  - New mutable telemetry checkpoint blobs.
  - Further public API expansion beyond ctx.history and StateVar.
  dependencies:
  - effective-required-writes
  acceptance_criteria:
  - id: AC-1
    text: ctx.history exposes read-only event/trace/telemetry queries and works even
      when trace.jsonl is absent.
  - id: AC-2
    text: Derived telemetry reports completed, accepted_once, retry/do/verify attempts,
      failures, and token usage by scoped step instance.
  deliverables:
  - History reader module plus Context binding.
  - Runtime instrumentation and telemetry regression tests.
  risks:
  - Telemetry can be inaccurate or too expensive if instrumentation and reader semantics
    drift.
  rollback:
  - Revert history reader and new trace/event instrumentation while preserving earlier
    runtime behavior changes.
