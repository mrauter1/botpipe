phases:
- phase_id: extend-candidate-surface-seam
  title: Extend Candidate Surface Seam
  objective: Extend the existing authoring-only candidate-surface stdlib seam so it
    owns the remaining shared baseline/candidate manifest validation and overlay-result
    normalization mechanics.
  status: planned
  in_scope:
  - Add shared baseline/candidate manifest validation helpers to stdlib/candidate_surfaces.py.
  - Consolidate shared manifest-file parsing and overlay-result normalization into
    the same module.
  - Export the additive helper surface through stdlib/__init__.py and cover it with
    focused unit tests.
  out_of_scope:
  - Any CLI, runtime, or workflow.toml contract change.
  - Any migration of refinement-specific evaluation policy or decomposition-specific
    building-block policy into stdlib.
  - Any new workflow package.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: stdlib/candidate_surfaces.py owns the repeated mechanical manifest and overlay
      validation path that refinement and decomposition currently duplicate.
  - id: AC-2
    text: Unit tests prove unchanged baseline/candidate boundary validation, digest
      consistency checks, and overlay-result normalization behavior.
  deliverables:
  - updated stdlib/candidate_surfaces.py
  - updated stdlib/__init__.py exports
  - updated unit coverage for the shared seam
  risks:
  - Over-generalizing the seam could hide domain-specific refinement or decomposition
    rules.
  - Overlay-result refactors could accidentally change compile/test validation semantics.
  rollback:
  - Revert the new shared validators and restore the prior helper surface if the seam
    becomes harder to trace.
  - Revert stdlib export changes and any unit coverage tied only to the expanded seam.
- phase_id: migrate-refinement-decomposition-callers
  title: Migrate Workflow Callers
  objective: Refactor the refinement and decomposition workflows to consume the expanded
    candidate-surface seam while preserving current artifact names, receipt payloads,
    and route behavior.
  status: planned
  in_scope:
  - Refactor workflow_and_eval_to_refined_workflow_package to call the shared candidate-surface
    validators.
  - Refactor workflow_package_to_composable_building_blocks to call the same shared
    validators.
  - Keep evaluation-summary alignment, evidence capture, building-block index validation,
    and receipt shaping workflow-local.
  - Update targeted runtime tests for both workflows.
  out_of_scope:
  - Changing prompt paths, prompt roles, or route grammar.
  - Changing publication artifact filenames or receipt keys.
  - Broad workflow-family redesign outside the refinement/decomposition pair.
  dependencies:
  - extend-candidate-surface-seam
  acceptance_criteria:
  - id: AC-1
    text: Both workflows remove the duplicated mechanical manifest and overlay validator
      tails in favor of the shared seam.
  - id: AC-2
    text: Runtime tests still prove unchanged publication artifacts, boundary rejections,
      and overlay validation outcomes.
  deliverables:
  - updated refinement workflow implementation
  - updated decomposition workflow implementation
  - updated runtime tests for both workflows
  risks:
  - Artifact-schema drift could break existing manifest or receipt expectations.
  - A shared helper migration could accidentally drop a decomposition-only boundary
    assertion.
  rollback:
  - Restore the prior workflow-local validators if artifact or receipt compatibility
    breaks.
  - Leave the expanded seam in place but revert workflow callers if migration needs
    to be retried.
- phase_id: proof-docs-memory-closeout
  title: Proof Docs And Closeout
  objective: Run targeted proof, document the seam boundary only where needed, and
    sync recursive memory plus the required cycle-accounting records.
  status: planned
  in_scope:
  - Update docs/authoring.md if the expanded seam needs explicit authoring guidance.
  - Update framework_evolution_charter.md with a no-doctrine-change note or explicit
    doctrine change if required.
  - Update framework_roadmap.md, framework_gap_ledger.md, workflow_candidate_ledger.md,
    and validation_debt_ledger.md.
  - Run targeted unit, runtime, and docs proof and record the full required closeout
    accounting, including zero-value categories when unchanged.
  out_of_scope:
  - Broad documentation rewrites unrelated to the candidate-surface seam.
  - Untargeted full-suite proof outside the affected seams.
  dependencies:
  - migrate-refinement-decomposition-callers
  acceptance_criteria:
  - id: AC-1
    text: Authoring docs and recursive memory explicitly record the consolidation
      outcome, boundary, doctrine status, and deferred debt.
  - id: AC-2
    text: Targeted proof passes for the expanded seam, both migrated workflows, and
      architecture baseline docs.
  - id: AC-3
    text: The cycle closeout records files added, files deleted, net line change,
      the required justification if net added lines exceed 500, repeated validation
      idioms removed, repeated prompt sections removed or shortened, workflows changed
      to use shared helpers, new helper functions introduced, old workflow-local validation
      blocks replaced, and core-flow readability before and after.
  deliverables:
  - updated docs and recursive memory files, including framework_evolution_charter.md
  - targeted proof results
  - recorded full cycle closeout metrics
  risks:
  - Docs could overstate the seam and imply runtime ownership that does not exist.
  - Closeout could miss explicit recording of deferred validation debt in the refinement/decomposition
    family.
  rollback:
  - Revert doc and memory edits if they drift from the implemented seam.
  - Keep the code change but rerun closeout with corrected metrics if proof reporting
    is incomplete.
