phases:
- phase_id: provider-usage-plumbing
  title: Provider Usage Plumbing
  objective: Add typed optional provider usage data and propagate it through core
    step-finish events without changing workflow semantics.
  status: planned
  in_scope:
  - Add TokenUsage and StepProviderUsage models plus optional usage fields on provider
    responses.
  - Propagate usage through fake provider, runtime providers, provider backend tests,
    and pair/llm engine execution.
  - Extend StepFinish with provider_usage only.
  out_of_scope:
  - Git tracking runtime behavior
  - Trace persistence
  - Static step graph writing
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: Pair steps expose producer and verifier usage on StepFinish when available,
      and llm steps expose llm usage.
  - id: AC-2
    text: Missing provider usage stays non-fatal and existing provider callers remain
      compatible.
  deliverables:
  - Updated provider models and responses
  - Engine/provider plumbing for StepFinish.provider_usage
  - Provider usage regression tests
  risks:
  - Provider adapters may expose inconsistent usage payload shapes.
  - Core event changes could break tests that assert exact StepFinish structure.
  rollback:
  - Revert provider usage propagation while preserving unrelated runtime observability
    work.
- phase_id: runtime-config-and-git-primitives
  title: Runtime Config And Git Primitives
  objective: Establish default runtime git/tracing config, CLI overrides, and commit-all
    git helpers needed by runtime-owned observability.
  status: planned
  in_scope:
  - Add runtime git_tracking and tracing config sections with requested defaults and
    validation.
  - Add --no-git, --git-commit-policy, and --no-trace CLI overrides on mutating commands.
  - Add GitRepo status/dirty/add_all/commit_all helpers with git add --all semantics.
  out_of_scope:
  - Binding runtime observability into runner execution
  - Workflow-declared GitTracking filtering
  dependencies:
  - provider-usage-plumbing
  acceptance_criteria:
  - id: AC-1
    text: Resolved runtime config defaults enable step-policy git tracking and tracing.
  - id: AC-2
    text: CLI overrides deterministically enable, disable, or change runtime git/tracing
      policy.
  - id: AC-3
    text: GitRepo.commit_all stages the full workspace, commits untracked files, and
      returns current head without empty commits when nothing changed.
  deliverables:
  - Updated runtime config surface
  - Updated CLI flags
  - Commit-all git helper support
  risks:
  - Config parsing may reject older files if unknown-key handling is changed incorrectly.
  - CLI tests may assume the old help surface.
  rollback:
  - Disable new defaults via config/CLI or revert config and helper additions as one
    slice.
- phase_id: runtime-observability-persistence
  title: Runtime Observability Persistence
  objective: Implement runtime-owned git tracking, trace/raw persistence, static graph
    writing, and centralized run metadata updates with append-safe resume behavior.
  status: planned
  in_scope:
  - Create runtime/git_tracking.py and runtime/tracing.py with the requested APIs
    and failure-mode behavior.
  - Persist git_tracking.jsonl, trace.jsonl, raw outputs, static_step_graph.json,
    and run.json git/tracing metadata.
  - Add resume sequence discovery across trace, git_tracking, and raw files.
  out_of_scope:
  - Engine binding order changes
  - Workflow extension filtering logic
  dependencies:
  - runtime-config-and-git-primitives
  acceptance_criteria:
  - id: AC-1
    text: Trace files record commit_before_step but never commit_after_step, while
      git_tracking.jsonl records commit_after_step and commit_after_run.
  - id: AC-2
    text: Raw producer, verifier, and llm outputs are persisted under runtime-owned
      raw/ files with sha256 and byte metadata.
  - id: AC-3
    text: Resume appends trace/git/raw evidence and never overwrites existing raw
      files.
  deliverables:
  - RuntimeGitTracker implementation
  - RuntimeTraceWriter implementation
  - Static step graph serializer and run metadata helpers
  risks:
  - Sequence recovery from malformed existing files could choose a colliding raw filename.
  - run.json updates could become scattered if helpers are bypassed.
  rollback:
  - Disable tracing or git tracking independently while keeping shared provider/core
    changes.
- phase_id: engine-runner-observability-binding
  title: Engine And Runner Binding
  objective: Bind runtime observability into execution without breaking extension
    semantics, and enforce clean-git preflight before workspace creation or resume
    mutation.
  status: planned
  in_scope:
  - Add runtime_extension_factories support and bind runtime extensions before workflow-declared
    extensions.
  - Refactor runner/workspace preparation so git preflight happens before any run
    artifact is created or touched and the remaining run/resume initialization follows
    the mandatory ordered sequence.
  - Ignore workflow-declared GitTracking with an explicit warning event and run.json
    warning entry.
  - Handle resume git-tracking config mismatches, including warning persistence when
    a previously git-tracked run is resumed with tracking disabled.
  out_of_scope:
  - Removing workflow-declared Tracing support
  - Changing checkpoint or answer semantics beyond observability integration
  dependencies:
  - runtime-observability-persistence
  acceptance_criteria:
  - id: AC-1
    text: A dirty repository fails before run workspace creation when failure_mode
      is raise, and disables runtime git tracking for the run when failure_mode is
      ignore.
  - id: AC-2
    text: Runtime observability commits run-init, step, and finish/fatal milestones
      according to commit_policy without duplicate workflow-declared GitTracking commits.
  - id: AC-3
    text: Existing workflow extension ordering, terminal notifications, and failure
      checkpoint behavior remain valid.
  - id: AC-4
    text: 'New-run and resume setup follow the mandatory ordered sequence: git preflight
      before workspace mutation, then run metadata/static graph/observability initialization,
      then init commit, then engine execution.'
  - id: AC-5
    text: Resume compares prior run git-tracking metadata with current config, records
      the required warning when tracking is disabled after an earlier tracked segment,
      and enables tracking from the resume point only when earlier segments lacked
      it.
  deliverables:
  - Engine runtime-extension binding support
  - Runner/workspace preflight ordering changes
  - Runtime observability binder and workflow GitTracking deprecation handling
  risks:
  - Current workspace helpers eagerly create files and may violate clean-start ordering
    if reused unchanged.
  - Extension binding changes may regress contract-tested tuple order or fatal handling.
  rollback:
  - Temporarily disable runtime git tracking by default while keeping trace/static
    graph work if preflight integration regresses.
- phase_id: regression-coverage-and-docs
  title: Regression Coverage And Docs
  objective: Lock the behavior in with dedicated runtime tests, updated existing tests,
    and documentation that matches the new runtime-owned observability defaults.
  status: planned
  in_scope:
  - Add the requested runtime git tracking, runtime tracing, provider usage, static
    graph, and end-to-end integration tests.
  - Update tests that run outside git repositories to disable git tracking explicitly
    or initialize temporary repos.
  - Document runtime-owned git tracking/tracing, clean-start rules, GitTracking deprecation
    behavior, and replay artifacts.
  - Add validation for mandatory run/resume ordering and both resume git-tracking
    config-mismatch directions.
  out_of_scope:
  - Additional observability flags
  - Optimization workflow documentation
  dependencies:
  - engine-runner-observability-binding
  acceptance_criteria:
  - id: AC-1
    text: The new test suites cover normal runs, resume append behavior, raw output
      refs, provider usage capture, static graph writing, and workflow GitTracking
      deprecation handling.
  - id: AC-2
    text: Architecture and authoring docs state that runtime git tracking and tracing
      are enabled by default and that workflows do not need GitTracking or Tracing
      for normal observability.
  - id: AC-3
    text: Tests that do not initialize git opt out explicitly instead of weakening
      runtime defaults.
  - id: AC-4
    text: Tests assert failure-before-workspace-creation on dirty repos and cover
      both resume git-tracking config mismatch directions, including warning persistence
      in run.json.
  deliverables:
  - Dedicated runtime observability test files and updated existing tests
  - Updated architecture and authoring docs
  - Updated doc baseline assertions if needed
  risks:
  - Existing tests may silently rely on the old no-git default.
  - Docs can drift from implementation if written before final interfaces settle.
  rollback:
  - Keep docs/tests changes isolated so behavior rollbacks do not leave stale assertions
    behind.
