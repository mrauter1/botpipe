phases:
- phase_id: workflow-lifecycle-helpers
  title: Add Workflow Lifecycle Helpers
  objective: Introduce a small authoring-level helper seam for deterministic workflow
    bootstrap and publication work, then migrate the shipped builder and release packages
    to it without changing their public behavior.
  status: planned
  in_scope:
  - Add a helper module under stdlib/ for session opening, workflow-local JSON writes,
    invocation-contract writing, and publication-receipt writing.
  - Migrate workflows/workflow_idea_to_workflow_package/workflow.py and workflows/release_candidate_to_go_no_go/workflow.py
    to the shared helper seam.
  - Document the helper boundary in docs/authoring.md as optional authoring support
    rather than runtime-owned automation.
  - Run targeted regression coverage for the migrated builder and release packages.
  out_of_scope:
  - New runtime-owned hidden sequencing in core/engine.py, runtime/runner.py, or runtime/cli.py.
  - A new step type, workflow DSL, or prompt front-matter control surface.
  - Recursive wrapper/template cleanup unless implementation intentionally expands
    scope.
  - Child-workflow composition machinery.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: A shared stdlib lifecycle helper exists and the shipped builder and release
      packages can use it without changing their artifact names, routes, or receipt
      semantics.
  - id: AC-2
    text: The helper remains authoring-level only and does not widen the runtime-injected
      control contract beyond expected_output_schema, available_routes, and route_contracts.
  - id: AC-3
    text: Targeted regression tests for the builder and release packages still pass
      under the repo-local .venv pytest.
  deliverables:
  - Shared lifecycle helper code under stdlib/ plus any required export wiring.
  - Migrated builder and release workflow files using the shared helper seam.
  - Authoring docs updates describing the helper boundary and usage.
  risks:
  - The helper may accidentally hide workflow semantics if it grows beyond deterministic
    file IO and session bootstrap.
  - Migrating shipped packages may change receipt payloads or artifact handling if
    compatibility is not preserved exactly.
  rollback:
  - Revert helper adoption in the shipped packages first if their runtime proofs regress.
  - Remove the helper module entirely if it cannot stay additive and explicit.
- phase_id: incident-hardening-program-package
  title: Ship Incident Hardening Workflow
  objective: Implement the end-to-end workflow package incident_to_hardening_program
    with explicit prompts, artifact-first contracts, route grammar, and runtime proof.
  status: planned
  in_scope:
  - Create workflows/incident_to_hardening_program/ with workflow.py, workflow.toml,
    __init__.py, params.py, contracts.py, prompts/, and assets/.
  - Define explicit framing, evidence, hypothesis-ranking, and hardening-program work
    items with deterministic bootstrap and publish edges.
  - Add workflow-local docs under docs/workflows/incident_to_hardening_program.md.
  - Add a scripted-provider runtime test proving discovery, compilation, legal route
    flow, terminal artifacts, and incident_receipt.json creation.
  - Use the shared lifecycle helper rather than duplicating bootstrap and publication
    logic.
  out_of_scope:
  - Authoring security_finding_to_verified_remediation in the same cycle.
  - Extracting child sub-workflows for evidence or analysis composition.
  - Full recursive wrapper/template remediation unless it is intentionally added to
    scope later.
  dependencies:
  - workflow-lifecycle-helpers
  acceptance_criteria:
  - id: AC-1
    text: The repository contains a discoverable incident_to_hardening_program package
      with explicit prompts, route contracts, parameters, and artifact contracts.
  - id: AC-2
    text: The workflow produces a durable incident hardening package and deterministic
      incident_receipt.json rather than only free-form prose.
  - id: AC-3
    text: Workflow-specific runtime proof passes and demonstrates legal route flow
      plus creation of the declared terminal artifacts.
  deliverables:
  - New workflow package files under workflows/incident_to_hardening_program/.
  - Workflow documentation under docs/workflows/incident_to_hardening_program.md.
  - Workflow-specific runtime test coverage for incident_to_hardening_program.
  risks:
  - The workflow may sprawl if evidence, analysis, and hardening boundaries are not
    kept explicit.
  - Weak or missing workspace evidence could produce false confidence unless prompts
    and verifier routes treat gaps as blockers or replans.
  rollback:
  - Remove the incident workflow package, its docs, and its test file if the workflow
    cannot be verified safely.
  - Keep the shared lifecycle helper only if it remains proven by the shipped builder
    and release packages.
- phase_id: proof-docs-and-recursive-memory
  title: Close With Proof And Memory
  objective: Run targeted validation, update workflow docs and standing recursive
    memory, and record the chosen direction plus any explicit residual risk.
  status: planned
  in_scope:
  - Run the targeted validation set for stdlib helper reuse, builder and release regressions,
    the new incident workflow, and baseline docs.
  - Update .autoloop_recursive/framework_evolution_charter.md, framework_roadmap.md,
    framework_gap_ledger.md, and workflow_candidate_ledger.md with the incident workflow
    choice, the lifecycle-helper improvement, and the next deferred candidates.
  - Record compatibility notes, rollback-safe residuals, and non-obvious decisions
    in plan feedback and shared decisions.
  - If implementation intentionally edits recursive_autoloop/, rerun the targeted
    recursive package-cli tests and document the result explicitly.
  out_of_scope:
  - Claiming full recursive wrapper/template parity if recursive_autoloop/ remains
    untouched.
  - Unrelated repository cleanup.
  - Editing verifier-owned criteria.md.
  dependencies:
  - incident-hardening-program-package
  acceptance_criteria:
  - id: AC-1
    text: The targeted validation set passes under .venv/bin/pytest, or any unchanged
      pre-existing residual is explicitly documented as out of scope.
  - id: AC-2
    text: Standing recursive memory records that the builder remains credible, incident_to_hardening_program
      shipped this cycle, security_finding_to_verified_remediation remains deferred,
      and lifecycle helpers were the chosen framework improvement.
  - id: AC-3
    text: The final scoped diff remains limited to the helper seam, migrated shipped
      workflows, the new incident package, targeted docs/tests, task artifacts, and
      required recursive memory updates.
  deliverables:
  - Validation evidence and closeout notes for the helper seam and the new incident
    workflow.
  - Updated recursive memory files under .autoloop_recursive/.
  - Updated task-local feedback and shared decisions capturing the selected direction
    and explicit residual risk.
  risks:
  - Known recursive wrapper/template failures may still appear if broader package-cli
    suites are run without intentionally fixing recursive_autoloop/.
  - Recursive memory may preserve stale repo-layout guidance unless the touched files
    are updated deliberately.
  rollback:
  - Keep proof scoped to targeted suites and document any untouched recursive residual
    explicitly.
  - Revert memory-only wording changes that overclaim behavior not actually validated.
