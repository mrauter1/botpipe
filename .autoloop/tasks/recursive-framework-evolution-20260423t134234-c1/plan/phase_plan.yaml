phases:
- phase_id: step-control-contracts
  title: Add Step Control Contracts
  objective: Introduce additive step-owned control-contract metadata and runtime/provider
    plumbing without changing existing workflow behavior or widening the public CLI.
  status: planned
  in_scope:
  - Add strict-kernel support for expected_output_schema and route_contracts on workflow
    steps.
  - Derive available_routes mechanically from compiled transitions and legal global
    routes.
  - Pass the narrow control contract through engine and provider request objects.
  - Add validation and regression coverage for additive behavior.
  out_of_scope:
  - Implementing real Codex or Claude provider adapters.
  - Adding hidden runner heuristics or a new provider-facing packet abstraction.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: Strict workflows can declare narrow control contracts and compiled steps
      expose them without altering transition semantics.
  - id: AC-2
    text: Engine and provider request plumbing carry expected_output_schema, available_routes,
      and route_contracts mechanically while existing autoloop_v1 behavior remains
      intact.
  deliverables:
  - Updated core/runtime/provider code for additive step control contracts.
  - Targeted unit, contract, and runtime regression tests for the new control-contract
    surface.
  risks:
  - Provider request model changes may break fake-provider tests if they are not kept
    additive.
  - Route drift is possible if available_routes is duplicated instead of derived.
  rollback:
  - Revert the additive step-control fields and restore prior request-model shapes
    if regression scope expands.
- phase_id: workflow-builder-package
  title: Ship Workflow Builder
  objective: Implement the new workflow-builder package `workflow_idea_to_workflow_package`
    with explicit prompts, artifact contracts, route grammar, and verification flow.
  status: planned
  in_scope:
  - Create the new workflow package under workflows/ with manifest, workflow class,
    prompt files, and local contract helpers.
  - Make the workflow compare candidate additions, author a package, verify it, and
    emit promotion and rollback artifacts.
  - Reuse existing package conventions and the current scaffold contract instead of
    inventing a hidden generator layer.
  - Add workflow-specific docs and targeted package tests.
  out_of_scope:
  - Authoring additional domain workflows in the same cycle.
  - Generalizing package promotion into a new runtime subsystem.
  dependencies:
  - step-control-contracts
  acceptance_criteria:
  - id: AC-1
    text: The repository contains a discoverable `workflow_idea_to_workflow_package`
      package with explicit producer/verifier prompts and a concrete route grammar.
  - id: AC-2
    text: The workflow design makes deterministic responsibilities, provider-owned
      cognition, artifact paths, and rework versus replan behavior explicit.
  - id: AC-3
    text: Targeted tests or scripted-provider exercises prove the package can be compiled
      and exercised.
  deliverables:
  - New workflow package files under workflows/workflow_idea_to_workflow_package/.
  - Workflow-specific docs and targeted tests covering discovery, compile, and exercised
    behavior.
  - Explicit workflow-scope verification, promotion, and rollback artifact definitions.
  risks:
  - Direct repo generation may leave partial package files after a failed build step.
  - The workflow may drift into prompt-only behavior if control contracts are not
    used consistently.
  rollback:
  - Remove the new workflow package, docs, and tests and keep only the additive kernel
    changes if the package cannot be verified safely.
- phase_id: proof-docs-and-memory
  title: Close With Proof And Memory
  objective: Collect final evidence, document the chosen and deferred directions,
    and update recursive memory so later cycles inherit the correct roadmap and gap
    history.
  status: planned
  in_scope:
  - Run the targeted validation suite and capture the final proof surface.
  - Update architecture or authoring docs only where the new control-contract surface
    must be made explicit.
  - Update .autoloop_recursive roadmap, gap, and candidate ledgers with chosen and
    deferred items.
  - Record non-obvious decisions and compatibility notes needed by later cycles.
  out_of_scope:
  - Unrelated repository cleanup.
  - Broad retrospective edits to earlier cycle artifacts.
  dependencies:
  - workflow-builder-package
  acceptance_criteria:
  - id: AC-1
    text: Targeted validation passes or the residual failures are explicitly documented
      with rollback-safe disposition.
  - id: AC-2
    text: Docs and recursive memory clearly record the chosen addition, chosen framework
      improvement, deferred candidates, and open gaps.
  - id: AC-3
    text: The final change set remains scoped to additive kernel files, the new workflow
      package, targeted tests and docs, and recursive memory.
  deliverables:
  - Validation evidence and any required doc updates.
  - Updated recursive memory files under .autoloop_recursive/.
  - Shared decision records and task-local feedback capturing what changed and why.
  risks:
  - Large unrelated worktree churn could make final verification noisy.
  - Doc updates may accidentally preserve stale src/autoloop path references if not
    corrected deliberately.
  rollback:
  - Keep the implemented package and kernel changes only if proof is clean enough
    to support them; otherwise revert the new package and document the remaining gap.
