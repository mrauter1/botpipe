phases:
- phase_id: stabilize-operation-replay-keys
  title: Stabilize Operation Replay Keys
  objective: Update replay-key allocation and replay-store loading so incidental callsite
    source-location changes trigger fingerprint mismatch handling instead of silent
    cache misses, while discarding incompatible v1 replay records.
  status: planned
  in_scope:
  - Bump the operation replay schema from v1 to v2 in `autoloop/core/schema_registry.py`.
  - Remove `callsite` from `_next_occurrence()` and `_operation_replay_key()` signatures
    and payloads in `autoloop/core/operations.py`.
  - Update `_run_operation()` to use the narrowed helpers while keeping `callsite`
    in fingerprint generation and stored replay records.
  - Add a named replay-store migrator and make `_load_replay_store()` discard any
    non-v2 replay records before validation while preserving list-shaped attempts
    history.
  - Validate the change with targeted replay contract tests and grep-based call-site
    checks.
  out_of_scope:
  - Changing public operation helper signatures such as `llm_call`, `classify_call`,
    or `execute_step_operation`.
  - Changing `_discover_callsite()` behavior.
  - Solving replay instability for inserted, removed, or reordered same-kind operations
    within a step.
  - Changing shared `validate_persisted_schema()` semantics beyond the schema constant
    bump.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: '`OPERATION_REPLAY_SCHEMA` is `"autoloop.operation_replay/v2"`, and `_load_replay_store()`
      converts schemaless or explicit v1/non-v2 replay payloads into a v2-shaped store
      that drops `records`, preserves list-shaped `attempts`, and does not raise on
      explicit v1 schema.'
  - id: AC-2
    text: '`_next_occurrence()` takes only `runtime` and `operation_kind`, `_operation_replay_key()`
      takes only `runtime`, `operation_kind`, and `occurrence`, and `_run_operation()`
      still computes `callsite_id` and passes it to `_operation_fingerprint()`.'
  - id: AC-3
    text: Replay-key uniqueness remains scoped by workflow, step, visit, operation
      kind, and occurrence index, so multiple same-kind callsites in one step cannot
      collide after `callsite` is removed from the key.
  - id: AC-4
    text: Existing replay mismatch warn/fail behavior remains intact for fingerprint
      differences, and repo-wide grep confirms there are no other runtime call sites
      for `_next_occurrence()` or `_operation_replay_key()` outside `_run_operation()`.
  deliverables:
  - Updated replay schema constant with explicit v2 compatibility semantics.
  - Narrowed occurrence-counter and replay-key helpers plus `_run_operation()` call-site
    updates.
  - Named replay-store migrator and pre-validation non-v2 discard path in `_load_replay_store()`.
  - Validation evidence covering replay mismatch behavior, v1 discard handling, and
    helper call-site scope.
  risks:
  - A half-applied helper change could create replay-key collisions for multiple same-kind
    callsites in one step.
  - Migration applied only through the validator would still reject explicit v1 payloads.
  - Removing `callsite` from the fingerprint by mistake would suppress intended mismatch
    signaling.
  rollback:
  - Revert the schema bump, helper signature changes, and replay-store migration behavior
    together if replay reuse semantics regress.
  - Do not widen shared schema-validator behavior as a rollback shortcut; keep rollback
    local to operation replay handling.
