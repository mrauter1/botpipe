phases:
- phase_id: resolver-foundation
  title: Resolver Foundation
  objective: Add the unified workflow-reference execution path and the contract tests
    needed to ship single-file, flow.py, module, class, and directory workflow refs
    safely.
  status: planned
  in_scope:
  - Add tests and fixtures for single-file workflows, flow.py packages, explicit file
    refs, explicit directory refs, module/class refs, ambiguity errors, and prompt-resolution
    behavior.
  - Introduce the internal workflow-reference/origin model plus isolated import helpers
    used by runtime resolution.
  - Refactor runtime loader, runner, workspace metadata, and context so execution
    uses resolved origin metadata and exposes ctx.root.
  - Update unnamed workflow fallback naming to snake_case and add regression coverage
    for canonical workflow identity.
  out_of_scope:
  - Shallow catalog discovery and capability-snapshot payload migration.
  - Scaffold/builder shape generation.
  - Canonical docs and recursive-template rewrites.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: autoloop run resolves canonical names, aliases, file refs, directory refs,
      module refs, and imported workflow classes through one resolver path.
  - id: AC-2
    text: Single-file and flow.py workflows run with prompt paths resolved relative
      to their source container and without requiring workflow.toml.
  - id: AC-3
    text: Run and workflow metadata persist origin details and stdlib helpers can
      access the repo root via ctx.root instead of package-folder heuristics.
  - id: AC-4
    text: Ambiguous file refs and workflow-name collisions fail with clear errors
      instead of merging run history.
  deliverables:
  - Unified runtime workflow resolver with isolated file-import support.
  - New resolver/runtime fixtures and regression tests.
  - Context and workspace metadata updates for workflow origin tracking.
  risks:
  - Changing workflow identity defaults can break tests that implicitly relied on
    raw class names.
  - Incorrect origin metadata can make resume/log commands target the wrong workflow
    history.
  rollback:
  - Revert the unified resolver and restore package-only resolution if origin tracking
    or ambiguity handling proves unstable.
  - Remove ctx.root additions if they are not yet consumed and restore existing context
    serialization.
- phase_id: catalog-and-helper-migration
  title: Catalog And Helper Migration
  objective: Make shallow discovery and deep inspection authoring-shape-aware, then
    migrate stdlib helper payloads and consumers off package-only assumptions.
  status: planned
  in_scope:
  - Refactor core.workflow_catalog to scan manifests plus inferred flow.py, workflow.py,
    and top-level .py workflows without importing modules.
  - Refactor core.workflow_capabilities to deep-inspect through the unified resolver,
    including generalized parameter lookup order and non-package path inspection.
  - Update stdlib helper seams to use ctx.root and tolerate optional manifest/spec/doc/prompt/asset/test
    surfaces.
  - Preserve metadata-only workflow.toml validation and add negative tests for semantic
    manifest fields.
  out_of_scope:
  - Scaffold and builder generation changes.
  - Canonical docs prose updates except where helper payload names must be documented
    for tests.
  dependencies:
  - resolver-foundation
  acceptance_criteria:
  - id: AC-1
    text: workflows list discovers manifest-backed and inferred workflows without
      importing workflow modules.
  - id: AC-2
    text: Deep inspection reports steps, parameters, prompts, route contracts, source
      path, package dir, authoring shape, and optional support-file paths for each
      supported shape.
  - id: AC-3
    text: Portfolio/adaptation/refinement/decomposition/company/evaluation/diagnostics
      helpers work for package and single-file workflows without inferring repo roots
      from package-folder layout.
  - id: AC-4
    text: workflow.toml continues to reject semantic fields and remains metadata-only.
  deliverables:
  - Generalized catalog and capability inspection seams.
  - Updated stdlib helper payload schemas and consumer tests.
  - Manifest-validation regression coverage.
  risks:
  - Helper JSON schema drift can break in-repo workflows and tests that parse legacy
    package-only fields.
  - Directory scanning can introduce ambiguity or import side effects if candidate
    ordering is not deterministic.
  rollback:
  - Revert helper payload changes together with catalog/capability changes if downstream
    workflows cannot consume the new metadata safely.
  - Restore manifest-only discovery temporarily if inferred scanning causes unstable
    catalog results.
- phase_id: authoring-support-and-builder
  title: Authoring Support And Builder
  objective: Ship the optional validation/contract helper seams plus the new scaffold
    and workflow-builder output shapes required by the flow-first doctrine.
  status: planned
  in_scope:
  - Add stdlib validation, JSON artifact, and route-contract helper modules and export
    them from stdlib only.
  - Update autoloop init workflow to support single, flow-specs, and package shapes
    with flow-specs as the default.
  - Keep scaffold output rooted under <root>/workflows/ while generating <name>.py
    or <name>/... depending on shape.
  - Update workflow_idea_to_workflow_package artifacts, prompts, checklists, contracts,
    and tests to emit the new supported shapes and stop requiring package-only clutter.
  out_of_scope:
  - Recursive-template wording refresh beyond builder-specific prompts.
  - Broad workflow-by-workflow authoring refactors outside the builder/scaffold surfaces.
  dependencies:
  - catalog-and-helper-migration
  acceptance_criteria:
  - id: AC-1
    text: stdlib exposes reusable validation and route-contract helpers without widening
      the root workflow shim.
  - id: AC-2
    text: autoloop init workflow generates single, flow-specs, and package layouts
      under workflows/ with flow-specs as the default.
  - id: AC-3
    text: workflow_idea_to_workflow_package can generate flow-first outputs that compile
      and no longer require workflow.toml, prompts/, assets/, params.py, or contracts.py
      unless the chosen shape needs them.
  - id: AC-4
    text: Builder and scaffold tests cover each output shape and compile the generated
      workflows.
  deliverables:
  - New stdlib helper modules for validation and route-contract reuse.
  - Updated init-workflow CLI scaffolder.
  - Updated workflow builder package, prompts, and runtime tests.
  risks:
  - Builder prompts or checklists can retain stale package-only assumptions and generate
    invalid outputs.
  - Changing scaffold defaults can break tests or scripts that assumed workflow.py
    plus workflow.toml as the minimum.
  rollback:
  - Revert the new shapes and restore the previous scaffold contract if generated
    outputs fail to compile reliably.
  - Disable builder shape switching temporarily if only one shape remains production-ready.
- phase_id: docs-templates-and-regression
  title: Docs, Templates, And Regression Sweep
  objective: Make docs/ the canonical authoring surface, refresh recursive templates,
    and close the task only after targeted and full regression validation pass.
  status: planned
  in_scope:
  - Create or update docs/architecture.md, docs/authoring.md, and relevant docs/workflows/*.md
    content for the new authoring doctrine.
  - Update recursive_autoloop templates and CLI-facing wording to remove package-only
    minimum-structure claims.
  - Update workflows show/list help text and any baseline-doc tests to match the flexible
    authoring model.
  - Run targeted suites first, then the full test suite, and fix regressions before
    completion.
  out_of_scope:
  - Removing legacy_docs/ entirely.
  - Migrating every existing workflow package to flow.py/specs.py unless readability
    gains justify a specific follow-up.
  dependencies:
  - authoring-support-and-builder
  acceptance_criteria:
  - id: AC-1
    text: Canonical docs under docs/ describe single-file, flow-specs, and package
      authoring while preserving the metadata-only workflow.toml doctrine.
  - id: AC-2
    text: Recursive templates and CLI help no longer claim workflow.py, workflow.toml,
      prompts/, and assets/ are mandatory minimums.
  - id: AC-3
    text: Targeted runtime/unit/doc suites and the full test suite pass after the
      implementation.
  - id: AC-4
    text: No intentional behavior break remains undocumented in plan.md, feedback.md,
      or decisions.txt.
  deliverables:
  - Canonical docs/ authoring and architecture documentation.
  - Updated recursive templates and doc-baseline tests.
  - Regression test run results with fixes applied.
  risks:
  - Leaving docs split between docs/ and legacy_docs/ can reintroduce drift immediately
    after implementation.
  - Late-stage doc/test updates can mask unresolved runtime regressions if validation
    is not run after the final wording changes.
  rollback:
  - Restore the previous docs/template wording if the implementation is deferred and
    the code contract has not yet changed.
  - Back out doc/test assertions together with any reverted runtime changes to keep
    the contract consistent.
