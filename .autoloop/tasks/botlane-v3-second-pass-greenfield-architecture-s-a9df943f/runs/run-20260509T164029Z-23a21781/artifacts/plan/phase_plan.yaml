phases:
- phase_id: route-authority-cutover
  title: Make WorkflowPlan Sole Route Authority
  objective: Remove step-plan route ownership and make runtime plus inspection route
    views derive only from WorkflowPlan routes.
  status: planned
  in_scope:
  - Remove `_route_table` and `_effective_route_table` ownership from step-plan variants
    and update compiler outputs accordingly.
  - Rewire engine route lookup, provider-contract route exports, static-graph generation,
    CLI inspection, and workflow capability exports to consume `WorkflowPlan.routes`
    and `WorkflowPlan.global_routes` directly.
  - Preserve step-local effective routes and global-route fallback behavior exactly
    as observed today.
  - Add strictness or contract checks that maintained sources do not reintroduce step-owned
    route tables.
  out_of_scope:
  - Changing public route semantics, visible route sets, or artifact/input behavior.
  - Collapsing SDK one-step execution or service-boundary ownership in this phase.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: No maintained step-plan variant owns a private route table, and runtime
      route lookup resolves through WorkflowPlan data only.
  - id: AC-2
    text: Static-graph, CLI, and capability route views still report the same available,
      runtime-control, and provider-visible routes while deriving them from WorkflowPlan.
  - id: AC-3
    text: Strictness coverage fails if `_route_table` or equivalent copied route ownership
      is reintroduced.
  deliverables:
  - Route-authority refactor across compiler, step plans, engine route helpers, and
    inspection surfaces.
  - Updated route-focused unit/runtime/strictness coverage.
  risks:
  - One inspection surface could keep falling back to copied step data and silently
    drift from WorkflowPlan.
  - Global-route fallback could regress if consumers merge step and global routes
    inconsistently.
  rollback:
  - Revert the route-authority slice as one change if route-view parity or lookup
    behavior regresses.
  - Do not leave mixed WorkflowPlan and step-owned route authorities in place.
- phase_id: execution-services-cutover
  title: Remove Engine Reach-Through From Collaborators
  objective: Finish the service-boundary cutover so collaborators depend on narrow
    services and compiled plan data instead of Engine private methods.
  status: planned
  in_scope:
  - Expand `ExecutionServices` to cover the narrow runtime capabilities collaborators
    actually need without accepting `Engine`.
  - Reconstruct `StepDispatcher`, `ProviderContractBuilder`, `BranchGroupRuntime`,
    route finalization, hook execution, and child-workflow invocation around services
    instead of `Engine`.
  - Keep `Engine` as the orchestration and composition root only.
  - Add direct strictness or AST checks that collaborators no longer store `Engine`
    or call `Engine._*`.
  out_of_scope:
  - Changing provider behavior, hook semantics, checkpoint semantics, or branch-group
    scheduling.
  - Introducing a renamed god object through `ExecutionServices`.
  dependencies:
  - route-authority-cutover
  acceptance_criteria:
  - id: AC-1
    text: Execution collaborators required by the request no longer receive or retain
      `Engine`, and their runtime behavior remains contract-compatible.
  - id: AC-2
    text: No service method accepts `Engine`, and no maintained collaborator calls
      `Engine` private helpers.
  - id: AC-3
    text: Execution-service and branch/runtime contract tests stay green after the
      boundary cutover.
  deliverables:
  - Expanded Engine-free execution service interfaces and concrete wiring.
  - Collaborator constructor and call-site refactors across engine, collaborators,
    and branch runtime.
  - Strictness coverage preventing Engine reach-through regressions.
  risks:
  - A piecemeal migration can break provider/session/handoff behavior before all collaborators
    are moved.
  - Over-broad services can recreate Engine as a renamed dependency hub.
  rollback:
  - Rollback the collaborator rewiring together with the matching service-interface
    expansion if provider or branch behavior regresses.
  - Do not keep a hybrid model where some collaborators still depend on Engine and
    others on services.
- phase_id: canonical-single-step-and-finalization
  title: Collapse One-Step Execution And Duplicate Finalization
  objective: Use one canonical SDK one-step architecture and remove duplicate transition
    state from StepExecutionResult while preserving public behavior.
  status: planned
  in_scope:
  - Collapse `Botlane.step(...)` and related helpers to one executable one-step `WorkflowPlan`
    path.
  - Delete the alternate dual-plan builder path and keep only minimal derived single-step
    metadata if tests still need an inspection object.
  - Remove `transition` from `StepExecutionResult` and update branch-group and engine
    consumers to use canonical route-decision data.
  - Preserve `RunResult.last_transition` and runtime/workspace `finalization` payloads
    by deriving them at the engine boundary.
  - Finish with full pytest green and strictness coverage against reintroducing the
    dual architecture.
  out_of_scope:
  - Changing public SDK signatures, return shapes, retention behavior, or persisted
    run metadata.
  - Changing `botlane.__all__`, `botlane.core.__all__`, or `.botlane` identity.
  dependencies:
  - route-authority-cutover
  - execution-services-cutover
  acceptance_criteria:
  - id: AC-1
    text: '`Botlane.step(...)` compiles and executes one canonical one-step architecture
      while preserving typed input, params, explicit routes, policy layering, and
      provider-question behavior.'
  - id: AC-2
    text: '`StepExecutionResult` carries canonical route-decision data only, and internal
      consumers no longer depend on a duplicate transition/finalization field.'
  - id: AC-3
    text: Public `RunResult.last_transition` and persisted runtime `finalization`
      payloads remain unchanged in shape and behavior.
  - id: AC-4
    text: The full pytest suite passes after the architecture cleanup.
  deliverables:
  - Canonical one-step SDK builder/execution path.
  - Finalization-data cleanup across engine, branch runtime, and runner/workspace
    metadata.
  - Updated SDK, branch-result, runtime-metadata, and strictness coverage.
  risks:
  - Removing the duplicate plan path can regress SDK parity if typed input, params,
    or explicit-route lowering depends on hidden builder behavior.
  - Removing `transition` can silently break branch-runtime status mapping or persisted
    metadata if replacement derivation is incomplete.
  rollback:
  - Revert the SDK builder collapse and finalization cleanup together if parity or
    runtime metadata changes.
  - Do not leave both dual one-step builders or both finalization representations
    alive after rollback.
