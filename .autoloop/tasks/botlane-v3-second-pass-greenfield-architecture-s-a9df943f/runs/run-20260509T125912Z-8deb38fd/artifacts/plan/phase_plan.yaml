request_snapshot_ref: /home/rauter/autoloop_v3_bkp/autoloop_v3/.autoloop/tasks/botlane-v3-second-pass-greenfield-architecture-s-a9df943f/runs/run-20260509T125912Z-8deb38fd/request.md
phases:
  - phase_id: "public-freeze"
    title: "Public Freeze"
    objective: "Lock the existing Botlane public surface, SDK signatures, and identity invariants before internal rewrites begin."
    status: "planned"
    in_scope:
      - "Add dedicated public-surface tests for botlane.__all__, botlane.core.__all__, and current botlane.core.branch_groups.__all__ behavior."
      - "Freeze Botlane.run and Botlane.step signatures plus .botlane persistence and botlane_optimizer identity."
    out_of_scope:
      - "Internal compiler or runtime rewrites."
    dependencies: []
    acceptance_criteria:
      - id: "AC-1"
        text: "Dedicated freeze tests assert the current root and core exports exactly and document the current branch-group export surface."
      - id: "AC-2"
        text: "SDK signature and persisted identity tests fail on behavior drift before later phases start."
    deliverables:
      - "tests/unit/test_public_surface.py"
      - "Updated SDK and identity freeze tests"
    risks:
      - "Existing tests already mix public freeze and authoring behavior; extraction may miss current coverage if done mechanically."
    rollback:
      - "Revert only the new freeze assertions if they misstate today's public contract."
  - phase_id: "canonical-type-hardening"
    title: "Canonical Type Hardening"
    objective: "Finish the target internal plan/runtime dataclass shapes without exposing them publicly."
    status: "planned"
    in_scope:
      - "Correct WorkflowPlan, StepHeader, StepSource, ProviderTurnPlan, ArtifactId, ArtifactSpec, ExecutionServices, BranchResult, BranchManifest, and ReferenceGraph field layouts."
      - "Keep all canonical plan/runtime types internal and preserve current public exports."
    out_of_scope:
      - "Removal of compiled compatibility objects."
    dependencies:
      - "public-freeze"
    acceptance_criteria:
      - id: "AC-1"
        text: "Canonical internal modules define the target shapes required by the spec, even if runtime consumers are not cut over yet."
      - id: "AC-2"
        text: "No new plan/runtime types leak into botlane.__all__, botlane.core.__all__, or botlane.core.branch_groups.__all__."
    deliverables:
      - "Updated botlane/core/workflow_plan.py"
      - "Updated botlane/core/step_plans.py"
      - "Updated botlane/core/route_contracts.py and related canonical type modules"
    risks:
      - "Partial type updates can create a second unofficial representation if runtime consumers start depending on them early."
    rollback:
      - "Revert any shape change that forces unfinished plan types into live runtime paths."
  - phase_id: "atomic-plan-runtime-cutover"
    title: "Atomic Plan Runtime Cutover"
    objective: "Switch compiler and runtime to WorkflowPlan, StepPlan, RouteContract, and RouteAction in one incompatible internal cutover."
    status: "planned"
    in_scope:
      - "Rewrite compile_workflow(...) to return WorkflowPlan and replace _COMPILED_WORKFLOW_CACHE with _WORKFLOW_PLAN_CACHE."
      - "Delete Compiled* classes, compile_workflow_plan(...), plan_adapters.py, _compiled_step backrefs, and original_step plan fields."
      - "Retarget engine, engine collaborators, branch runtime entry points, SDK, runtime loader/runner/static_graph/tracing/provider policy resolver, workflow capabilities, and parity helpers."
      - "Remove compiled branch exports from botlane.core.branch_groups.__all__."
    out_of_scope:
      - "Full placeholder centralization beyond the cutover needed to stop runtime reparsing."
    dependencies:
      - "canonical-type-hardening"
    acceptance_criteria:
      - id: "AC-1"
        text: "compile_workflow(...) returns WorkflowPlan and no Compiled* symbol or adapter layer remains in botlane/core."
      - id: "AC-2"
        text: "Engine, StepDispatcher, and RouteFinalizer execute StepPlan variants and RouteDecision/RouteAction directly."
      - id: "AC-3"
        text: "botlane.core.branch_groups.__all__ no longer exports compiled branch specs and does not export internal plan/result types."
    deliverables:
      - "Rewritten botlane/core/compiler.py"
      - "Updated botlane/core/engine.py and botlane/core/engine_collaborators.py"
      - "Removal of botlane/core/plan_adapters.py and compiled dataclasses"
      - "Updated SDK and runtime consumers of workflow compilation"
    risks:
      - "This is the highest-regression phase because almost every workflow execution path currently imports compiled types."
      - "A mixed compiled-plan runtime is not supportable and will leave the suite in an inconsistent state mid-phase."
    rollback:
      - "Roll back the entire cutover if any compiled-plan bridge survives or if engine/runtime consumers diverge."
  - phase_id: "execution-frame-authority"
    title: "ExecutionFrame Authority"
    objective: "Make ExecutionFrame the sole mutable runtime store while preserving the public Context facade."
    status: "planned"
    in_scope:
      - "Remove WeakKeyDictionary sidecar state and context_runtime(...) mutation helpers."
      - "Move branch/fan-in child-context creation and worklist/session/state mutation onto ExecutionFrame-backed paths."
    out_of_scope:
      - "Public Context API redesign."
    dependencies:
      - "atomic-plan-runtime-cutover"
    acceptance_criteria:
      - id: "AC-1"
        text: "Context public properties read from ExecutionFrame or narrow services only."
      - id: "AC-2"
        text: "Branch and fan-in child contexts are created through ExecutionFrame.child_for_branch(...) and child_for_fan_in(...)."
    deliverables:
      - "Updated botlane/core/context.py"
      - "Updated frame-backed context helpers and callers"
    risks:
      - "The current sidecar API is used broadly by worklists, providers, engine collaborators, and tests."
    rollback:
      - "Revert frame-authority changes if Context loses parity with existing public state access."
  - phase_id: "branch-typed-evidence"
    title: "Branch Typed Evidence"
    objective: "Complete the branch runtime cutover so typed BranchResult and BranchManifest are authoritative internally."
    status: "planned"
    in_scope:
      - "Return BranchResult from branch runtime helpers and only serialize at manifest/file boundaries."
      - "Make build_branch_manifest(...) return BranchManifest and preserve schema botlane.branch_results/v1."
      - "Update outcome selection and branch context rendering to operate on typed manifest data."
    out_of_scope:
      - "Changes to the public branch evidence JSON schema."
    dependencies:
      - "execution-frame-authority"
    acceptance_criteria:
      - id: "AC-1"
        text: "Branch runtime no longer stores branch results as dicts internally."
      - id: "AC-2"
        text: "Only BranchResult.to_manifest_dict() and BranchManifest.to_dict() serialize branch evidence."
    deliverables:
      - "Updated botlane/core/branch_groups/runtime.py"
      - "Updated botlane/core/branch_groups/manifest.py and results.py"
    risks:
      - "Fail-fast cancellation and fan-in evidence formatting are easy to regress during typing cleanup."
    rollback:
      - "Revert if manifest JSON shape or branch cancellation semantics change."
  - phase_id: "placeholder-reference-graph"
    title: "Placeholder And Reference Graph"
    objective: "Centralize placeholder parsing and make ReferenceGraph the compiler-owned source of inferred reads."
    status: "planned"
    in_scope:
      - "Remove duplicate placeholder parsing/rendering logic from artifacts.py and related runtime paths."
      - "Attach ReferenceGraph to WorkflowPlan and validate all supported placeholder surfaces from one parser."
    out_of_scope:
      - "Any new placeholder syntax beyond the current supported surfaces."
    dependencies:
      - "branch-typed-evidence"
    acceptance_criteria:
      - id: "AC-1"
        text: "artifacts.py retains only thin delegates and no duplicate parser helpers."
      - id: "AC-2"
        text: "ReferenceGraph covers prompt refs, artifact template refs, inferred artifact reads, step output refs, branch refs, fan_in refs, and worklist refs."
    deliverables:
      - "Updated botlane/core/placeholders.py"
      - "Updated botlane/core/reference_graph.py and related compiler wiring"
    risks:
      - "Placeholder coverage spans prompt, artifact, worklist, branch, fan-in, and runtime-template surfaces with slightly different current behavior."
    rollback:
      - "Revert if any supported placeholder surface loses parity or if runtime error wording materially regresses."
  - phase_id: "provider-turn-cutover"
    title: "Provider Turn Cutover"
    objective: "Make provider-backed prompt and produce/verify steps run only through ProviderTurnPlan and the existing provider transport boundary."
    status: "planned"
    in_scope:
      - "Use ProviderTurnPlan for prompt and pair execution without adapter fallback."
      - "Keep operations on a separate canonical runtime unless a full typed operation-turn migration is completed in the same phase."
    out_of_scope:
      - "Partial operation-turn migration that still depends on removed Compiled* types."
    dependencies:
      - "placeholder-reference-graph"
    acceptance_criteria:
      - id: "AC-1"
        text: "RenderedProviderTurn remains the transport input and ProviderTurnResult remains the transport output for prompt and produce/verify steps."
      - id: "AC-2"
        text: "Provider retry, raw-output persistence, session persistence, and usage aggregation remain unchanged."
    deliverables:
      - "Updated provider-step execution in engine collaborators"
      - "Updated provider turn plan tests and runtime provider regressions"
    risks:
      - "Provider execution and operation execution are intertwined today inside engine collaborators."
    rollback:
      - "Revert if provider-backed steps bypass the rendered transport boundary or if operations keep hidden compiled-type dependencies."
  - phase_id: "sdk-single-step-cutover"
    title: "SDK Single Step Cutover"
    objective: "Make SingleStepPlan the sole one-step execution architecture while preserving SDK semantics."
    status: "planned"
    in_scope:
      - "Remove synthetic workflow fallback paths and compile_workflow_plan(...) usage from Botlane.step(...)."
      - "Preserve route overrides, invocation-local policy behavior, pause/resume, retention, and StepResult passthrough semantics."
    out_of_scope:
      - "New public SDK parameters or behavior changes."
    dependencies:
      - "provider-turn-cutover"
    acceptance_criteria:
      - id: "AC-1"
        text: "There is exactly one one-step execution architecture and it is SingleStepPlan-based."
      - id: "AC-2"
        text: "Botlane.step(...) behavior matches existing contracts for prompt, pair, python, child workflow, and supported operations."
    deliverables:
      - "Updated botlane/sdk.py one-step execution path"
      - "Dedicated single-step contract coverage"
    risks:
      - "SDK one-step semantics touch policy layering, pause handling, and result wrapping at once."
    rollback:
      - "Revert if Botlane.step(...) diverges from the preserved public result and error contracts."
  - phase_id: "strictness-cleanup"
    title: "Strictness And Cleanup"
    objective: "Lock the rewrite in place with strictness scans, stale-identity checks, and a final full test run."
    status: "planned"
    in_scope:
      - "Add strictness tests for removed internal compatibility layers, core-runtime import boundaries, and Botlane identity."
      - "Remove adapter-era tests and legacy compatibility assertions that preserve deleted internals."
      - "Run the final full pytest suite."
    out_of_scope:
      - "Further architectural changes after the suite is green."
    dependencies:
      - "sdk-single-step-cutover"
    acceptance_criteria:
      - id: "AC-1"
        text: "Strictness tests fail on Compiled* symbols, plan adapters, compile_workflow_plan(...), _COMPILED_WORKFLOW_CACHE, _DirectRuntimeControl, RouteFinalizationResult, original_step, and stale identity strings."
      - id: "AC-2"
        text: "No core module imports botlane.runtime outside TYPE_CHECKING and the full pytest suite passes."
    deliverables:
      - "tests/strictness/test_no_internal_compat_layers.py"
      - "tests/strictness/test_core_runtime_boundary.py"
      - "tests/strictness/test_botlane_identity.py"
      - "Final green pytest run"
    risks:
      - "Repo-wide string scans can produce false positives if old names are still embedded in historical fixtures or transition tests."
    rollback:
      - "Fix invalid allowlists or scan roots only when the strictness rule conflicts with the spec; otherwise keep the rule and remove the offending code."
