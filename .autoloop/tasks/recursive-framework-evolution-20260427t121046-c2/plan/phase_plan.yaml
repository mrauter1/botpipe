phases:
- phase_id: selected-workflow-helper-convergence
  title: Shared Selected-Workflow Seam
  objective: Consolidate selected-workflow resolution and snapshot envelope writing
    behind one authoring-only helper seam without changing artifact schemas.
  status: planned
  in_scope:
  - Add a shared selected-workflow helper boundary for common repo-root resolution,
    selected_workflow_name capture, and envelope writing.
  - Rebase stdlib adaptation, refinement, decomposition, and diagnostics helpers on
    the shared seam while preserving current exported helper names and payload shapes.
  out_of_scope:
  - CLI, runtime/provider, or ctx.invoke_workflow behavior changes.
  - New workflow packages or workflow.toml semantic fields.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: One shared authoring-only helper owns common selected-workflow resolution
      and envelope fields for capability, authoring-surface, decomposition-surface,
      and run-history artifacts.
  - id: AC-2
    text: Existing selected-workflow artifact filenames and top-level JSON schemas
      remain unchanged.
  deliverables:
  - Shared selected-workflow helper module or equivalent private helper seam.
  - Updated stdlib selected-workflow helper family.
  risks:
  - Over-generalizing the seam could obscure workflow-local policy instead of only
    removing mechanical duplication.
  - Serializer drift could break downstream workflow validation.
  rollback:
  - Revert the shared seam and restore prior helper-local writers if payload compatibility
    cannot be preserved.
  - Keep artifact schemas stable so rollback remains file-local and test-driven.
- phase_id: workflow-family-migration
  title: Workflow Migration
  objective: Shorten the selected-workflow family by replacing repeated capture-step
    boilerplate with the shared seam in the highest-reuse workflows.
  status: planned
  in_scope:
  - Migrate capture and bootstrap logic in candidate_workflow_to_adapted_execution_plan,
    workflow_to_eval_suite, workflow_run_history_to_failure_modes, and workflow_package_to_composable_building_blocks.
  - Update optimizer-family selected-workflow capture and publish logic where it benefits
    from the same seam.
  out_of_scope:
  - Prompt route semantics, artifact names, or publication policy changes.
  - Merging or retiring workflows.
  dependencies:
  - selected-workflow-helper-convergence
  acceptance_criteria:
  - id: AC-1
    text: Touched workflows no longer repeat write-read-validate-selected_workflow_name
      capture tails when the shared seam can provide the same data explicitly.
  - id: AC-2
    text: Workflow-local publish handlers keep only domain-specific checks while preserving
      current state fields and evidence artifacts.
  deliverables:
  - Simplified selected-workflow workflow files.
  - Updated optimizer-family helper or workflow integration where the same seam applies.
  risks:
  - Capture-step refactors could accidentally drop state updates such as evidence_run_ids,
    case_ids, or proposed_parameter_keys.
  - The optimization flow may regress because it consumes multiple selected-workflow
    surfaces together.
  rollback:
  - Revert individual workflow migrations while keeping the shared seam additive if
    one workflow proves brittle.
  - Restore the prior capture handlers for the affected workflow only.
- phase_id: proof-docs-and-memory-closeout
  title: Proof And Closeout
  objective: Freeze the selected-workflow helper boundary in docs, tests, and recursive
    memory and prove no compatibility regression.
  status: planned
  in_scope:
  - Update docs/authoring.md and recursive memory ledgers with the audit, chosen seam,
    no-new-workflow rationale, and deferred debt.
  - Run targeted unit, runtime, and architecture-doc tests for the migrated helper
    and workflow family.
  out_of_scope:
  - Broad portfolio reshaping beyond recording deferred debt.
  - Untargeted full-repository test expansion unless the scoped proof exposes broader
    regressions.
  dependencies:
  - workflow-family-migration
  acceptance_criteria:
  - id: AC-1
    text: Targeted unit, runtime, and architecture-doc tests pass for the selected-workflow
      helper family and touched workflows.
  - id: AC-2
    text: Docs and recursive memory record the shared helper boundary, preserved compatibility
      claims, and remaining deferred pressure.
  deliverables:
  - Updated docs and recursive memory files.
  - Targeted proof results and closeout notes.
  risks:
  - Docs or memory may drift from the shipped helper boundary if closeout is skipped.
  - Scoped tests may miss a neighboring selected-workflow consumer if coverage is
    too narrow.
  rollback:
  - If proof fails, keep the work in helper-only or partial-migration state and record
    the blocked consumer explicitly.
  - Do not update compatibility claims until targeted proof passes.
