phases:
  - phase_id: "provider-policy-translators"
    title: "Provider Policy Translators"
    objective: "Refactor the Codex and Claude emitters plus public policy-layer override lowering into smaller helpers and tables without changing emitted behavior."
    status: "planned"
    in_scope:
      - "Refactor `botlane/runtime/providers/codex_policy.py::_build_config_payload` into helper emitters and table-driven mode translation."
      - "Refactor `botlane/runtime/providers/claude_policy.py::_build_settings_payload` into helper emitters with a private emission context."
      - "Refactor `botlane/policy.py::_policy_layer_to_override` into authored-copy, effect-resolution, validation, and payload-emission helpers."
      - "Add or extend provider-policy parity tests for payloads, errors, and capability reports."
    out_of_scope:
      - "Runtime loop extraction in `Engine.run_async`."
      - "Workflow discovery and inventory restructuring."
      - "New provider features or policy semantics changes."
    dependencies: []
    acceptance_criteria:
      - id: "AC-1"
        text: "Codex and Claude emitted payloads, CLI args, unsupported/lossy/unsafe classifications, and effective-enforcement reports remain parity-accurate under existing and added tests."
      - id: "AC-2"
        text: "Public `Policy(...)` authoring rules and incompatibility failures remain unchanged for sandbox, permission, and network combinations."
    deliverables:
      - "Refactored provider-policy translator internals in `botlane/runtime/providers/codex_policy.py`, `botlane/runtime/providers/claude_policy.py`, and `botlane/policy.py`."
      - "Expanded provider-policy and simple-policy regression tests."
    risks:
      - "Exact ordering or wording of unsupported/lossy/unsafe diagnostics may drift during helper extraction."
      - "Claude CLI arg assembly and dangerous-bypass validation are easy to break while splitting responsibilities."
    rollback:
      - "Revert the refactor in the affected translator module while keeping test additions."
      - "Defer shared cleanup if parity cannot be preserved with local helpers."
  - phase_id: "authoring-and-builder-reducers"
    title: "Authoring And Builder Reducers"
    objective: "Reduce complexity in placeholder validation, artifact inventory, step-plan rebuilding, and branch-group rendering while preserving exact authoring UX and serialization output."
    status: "planned"
    in_scope:
      - "Refactor `botlane/core/placeholders.py::_validate_simple_prompt_reference` into a dispatcher plus root-specific validators."
      - "Keep `botlane/core/discovery.py::_validate_simple_prompt_reference` as a thin wrapper over the shared placeholder validator."
      - "Refactor `botlane/core/inventory.py::collect_artifact_inventory` into a private builder with explicit conflict and ownership methods."
      - "Refactor `botlane/core/plan_adapters.py::compiled_step_from_step_plan` into plan-type builders and shared fallback helpers."
      - "Refactor `botlane/core/branch_groups/manifest.py::render_branch_group_context` into section renderers and list helpers."
      - "Add direct tests where inventory behavior is currently covered only indirectly."
    out_of_scope:
      - "Runtime lifecycle changes in `botlane/core/engine.py`."
      - "Workflow namespace scanning refactors in `botlane/core/discovery.py` beyond the placeholder wrapper."
      - "Markdown content or public placeholder semantics changes."
    dependencies:
      - "provider-policy-translators"
    acceptance_criteria:
      - id: "AC-1"
        text: "Placeholder validation keeps exact success/error behavior across `tests/unit/test_placeholder_refs.py` and `tests/unit/test_simple_surface.py`."
      - id: "AC-2"
        text: "Artifact inventory preserves workflow-level ownership, producer rebind, duplicate-name conflicts, and qualified-name diagnostics."
      - id: "AC-3"
        text: "Step-plan round-trip parity and branch-group context rendering stay unchanged under existing and added tests."
    deliverables:
      - "Refactored placeholder, inventory, plan-adapter, and branch-group builder internals."
      - "Expanded direct regression tests for inventory and existing parity suites for placeholders, plans, and branch-group serialization."
    risks:
      - "Inventory refactoring can change shared-identity or drift-detection behavior."
      - "Whitespace or section-order drift in branch-group markdown can break snapshot-style assertions."
    rollback:
      - "Revert the affected builder/renderer refactor independently while retaining new tests."
      - "Keep discovery using the shared placeholder validator even if other reducer work is deferred."
  - phase_id: "runtime-and-discovery-extraction"
    title: "Runtime And Discovery Extraction"
    objective: "Split the engine run loop and workflow discovery scan into inspectable private phases without changing runtime semantics, checkpoint behavior, or compilation results."
    status: "planned"
    in_scope:
      - "Refactor `botlane/core/engine.py::Engine.run_async` into setup, restore/init, per-step execution, terminal handling, checkpointing, and fatal-notification helpers."
      - "Introduce a private loop-state carrier only if it materially reduces parameter sprawl."
      - "Refactor `botlane/core/discovery.py::describe_workflow_class` into namespace-scan, lowering, graph-resolution, session-resolution, and definition-builder helpers."
      - "Add targeted engine and discovery parity tests for the highest-risk branches."
    out_of_scope:
      - "Checkpoint schema changes."
      - "Workflow graph semantics changes."
      - "New execution services or public runtime abstractions beyond local helper extraction."
    dependencies:
      - "authoring-and-builder-reducers"
    acceptance_criteria:
      - id: "AC-1"
        text: "Engine resume, `AWAIT_INPUT`, `FAIL`, `FINISH`, `goto`, hook notification, checkpoint, and max-step behaviors remain parity-accurate under contract and unit tests."
      - id: "AC-2"
        text: "Workflow discovery preserves step ordering, duplicate detection, default entry resolution, session defaulting, and lowered-simple-step behavior."
    deliverables:
      - "Refactored `Engine.run_async` and `describe_workflow_class` internals with private helper/state structures only."
      - "Expanded runtime and discovery regression coverage for the extracted branches."
    risks:
      - "Hook ordering and checkpoint timing may drift if terminal handling is split incorrectly."
      - "Namespace-scan extraction may accidentally change deterministic step ordering or duplicate detection."
    rollback:
      - "Revert engine and discovery helper extraction separately from earlier phases."
      - "Stop after Phase 2 if runtime parity cannot be proven cleanly."
