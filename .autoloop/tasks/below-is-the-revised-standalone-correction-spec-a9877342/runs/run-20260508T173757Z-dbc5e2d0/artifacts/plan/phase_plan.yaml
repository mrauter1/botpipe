phases:
  - phase_id: "policy-payload-fingerprints"
    title: "Policy Payload Kinds"
    objective: "Normalize public and core policy serialization kinds and route all compiler topology fingerprints through the unified payload path."
    status: "planned"
    in_scope:
      - "Update Policy.to_layer_payload() for nested public Policy and concrete ProviderPolicy bases."
      - "Update compiler payload and fingerprint helpers to emit policy_layer, provider_policy, and provider_policy_override."
      - "Preserve deterministic payload generation and keep SDK run policy excluded from topology hashing."
    out_of_scope:
      - "Provider emitter redesign."
      - "Runtime YAML or TOML policy syntax changes."
      - "General provider policy behavior changes beyond corrected serialized kind labels."
    dependencies: []
    acceptance_criteria:
      - id: "AC-1"
        text: "Every public Policy serialization and compiler payload uses kind=policy_layer, and no public payload uses kind=policy or kind=layer."
      - id: "AC-2"
        text: "Concrete ProviderPolicy and ProviderPolicyOverride compiler payloads use provider_policy and provider_policy_override, and compiler fingerprinting hashes the unified payload for every non-None policy input."
      - id: "AC-3"
        text: "Targeted tests prove payload determinism, fingerprint stability for identical authored layers, and kind-driven fingerprint changes."
    deliverables:
      - "Updated policy and compiler serialization logic."
      - "Unit coverage for payload kinds and fingerprint behavior."
    risks:
      - "A lingering ProviderPolicy shortcut could keep topology hashes inconsistent with serialized payload kinds."
      - "Changing serialized kinds will intentionally invalidate existing topology hashes."
    rollback:
      - "Revert payload-kind and fingerprint helper changes together if downstream consumers fail unexpectedly."
      - "Keep provider-emitter code isolated from this phase to narrow rollback scope."
  - phase_id: "public-surface-cleanup"
    title: "Public Surface Cleanup"
    objective: "Keep the greenfield SDK/simple policy surface strict while replacing leaked internal policy terminology in public-facing validation paths."
    status: "planned"
    in_scope:
      - "Update public-facing normalization and validation messages across sdk, simple, discovery, steps, and policy helpers."
      - "Preserve the current workspace/input/params public API and confirm no public PolicyOverride export exists."
      - "Lock export and public example expectations with tests, including sequence-style SDK writes."
    out_of_scope:
      - "Adding new public constructors or aliases."
      - "Restoring root, typed_input, parameters, or PolicyOverride compatibility."
      - "Changing lower-level core mapping-style writes that are not public SDK examples."
    dependencies:
      - "policy-payload-fingerprints"
    acceptance_criteria:
      - id: "AC-1"
        text: "Public SDK/simple/core-normalization errors use Policy or core provider policy object wording and do not leak ProviderPolicyOverride unless the path is explicitly core/internal."
      - id: "AC-2"
        text: "autoloop, autoloop.policy, autoloop.sdk, and autoloop.simple export exactly the intended policy symbols and omit PolicyOverride."
      - id: "AC-3"
        text: "Tests prove Autoloop(workspace=...), client.run(..., input=..., params=...), client.step(..., input=..., params=...), and sequence-style SDK writes remain the enforced public contract."
    deliverables:
      - "Updated public validation/error wording."
      - "Export and SDK/simple regression tests."
    risks:
      - "Over-broad wording changes could alter intentionally core-only diagnostics."
      - "Surface tests may drift if they assert outdated wording or helper examples."
    rollback:
      - "Revert only message and export-surface edits if wording proves too aggressive while keeping payload-kind fixes intact."
  - phase_id: "runtime-cli-workspace-flag"
    title: "Runtime CLI Workspace Flag"
    objective: "Make --workspace the required public runtime CLI workspace selector everywhere in scope and remove the old --root flag under the greenfield directive."
    status: "planned"
    in_scope:
      - "Require --workspace in covered public argparse entry points instead of defaulting the workspace selector."
      - "Update covered runtime CLI tests from --root to --workspace and add rejection coverage for omitted --workspace plus --root."
      - "Update directly affected public CLI docs/examples in scope."
    out_of_scope:
      - "Changing internal variables that still use the name root after argument resolution."
      - "Non-runtime APIs that already use workspace correctly."
      - "Broader documentation rewrites unrelated to the CLI rename."
    dependencies:
      - "public-surface-cleanup"
    acceptance_criteria:
      - id: "AC-1"
        text: "Runtime CLI commands covered by the current suite require --workspace, fail with usage error when it is omitted, and no longer accept --root."
      - id: "AC-2"
        text: "Public CLI help text refers to the user project or repository directory as the workspace."
      - id: "AC-3"
        text: "Touched public CLI docs/examples no longer advertise --root."
    deliverables:
      - "Updated runtime CLI parser and help text with required --workspace behavior."
      - "Runtime CLI regression tests and aligned docs/examples."
    risks:
      - "One subcommand parser may retain the old flag or optional default behavior if common parents are not updated consistently."
      - "Public docs may drift from parser behavior if examples are not updated in the same patch."
    rollback:
      - "Revert CLI flag and test/doc updates together if a downstream runtime wrapper depends on the old public flag."
