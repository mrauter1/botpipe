phases:
- phase_id: runtime-provider-foundation
  title: Shared Provider Foundation
  objective: Create the runtime-side provider package, shared CLI helper contracts,
    and backend dispatch wiring while preserving the current provider protocol and
    session schema.
  status: planned
  in_scope:
  - Create runtime/providers/__init__.py and runtime/providers/_common.py with prompt
    validation, subprocess stream formatting, cross-provider resume checks, strict
    outcome parsing, verifier input rendering, and canonical session binding construction.
  - Replace placeholder builders in runtime/provider_backends.py with built-in Codex
    and Claude builder dispatch while keeping module:function rejection and the non-public
    provider_factory seam behavior intact.
  - Define precise compatibility and error expectations for missing binaries, unsupported
    CLI surfaces, session_id-only resumability, and no thread_id persistence.
  out_of_scope:
  - Changing core/providers protocols, request dataclasses, response dataclasses,
    or workflow engine contracts.
  - Changing runtime session persistence schema or filesystem store payload structure.
  - Adding Anthropic/OpenAI API providers, public provider factories, or per-turn
    help probing.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: Shared provider helpers are specified around existing core/runtime types
      and preserve provider-agnostic session storage with canonical session_id handling.
  - id: AC-2
    text: Backend resolution remains framework-owned, rejects module:function names,
      and is ready to dispatch directly to real Codex and Claude builders.
  deliverables:
  - Implementation-ready shared-helper and backend-wiring plan for runtime/providers
    and runtime/provider_backends.py.
  - Regression guard list covering session persistence, provider mismatch handling,
    and strict verifier/LLM outcome parsing.
  risks:
  - Shared helper design could accidentally duplicate engine/store logic instead of
    adapting to existing contracts.
  - Backend changes could widen the public provider-loading surface if the current
    rejection path is not preserved.
  rollback:
  - Revert runtime/providers scaffolding and restore placeholder backend builders
    if foundation changes destabilize provider selection.
- phase_id: codex-runtime-adapter
  title: Codex Runtime Adapter
  objective: Implement the concrete Codex CLI adapter using cached capability probing,
    start/resume command resolution, JSONL parsing, and canonical session binding
    updates.
  status: planned
  in_scope:
  - Implement runtime/providers/codex.py with CodexCLICommand, verify_codex_exec_capabilities(),
    resolve_codex_cli_commands(), parse_codex_exec_json(), CodexProvider, and build_codex_provider().
  - Use the request snapshot and provider_implementation.md as the command-surface
    baseline for codex exec start/resume modes, required flags, and bypass/full-auto
    fallback behavior.
  - Ensure producer turns return parsed assistant text, verifier/LLM turns validate
    strict JSON outcomes locally, and resumed turns preserve the incoming session_id
    when no new continuation id is emitted.
  out_of_scope:
  - Persisting or documenting Codex thread_id outside local parsing internals.
  - Help probing on every provider invocation.
  - Any redesign of generic provider config or workflow-facing prompt contracts.
  dependencies:
  - runtime-provider-foundation
  acceptance_criteria:
  - id: AC-1
    text: CodexProvider satisfies the existing LLMProvider methods and translates
      Codex output into ProducerResponse and OutcomeResponse objects without core
      protocol changes.
  - id: AC-2
    text: Capability verification and command resolution produce precise ConfigError
      failures for missing binaries, missing required flags, or unsupported model-effort
      combinations.
  - id: AC-3
    text: Returned session bindings use canonical session_id metadata and exclude
      thread_id from exposed provider metadata.
  deliverables:
  - Concrete runtime/providers/codex.py adapter design and failure-mode matrix.
  - Codex-specific backend and adapter test coverage plan for success, malformed JSONL,
    subprocess failure, resume behavior, and provider mismatch.
  risks:
  - Codex JSONL may contain malformed or noisy lines that obscure the usable assistant
    output.
  - Capability drift between codex exec start and resume surfaces could break model-effort
    or approval-mode selection.
  rollback:
  - Disable Codex backend dispatch and restore the prior unavailable-backend error
    path if the adapter cannot satisfy the required CLI surface safely.
- phase_id: claude-runtime-adapter-and-hardening
  title: Claude Adapter, Tests, And Docs
  objective: Implement the Claude Code adapter, finish backend/helper test coverage,
    and update architecture/authoring docs to the new built-in runtime provider model.
  status: planned
  in_scope:
  - Implement runtime/providers/claude.py with capability verification, permission
    strategy mapping, JSON parsing, shared turn execution, and canonical session binding
    updates.
  - Update tests/runtime/test_provider_backends.py and add a focused runtime provider
    test module if needed for Codex, Claude, shared parser, and capability verifier
    scenarios.
  - Update docs/architecture.md and docs/authoring.md to document runtime/providers
    placement, typed provider selection, strict verifier/LLM JSON outcomes, session_id
    resumability, and the absence of thread_id and public provider-factory loading.
  out_of_scope:
  - Workflow package authoring changes beyond provider-selection and session-handling
    guidance.
  - Changes to verifier-owned criteria.md.
  - Any provider API/SDK integrations.
  dependencies:
  - runtime-provider-foundation
  - codex-runtime-adapter
  acceptance_criteria:
  - id: AC-1
    text: ClaudeProvider uses the documented headless CLI surface with precise handling
      for --print, --output-format json, --resume, --model, permissions, and optional
      effort support.
  - id: AC-2
    text: Backend, adapter, shared parser, and capability-verifier tests cover success
      paths plus malformed output, subprocess errors, unsupported flags, missing binaries,
      and provider mismatch on resume.
  - id: AC-3
    text: Docs describe the new built-in runtime providers and preserve the public
      typed provider/session contract without mentioning public provider factories
      or thread_id.
  deliverables:
  - Concrete runtime/providers/claude.py adapter plan with permission-strategy and
    effort-support validation.
  - Final test/docs hardening checklist covering both providers and shared helper
    behavior.
  risks:
  - Claude CLI permission flags may vary enough that the adapter needs verified compatibility
    mapping to keep semantics stable.
  - Documentation could drift into describing internal/provider-specific details as
    public authoring contracts.
  rollback:
  - Revert Claude backend dispatch, provider tests, and doc edits together if the
    documented headless CLI surface cannot be validated cleanly in the target environment.
