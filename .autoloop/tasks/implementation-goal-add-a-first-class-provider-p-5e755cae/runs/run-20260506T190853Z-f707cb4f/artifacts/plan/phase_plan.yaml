phases:
  - phase_id: "policy-core"
    title: "Core Policy Domain"
    objective: "Add the provider policy model tree, merge rules, strict validation, fingerprints, and base unit coverage."
    status: "planned"
    in_scope:
      - "Create autoloop/core/provider_policy.py with normalized policy, strict policy, capability-report, and emission models."
      - "Implement merge_provider_policies(), validate_against_strict_policy(), and policy_fingerprint()."
      - "Add unit coverage for merge semantics, strict enforcement, symlink escape handling, and fingerprint stability."
    out_of_scope:
      - "Runtime config parsing."
      - "Provider transport execution."
      - "Workflow authoring API changes."
    dependencies: []
    acceptance_criteria:
      - id: "AC-1"
        text: "System default policy matches the requested sandboxed full-auto baseline and unit tests cover merge and strict-policy invariants."
      - id: "AC-2"
        text: "Strict validation reports path-aware violations and injects required deny rules without mutating earlier layers in place."
    deliverables:
      - "autoloop/core/provider_policy.py"
      - "tests/unit/test_provider_policy.py"
    risks:
      - "Path canonicalization and symlink handling can produce false positives if workspace-root semantics are inconsistent."
      - "Field-level merge rules can drift from the specification if implemented with generic deep-merge logic only."
    rollback:
      - "Remove the new policy module and tests without affecting provider transports."
      - "Keep existing runtime config and provider execution paths untouched until later phases land."
  - phase_id: "policy-config-authoring"
    title: "Config And Authoring"
    objective: "Integrate provider policy into runtime config, legacy field mapping, CLI parsing, and workflow or step authoring surfaces."
    status: "planned"
    in_scope:
      - "Extend runtime config parsing, strict unknown-key checks, and the optional no-PyYAML loader for provider_policy shapes."
      - "Add ProviderPolicyRuntimeConfig to ResolvedRuntimeConfig and map legacy model, effort, and full_auto inputs into provider_policy.default."
      - "Add workflow-level and step-level policy fields in core steps and simple authoring helpers, including python_step."
    out_of_scope:
      - "Per-turn provider emission."
      - "Transport subprocess wiring."
    dependencies:
      - "policy-core"
    acceptance_criteria:
      - id: "AC-1"
        text: "Configs without provider_policy still resolve successfully to system defaults while preserving legacy provider and runtime fields."
      - id: "AC-2"
        text: "provider_policy examples with lists and null values parse under both normal YAML loading and the narrow fallback loader."
    deliverables:
      - "autoloop/runtime/config.py"
      - "autoloop/runtime/cli.py"
      - "autoloop/core/steps.py"
      - "autoloop/simple.py"
      - "tests/runtime/test_provider_policy_config.py"
    risks:
      - "Legacy generic and provider-specific model precedence can regress when mapped into the new policy layer."
      - "Python-step policy semantics can be misread as an OS sandbox unless the authoring surface is explicit."
    rollback:
      - "Keep legacy provider fields authoritative and drop provider_policy parsing if compatibility issues appear."
      - "Remove new step or workflow policy parameters without disturbing existing workflow declarations."
  - phase_id: "policy-resolution-propagation"
    title: "Resolution And Propagation"
    objective: "Resolve effective policy per step or operation and thread it through compiled metadata, requests, rendering, replay, and tracing seams."
    status: "planned"
    in_scope:
      - "Add compiled workflow and step policy metadata plus topology hash participation."
      - "Implement ProviderPolicyResolver and use it for step execution and inline operations."
      - "Propagate resolved policy through provider request models, rendered turns, operation runtime, and replay fingerprints."
    out_of_scope:
      - "Provider-specific config file emission."
      - "Provider CLI argument mapping."
    dependencies:
      - "policy-config-authoring"
    acceptance_criteria:
      - id: "AC-1"
        text: "Workflow, step, and explicit operation policies resolve in the requested order and strict policy rejects unsafe overrides."
      - id: "AC-2"
        text: "Operation replay fingerprints and compiled topology hashes change when policy changes, while existing mismatch behaviors remain intact."
    deliverables:
      - "autoloop/runtime/provider_policy_resolver.py"
      - "autoloop/core/compiler.py"
      - "autoloop/core/providers/models.py"
      - "autoloop/core/providers/rendering.py"
      - "autoloop/core/providers/turns.py"
      - "autoloop/core/operations.py"
      - "tests/runtime/test_provider_policy_steps.py"
    risks:
      - "Resolver placement can sprawl into engine, provider wrapper, and operation helpers if ownership is unclear."
      - "Topology or replay changes can cause broad golden-test churn if fingerprints are not stable."
    rollback:
      - "Back out resolver wiring and request-shape changes while preserving the pure config and model work."
      - "Remove policy fingerprints from topology and replay payloads if integration issues block progress."
  - phase_id: "policy-codex"
    title: "Codex Emission"
    objective: "Emit run-scoped Codex policy artifacts, enforce validation decisions, and wire the emission into Codex transport execution."
    status: "planned"
    in_scope:
      - "Implement autoloop/runtime/providers/codex_policy.py and capability-report generation."
      - "Pass emitted config file paths, CLI args, and env overrides into both Codex async transport and sync operation execution."
      - "Record policy metadata paths and decisions in provider metadata and runtime traces."
    out_of_scope:
      - "Claude-specific settings emission."
      - "Managed or enterprise policy emitters."
    dependencies:
      - "policy-resolution-propagation"
    acceptance_criteria:
      - id: "AC-1"
        text: "Codex full-auto sandboxed policies emit workspace-write settings and writable roots under the run directory only."
      - id: "AC-2"
        text: "Unsupported or lossy Codex mappings produce capability reports and obey validation modes before execution."
    deliverables:
      - "autoloop/runtime/providers/codex_policy.py"
      - "autoloop/runtime/providers/codex.py"
      - "tests/runtime/test_provider_policy_emitters.py"
      - "Extended Codex runtime provider tests"
    risks:
      - "Codex CLI support varies by version, so overconfident mappings can create unsafe expansions."
      - "Resume command composition can regress if policy args are bolted on differently for start and resume flows."
    rollback:
      - "Disable Codex policy emission integration while retaining capability-report generation for offline validation."
      - "Revert transport arg and env wiring without touching the resolver or config layers."
  - phase_id: "policy-claude-regression"
    title: "Claude Emission And Regression Sweep"
    objective: "Add Claude policy emission, finalize runtime observability, and complete transport and compatibility coverage."
    status: "planned"
    in_scope:
      - "Implement autoloop/runtime/providers/claude_policy.py with capability-profile-aware filesystem and network handling."
      - "Wire Claude settings emission into transport execution and runtime traces."
      - "Finish cross-provider regression tests and update config or authoring examples."
    out_of_scope:
      - "MCP, hooks, subagents, plugins, or enterprise policy emitters."
      - "Arbitrary third-party backend support."
    dependencies:
      - "policy-codex"
    acceptance_criteria:
      - id: "AC-1"
        text: "Claude emission writes run-scoped settings and capability reports, including lossy enforcement warnings when native sandbox features are unavailable."
      - id: "AC-2"
        text: "Final regression coverage confirms existing provider dispatch, legacy Claude permission_strategy behavior, cross-provider resume checks, and trace redaction still hold."
    deliverables:
      - "autoloop/runtime/providers/claude_policy.py"
      - "autoloop/runtime/providers/claude.py"
      - "autoloop/runtime/tracing.py"
      - "Documentation or config example updates"
      - "Completed runtime policy test suite"
    risks:
      - "Claude capability approximation can diverge between native sandbox settings and permission-rule fallbacks."
      - "Trace payload expansion can accidentally leak secret-bearing env or header values if not filtered centrally."
    rollback:
      - "Turn off Claude policy execution wiring and keep emitted reports for diagnosis only."
      - "Revert new trace event payload fields if redaction is incomplete."
