phases:
  - phase_id: "route-interaction-policy"
    title: "Route Policy Rebase"
    objective: "Replace legacy reserved-route injection with policy-aware question exposure and remove hidden blocked/failed semantics."
    status: "planned"
    in_scope:
      - "Add RuntimeInteractionPolicy and Engine plumbing."
      - "Add runner/runtime full_auto plumbing that maps to provider-question visibility."
      - "Add one canonical ControlRoutes declaration seam across core step classes and simple helpers, with legacy simple booleans normalized at the declaration edge."
      - "Rework discovery/compiler/provider-contract code so only question remains a default runtime control route."
      - "Remove hard-coded blocked/failed reason validation from provider and non-provider event validation."
      - "Update provider prompt rendering and retry feedback to match the new route contract."
    out_of_scope:
      - "Lazy worklist materialization."
      - "Typed worklist effects."
      - "Validation-step helper."
    dependencies: []
    acceptance_criteria:
      - id: "AC-1"
        text: "Interactive provider-facing steps expose default question while full-auto runs do not."
      - id: "AC-2"
        text: "No provider request exposes default blocked or default failed, and Python/child-workflow steps no longer receive default failed."
      - id: "AC-3"
        text: "Explicit authored blocked and failed routes remain legal without hidden reason requirements unless schema enforces them."
      - id: "AC-4"
        text: "Core and simple authoring surfaces compile through the same ControlRoutes contract, and existing simple control_routes=False still means no injected question route."
    deliverables:
      - "Policy-aware route plumbing across discovery, compiler, engine, provider contracts, and runner/config."
      - "A single ControlRoutes declaration strategy spanning core step classes, simple lowering, and public exports."
      - "Updated provider route and retry/rendering tests for the new contract."
    risks:
      - "Route-view drift between execution-legal routes and provider-visible routes."
      - "Unintended coupling between workflow full_auto policy and provider transport auto flags."
    rollback:
      - "Revert policy/config plumbing and restore prior route injection only if the new route contract proves unstable."
      - "Keep provider failure handling changes isolated so they can be reverted without touching later phases."
  - phase_id: "lazy-worklists-and-sessions"
    title: "Lazy Worklists And Sessions"
    objective: "Materialize worklist selections only at first use and make work-item continuity bind when a current item exists."
    status: "planned"
    in_scope:
      - "Replace eager worklist initialization at fresh start and resume with sparse selection state."
      - "Add Context.ensure_selection and StateRuntime.ensure_worklist_selection."
      - "Materialize scoped worklists before artifact/session resolution in step dispatch."
      - "Make artifact template and worklist runtime helpers use lazy selection."
      - "Update Continuity.work_item session-key derivation to ensure the referenced selection exists before resolving the current item."
      - "Keep checkpoint snapshots sparse and restore only materialized selections."
    out_of_scope:
      - "Typed route/worklist effects."
      - "Validation-step helper."
      - "Inspection payload redesign."
    dependencies:
      - "route-interaction-policy"
    acceptance_criteria:
      - id: "AC-1"
        text: "Declared artifact-backed worklists compile and fresh runs start without loading missing backing data."
      - id: "AC-2"
        text: "First scoped or explicit worklist use materializes only the referenced worklist and emits a runtime resolution event."
      - id: "AC-3"
        text: "Work-item continuity produces stable worklist:item keys and fails clearly only when no current item exists at runtime."
    deliverables:
      - "Lazy selection runtime across engine, dispatcher, context, worklists, sessions, and artifact placeholder resolution."
      - "Checkpoint/resume and work-item continuity regression coverage."
    risks:
      - "Scoped item state or artifact path resolution may assume eager selections."
      - "Resume logic may accidentally reload unrelated worklists."
    rollback:
      - "Revert lazy-selection entrypoints while preserving phase-1 route-policy changes if needed."
      - "Back out work-item continuity changes independently from general lazy worklist loading if the regression surface is narrower."
  - phase_id: "effects-and-validation-helper"
    title: "Effects And Validation Helper"
    objective: "Add narrow typed worklist effects and a reusable repairable validation-step helper without broadening the workflow DSL."
    status: "planned"
    in_scope:
      - "Add WorklistEffect and Effects."
      - "Add the public Effects.then, Effects.advance, Effects.complete_and_advance, and Effects.refresh convenience constructors."
      - "Teach hook and Python-step result normalization to execute effects in deterministic order."
      - "Add additive Route helper constructors for common worklist progression patterns and lower them through the same Effects path."
      - "Add ValidationResult and validation_step, lowered through existing Python-step machinery."
      - "Emit runtime events for validation pass and repairable validation failure."
    out_of_scope:
      - "Generic Route.to effects kwargs."
      - "New step kinds or a general flow DSL."
      - "Prompt placeholder relaxation."
    dependencies:
      - "lazy-worklists-and-sessions"
    acceptance_criteria:
      - id: "AC-1"
        text: "Hooks and Python steps can express refresh/status/advance/exhausted behavior through typed effects with checkpoint-safe state mutation."
      - id: "AC-2"
        text: "Validation helpers route valid results to success and invalid results to repair after deterministically writing feedback artifacts."
      - id: "AC-3"
        text: "Exceptions in validation helpers follow explicit failed-route behavior or raise normally when no failed route exists."
      - id: "AC-4"
        text: "Direct hook and Python-step returns can use Effects.then, Effects.advance, Effects.complete_and_advance, and Effects.refresh, and Route helpers lower through the same effect objects."
    deliverables:
      - "New effects module with public Effects convenience constructors plus route-helper lowering and hook normalization support."
      - "Public validation helper exports and tests for repair loops and feedback artifacts."
    risks:
      - "A second state-mutation path could diverge from existing worklist runtime events."
      - "Helper additions could accidentally broaden the public authoring model."
    rollback:
      - "Remove additive helper exports and effect normalization while leaving lazy worklist fixes intact."
      - "Revert validation_step lowering without affecting existing Python-step workflows."
  - phase_id: "diagnostics-and-late-bound-prompts"
    title: "Diagnostics And Late-Bound Prompts"
    objective: "Make artifact ownership mistakes fail clearly and relax prompt validation only for runtime-created item/worklist facts."
    status: "planned"
    in_scope:
      - "Reject same-identity artifacts that are both workflow-level and step-produced."
      - "Preserve separate-identity duplicate and ambiguous artifact diagnostics."
      - "Relax simple prompt placeholder validation only for the declared late-bound item/worklist namespaces."
      - "Make runtime placeholder resolution lazy and placeholder-aware for current-item, payload-path, and worklist-source failures."
    out_of_scope:
      - "Broad placeholder namespace expansion."
      - "Managed/shared artifact escape hatches unless existing tests require them."
      - "Static graph payload redesign."
    dependencies:
      - "effects-and-validation-helper"
    acceptance_criteria:
      - id: "AC-1"
        text: "Compile-time diagnostics clearly reject dual-role artifact identities and include producer-step guidance."
      - id: "AC-2"
        text: "Scoped prompts can reference item.id, item.payload.<path>, and worklist.<name>.current... without compile-time backing-data checks."
      - id: "AC-3"
        text: "Runtime prompt or artifact placeholder failures cite the placeholder and the specific missing current item, payload path, or source-loading problem."
    deliverables:
      - "Artifact ownership validation updates in inventory/topology."
      - "Prompt placeholder validation/runtime resolution updates with focused regression tests."
    risks:
      - "Prompt validation may become too permissive and hide typos."
      - "Artifact ownership diagnostics may conflict with existing workflow-level plus producer assumptions."
    rollback:
      - "Revert prompt-placeholder relaxation while keeping ownership diagnostics if only runtime rendering regresses."
      - "Revert ownership diagnostics separately if they surface unexpected existing workflow patterns."
  - phase_id: "inspection-docs-and-regression"
    title: "Inspection, Docs, And Regression Sweep"
    objective: "Update inspection/static graph surfaces and documentation to the new route and lazy-runtime contracts, then land the full regression suite."
    status: "planned"
    in_scope:
      - "Expose authored-route, runtime-control-route, and provider-visible route views in inspection/static graph surfaces."
      - "Remove legacy injected blocked/failed assumptions from workflow capabilities, static graph artifacts, route tables, compile reports, and CLI inspection output."
      - "Update authoring and architecture docs for static-vs-runtime validation, lazy worklists, typed effects, validation helper, and artifact ownership."
      - "Refresh contract, runtime, unit, and doc baseline tests."
    out_of_scope:
      - "New workflow packages."
      - "Non-requested runtime UX changes beyond the documented route-policy and lazy-runtime behavior."
    dependencies:
      - "diagnostics-and-late-bound-prompts"
    acceptance_criteria:
      - id: "AC-1"
        text: "Inspection and static graph outputs no longer show default blocked or failed and distinguish question runtime control from authored domain edges."
      - id: "AC-2"
        text: "Docs describe the shipped static validation, runtime validation, route policy, lazy worklist, and artifact ownership behavior."
      - id: "AC-3"
        text: "The requested regression suite passes with updated expectations and no legacy route shims."
    deliverables:
      - "Updated inspection/static graph/capability payloads and CLI-facing read models."
      - "Documentation refresh plus the final regression test sweep."
    risks:
      - "Snapshot churn may mask real behavior drift if route-view fields are not sourced consistently."
      - "Downstream tests or tooling may still assume available_routes equals provider-visible routes."
    rollback:
      - "Revert inspection/docs payload changes independently from core runtime behavior if only read models regress."
      - "Keep regression updates grouped by subsystem so failing expectations can be backed out surgically."
