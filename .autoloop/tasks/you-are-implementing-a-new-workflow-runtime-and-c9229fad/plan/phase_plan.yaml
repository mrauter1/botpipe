phases:
  - phase_id: architecture-and-adr-baseline
    title: Architecture Baseline
    objective: Lock the implementation shape from the spec and parity findings before core runtime code lands.
    status: planned
    in_scope:
      - Build a feature-parity inventory from autoloop_v1.py, Ralph_loop.py, and the legacy autoloop runtime.
      - Author the required ADR set with exactly three candidates and the mandated evaluation fields for each material design decision.
      - Freeze the module layout, public interfaces, compat boundary, and regression-risk inventory in docs.
    out_of_scope:
      - Production provider execution logic
      - End-to-end parity goldens
    dependencies: []
    acceptance_criteria:
      - id: P1-AC1
        text: All required ADR topics are enumerated and scheduled before core implementation choices are finalized.
      - id: P1-AC2
        text: The plan captures the concrete legacy behaviors that the new runtime must preserve.
    deliverables:
      - Implementation-ready architecture plan
      - ADR backlog and decision topics
      - Compatibility and risk inventory
    risks:
      - Missing a legacy behavior here will cause downstream rework or silent parity gaps.
      - Overfitting the core to the legacy runtime would create long-term maintenance debt.
    rollback:
      - Rework only docs and ADR drafts if a design choice is wrong; do not let phase 1 change legacy runtime code.
  - phase_id: strict-core-engine
    title: Strict Core Engine
    objective: Implement the clean spec-compliant workflow core with deterministic execution and exhaustive contract tests.
    status: planned
    in_scope:
      - Implement primitives, steps, artifacts, prompts, context, validation, compiler, routing, and checkpoint model.
      - Provide in-memory provider and store test doubles for deterministic unit and contract tests.
      - Cover definition-time validation failures, middleware behavior, pause/resume, answer injection, and best-effort failure checkpointing.
    out_of_scope:
      - Workspace-specific compatibility shims
      - Filesystem CLI/provider integration
    dependencies:
      - architecture-and-adr-baseline
    acceptance_criteria:
      - id: P2-AC1
        text: Pure v1.1 workflows compile and execute through the new engine in deterministic tests.
      - id: P2-AC2
        text: Required definition-time validation failures are enforced before runtime execution.
    deliverables:
      - autoloop_v3/workflow core modules
      - In-memory stores/providers
      - Core unit and contract tests
    risks:
      - Letting compatibility concerns leak into the core will break the intended architecture boundary.
      - Artifact graph or routing mistakes will cascade into runtime parity failures later.
    rollback:
      - Revert core-only files while keeping the ADR baseline and legacy oracle untouched.
  - phase_id: compatibility-and-filesystem-runtime
    title: Compatibility And Filesystem Runtime
    objective: Add isolated legacy normalization and the real filesystem runtime needed to execute workspace workflows.
    status: planned
    in_scope:
      - Implement compat normalization for Verdict aliases, on_verdict, handler arity drift, SessionLifecycle, and related workflow-surface drift.
      - Implement filesystem stores, workspace/task/run scaffolding, phase selection persistence, scoped sessions, raw/event/decisions logging, and prompt loading.
      - Add the runtime harness and any thin workflow import shim needed to run existing workflows unchanged.
    out_of_scope:
      - Final parity goldens
      - Final documentation polish
    dependencies:
      - strict-core-engine
    acceptance_criteria:
      - id: P3-AC1
        text: autoloop_v1.py and Ralph_loop.py import and compile through the compatibility layer without source edits.
      - id: P3-AC2
        text: The runtime writes the expected .autoloop workspace layout, session files, logs, and decisions artifacts.
    deliverables:
      - autoloop_v3/runtime modules
      - Compatibility adapters and workflow shim
      - Filesystem runtime tests
    risks:
      - A fat root-level shim would dilute the new implementation root and invite drift.
      - Session or artifact path mismatches would break resume and scoped phase execution.
    rollback:
      - Back out compatibility/runtime code without altering the strict core if the boundary is violated.
  - phase_id: workflow-integration-and-parity
    title: Workflow Integration And Parity
    objective: Prove the target workflows execute correctly and preserve critical legacy behavior.
    status: planned
    in_scope:
      - Run autoloop_v1.py and Ralph_loop.py end-to-end with deterministic fake providers.
      - Add golden tests for task/run layout, phase activation, implicit and explicit phase handling, scoped artifacts, scoped sessions, clarifications, and resume.
      - Add parity comparisons against critical legacy raw logs, events, decisions ledger, and session persistence behavior.
    out_of_scope:
      - New workflows outside the required target set
    dependencies:
      - compatibility-and-filesystem-runtime
    acceptance_criteria:
      - id: P4-AC1
        text: Golden and integration tests prove autoloop_v1.py executes with required feature parity.
      - id: P4-AC2
        text: Golden and integration tests prove Ralph_loop.py executes with the required compatibility shims.
      - id: P4-AC3
        text: Critical legacy workspace artifacts and resume behaviors are covered by parity assertions.
    deliverables:
      - Golden fixtures and parity helpers
      - End-to-end workflow integration tests
      - Legacy comparison coverage for critical scenarios
    risks:
      - Brittle goldens may create churn if they assert formatting instead of semantics.
      - Missing one critical legacy scenario would leave an unproven regression surface.
    rollback:
      - Relax only non-semantic fixture assertions; keep required behavior coverage intact.
  - phase_id: docs-hardening-and-final-proof
    title: Docs Hardening And Final Proof
    objective: Finish the production-readiness work so the new engine is maintainable, documented, and fully validated.
    status: planned
    in_scope:
      - Write architecture, parity matrix, compatibility, and authoring docs.
      - Complete filesystem integration coverage and CLI smoke validation.
      - Eliminate or explicitly document any remaining risk that could affect correctness, compatibility, or long-term maintenance.
    out_of_scope:
      - Speculative features beyond Workflow Definition Specification v1.1 and required legacy compatibility
    dependencies:
      - workflow-integration-and-parity
    acceptance_criteria:
      - id: P5-AC1
        text: Required docs explain the core architecture, compatibility boundary, parity claims, and workflow authoring surface.
      - id: P5-AC2
        text: Final test and smoke coverage demonstrate the runtime is ready to execute the target workflows in practice.
    deliverables:
      - Architecture and compatibility documentation
      - Parity matrix and authoring guide
      - Final validation and smoke results
    risks:
      - Documentation can drift from implementation if written too early or too loosely.
      - Final polish work can mask unresolved functional gaps if not tied to passing tests.
    rollback:
      - Keep documentation edits separate from behavior changes when possible and do not claim parity without passing proof.
