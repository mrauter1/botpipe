phases:
- phase_id: artifact-contract-foundation
  title: Artifact Contract Foundation
  objective: Add artifact kinds, schema/required metadata, qualified artifact identity,
    and compiler validation for class-level and step-local artifacts.
  status: planned
  in_scope:
  - Extend Artifact and ArtifactHandle with the requested contract fields and helpers.
  - Compile a unified artifact inventory with qualified names, owner-step metadata,
    and route-contract artifact resolution.
  - Update validation and capability inspection surfaces that depend on compiled artifact
    metadata.
  out_of_scope:
  - Runtime post-step artifact enforcement.
  - Session continuity and store migration.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: Class-level and step-local artifacts compile with stable name, qualified_name,
      owner_step, and producer_steps metadata.
  - id: AC-2
    text: Compiler validation rejects duplicate or ambiguous artifact references and
      rejects schema usage outside supported JSON-artifact cases.
  - id: AC-3
    text: Existing class-level produces/requires workflows still compile without behavior
      drift.
  deliverables:
  - Updated artifact, validation, compiler, and capability-inspection modules.
  - Unit coverage for artifact factories, identity binding, name resolution, and schema
    gating.
  risks:
  - Current artifact inventory is keyed by unqualified names, so qualified-name support
    can break existing references if introduced inconsistently.
  - CLI/capability payloads may drift if compiled artifact metadata changes without
    matching inspection updates.
  rollback:
  - Revert compiled artifact metadata and validation changes together if existing
    workflows stop compiling.
  - Drop additive capability-inspection fields before altering public CLI payload
    shape.
- phase_id: artifact-runtime-enforcement
  title: Artifact Runtime Enforcement
  objective: Enforce artifact requiredness and schema validation after step execution
    and before route completion.
  status: planned
  in_scope:
  - Validate route-selected required artifacts and optional present schema artifacts
    in the engine.
  - Preserve current expected_output_schema validation order while adding post-step
    artifact checks.
  - Checkpoint failures with artifact-validation context for provider and system steps.
  out_of_scope:
  - Session continuity redesign.
  - Worklist and route-effect execution.
  dependencies:
  - artifact-contract-foundation
  acceptance_criteria:
  - id: AC-1
    text: Provider and system steps fail before successful route completion when required
      artifacts are missing, empty, or schema-invalid.
  - id: AC-2
    text: Optional absent artifacts do not fail, but optional present schema artifacts
      still validate.
  - id: AC-3
    text: Outcome payload validation remains scoped to Outcome.payload and does not
      absorb artifact-schema concerns.
  deliverables:
  - Engine artifact-validation flow with checkpoint-aware failure handling.
  - Contract/runtime coverage for required, optional, and route-specific artifact
    validation.
  risks:
  - Ordering mistakes can validate artifacts before handlers or after route acceptance
    and cause checkpoint drift.
  - Provider-facing contract drift could occur if artifact metadata replaces rather
    than augments the current request payload.
  rollback:
  - Remove post-step artifact validation while keeping compiler artifact metadata
    if runtime failures prove unstable.
  - Disable optional provider artifact-contract enrichment without removing mandatory
    local validation.
- phase_id: session-continuity-and-store-migration
  title: Session Continuity And Store Migration
  objective: Replace scope-based provider session selection with Continuity and SessionKey,
    add the implicit default session, and migrate runtime stores/pathing.
  status: planned
  in_scope:
  - Add Continuity, SessionKey, default-session compilation, and provider-step auto-open
    behavior.
  - Refactor context, stores, filesystem persistence, provider session persistence
    helpers, and run metadata around SessionKey.
  - Remove workflow-facing SessionPaths exports and rewrite affected fixtures/tests/docs.
  out_of_scope:
  - Typed child workflow outputs.
  - Worklist route effects beyond continuity hooks required by this phase.
  dependencies:
  - artifact-runtime-enforcement
  acceptance_criteria:
  - id: AC-1
    text: Every run has an implicit default provider session and provider steps without
      explicit sessions use it.
  - id: AC-2
    text: Declared sessions auto-open according to their continuity policy and checkpoint/resume
      persists the new snapshot structure.
  - id: AC-3
    text: SessionPaths is no longer workflow-facing, and runtime store pathing follows
      the requested continuity layout.
  deliverables:
  - New sessions module plus refactored context/store/filesystem/provider session
    handling.
  - Updated tests for default-session, continuity, filesystem persistence, and scope-migration
    regression surfaces.
  risks:
  - Current tests and fixtures use ctx.open_session(..., scope=...), so migration
    can silently break override behavior if not handled explicitly.
  - Changing session persistence shape can break resume or provider handoff if store
    and provider helpers move out of sync.
  rollback:
  - Revert store/session-key changes together if checkpoint or resume behavior regresses.
  - Keep SessionPaths removed from exports/docs even if internal path resolution needs
    a narrower runtime-only adapter.
- phase_id: typed-params-and-child-io
  title: Typed Params And Child IO
  objective: Thread typed workflow parameters through Context and extend child workflow
    invocation/results with optional typed input and output contracts.
  status: planned
  in_scope:
  - Add ctx.params and typed parameter reconstruction on run and resume.
  - Extend ctx.invoke_workflow(...) to accept typed input and extend ChildWorkflowResult
    with typed output while preserving current metadata/artifact fields.
  - Update runtime serialization and tests that consume child result metadata.
  out_of_scope:
  - Route/effect execution semantics.
  - Worklist progression and scoped artifact placeholders.
  dependencies:
  - session-continuity-and-store-migration
  acceptance_criteria:
  - id: AC-1
    text: Context exposes typed params and the existing JSON-safe workflow_params
      view for the same run.
  - id: AC-2
    text: Resume rebuilds typed params from persisted metadata and ignores new overrides
      for existing runs.
  - id: AC-3
    text: Child workflow invocation/result contracts support typed input/output without
      dropping existing metadata and artifact access.
  deliverables:
  - Updated context, runner, and child-workflow contract surfaces.
  - Runtime coverage for typed params, resume restoration, child typed IO, and validation
    failure recording.
  risks:
  - Child result shape is asserted in runtime tests and parent metadata payloads,
    so additive fields must not break existing consumers.
  - Parameter coercion drift can desync persisted run metadata from the runtime Context
    view.
  rollback:
  - Revert typed child IO additions while preserving existing invoke_workflow behavior
    if result-shape regressions appear.
  - Fall back to the existing workflow_params-only threading if typed reconstruction
    destabilizes resume.
- phase_id: routes-effects-and-worklists
  title: Routes Effects And Worklists
  objective: Add explicit Route/effect objects, worklist primitives, scoped steps,
    and work-item-aware engine progression without introducing a DSL or hidden loop
    runner.
  status: planned
  in_scope:
  - Add Route, effect dataclasses, and compiled-route normalization for shorthand
    and object transitions.
  - Add WorkItem, Worklist, Selector, Selection, scoped provider steps, context selection
    helpers, and work-item artifact placeholders.
  - Implement explicit engine effect dispatch for refresh, completion reset, status
    mutation, advancement, and board mutations.
  out_of_scope:
  - New manifest or flow-string authoring surfaces.
  - Automatic fallback routing on artifact or effect failure.
  dependencies:
  - typed-params-and-child-io
  acceptance_criteria:
  - id: AC-1
    text: Dict transition shorthand still compiles and runs unchanged for simple workflows.
  - id: AC-2
    text: Route objects compile into normalized targets/effects and invalid worklist
      references are rejected at compile time.
  - id: AC-3
    text: Scoped steps and Advance(...) move selection state explicitly without hidden
      automatic looping.
  deliverables:
  - New route, effect, and worklist modules plus compiler/context/engine integration.
  - Unit, contract, and runtime coverage for route normalization, worklist selection,
    scoped artifact paths, and exhaustion behavior.
  risks:
  - This phase touches authoring, compile, runtime, and persistence seams simultaneously
    and can sprawl into generic infrastructure if not kept explicit.
  - Work-item continuity depends on the session migration, so ordering mistakes can
    create mismatched selection and session keys.
  rollback:
  - Back out worklist/effect execution as one slice if scoped progression becomes
    unstable.
  - Keep simple dict-transition support untouched even if Route object support needs
    to be reverted.
- phase_id: public-surface-docs-and-regression
  title: Public Surface Docs And Regression
  objective: Finalize exports, docs, strictness expectations, examples, and full-suite
    regression coverage for the upgraded authoring surface.
  status: planned
  in_scope:
  - Update workflow and workflow.primitives exports, core authoring exports, docs,
    examples, and strictness tests.
  - Remove workflow-facing SessionPaths references and document continuity, artifact
    contracts, worklists, and typed child outputs.
  - Run the full regression suite and fix any remaining inspection or compatibility
    drifts.
  out_of_scope:
  - New CLI commands or workflow.toml execution semantics.
  - Legacy compatibility shims beyond what is already required by the accepted design.
  dependencies:
  - routes-effects-and-worklists
  acceptance_criteria:
  - id: AC-1
    text: The root workflow shim exports only the requested authoring primitives and
      workflow.primitives exports the expanded primitive surface.
  - id: AC-2
    text: Docs state the new continuity/artifact/worklist model while preserving metadata-only
      workflow.toml and no-DSL architecture constraints.
  - id: AC-3
    text: Full pytest passes with updated strictness, contract, runtime, and documentation
      assertions.
  deliverables:
  - Updated public shims, docs, examples, and strictness tests.
  - Green full-suite regression run.
  risks:
  - Docs and strictness tests encode architectural promises, so stale language can
    make an otherwise-correct implementation fail late.
  - Capability inspection and CLI payloads may still reference superseded compiled
    fields unless updated in the same pass.
  rollback:
  - Revert public export changes separately from core runtime changes if the implementation
    needs one more internal stabilization pass.
  - Back out doc/example updates that describe unfinished behavior rather than shipping
    mismatched guidance.
