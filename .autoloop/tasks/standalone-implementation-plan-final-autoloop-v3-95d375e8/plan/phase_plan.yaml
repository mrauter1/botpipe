phases:
- phase_id: retry-feedback-and-public-primitives
  title: Retry Feedback And Public Primitives
  objective: Make invalid route payload retry feedback specific and expose the required
    runtime primitives from `autoloop.simple` and `autoloop`.
  status: planned
  in_scope:
  - Update `core/providers/retries.py` invalid-payload summaries and retry action
    guidance.
  - Add route-specific and generic fallback coverage in `tests/unit/test_provider_retries.py`.
  - Import `Event`, `Outcome`, and `Checkpoint` from `core.primitives`, `ResolvedArtifacts`
    from `core.artifacts`, and `ChildWorkflowResult` from `core.context` into `autoloop.simple`,
    using the existing installed-package / repo-root fallback style, then re-export
    them from `autoloop.simple` and `autoloop`.
  - Update `tests/unit/test_simple_surface.py` to pin the public primitive identities
    and presence.
  out_of_scope:
  - Deleting the `workflow/` package.
  - Renaming runtime loader/catalog fields.
  - Docs and strictness rewrites.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: Invalid-payload retry feedback includes `_failure_context["error"]` when
      present, includes the selected route when both route and error exist, and falls
      back to the generic invalid-payload message otherwise.
  - id: AC-2
    text: '`autoloop.simple` imports `Event`, `Outcome`, and `Checkpoint` from `core.primitives`,
      `ResolvedArtifacts` from `core.artifacts`, and `ChildWorkflowResult` from `core.context`
      through the file''s existing fallback pattern, and `autoloop.simple` plus `autoloop`
      both export those names with tests asserting identity across the two surfaces.'
  deliverables:
  - Updated retry helper and retry tests.
  - Updated public export surfaces and simple-surface tests.
  risks:
  - Retry feedback wording changes can accidentally affect the generic control-schema
    fallback path.
  - Public export changes can break installed-package fallback imports if the try/except
    import style is not preserved.
  rollback:
  - Revert the retry helper and its tests together if wording proof fails.
  - Revert only the public export patch if package-mode import probing fails.
- phase_id: workflow-surface-removal-and-runtime-renames
  title: Workflow Surface Removal And Runtime Renames
  objective: Remove the obsolete `workflow` package and finish the requested runtime/public
    naming cleanup without leaving compatibility aliases behind.
  status: planned
  in_scope:
  - Port active imports away from `workflow` and `workflow.primitives`.
  - Delete `workflow/__init__.py`, `workflow/primitives.py`, and the `workflow/` package.
  - Remove `("workflow", "Workflow")` from workflow-base detection in `core/validation.py`.
  - Rename `legacy_workflow_path` to `workflow_py_path` in catalog/capability dataclasses,
    payloads, CLI JSON, and related tests.
  - Rename `_load_legacy_parameter_type` to `_load_parameters_from_params_py` and
    update call-site locals.
  - Rename `is_legacy_run_key` to `is_run_key_bound_to_slot` with unchanged behavior.
  - Delete `ResolvedWorkflow.package` and move all callers to `resolved.reference`.
  out_of_scope:
  - Workflow-step execution refactors.
  - Any compatibility shim for deleted imports or deleted properties.
  - New CLI commands such as `autoloop eject`.
  dependencies:
  - retry-feedback-and-public-primitives
  acceptance_criteria:
  - id: AC-1
    text: No active source/test/docs import from the deleted `workflow` package, and
      `repo_root / "workflow"` can be removed without leaving a replacement shim.
  - id: AC-2
    text: All active payloads and dataclasses use `workflow_py_path`, no public payload
      exposes `legacy_workflow_path`, and `ResolvedWorkflow` exposes only `reference`.
  - id: AC-3
    text: Run-key helper behavior remains unchanged after the rename to `is_run_key_bound_to_slot`.
  deliverables:
  - Updated runtime/catalog/capability/stdlib code paths with the requested renames.
  - Deleted `workflow/` package and updated callers/tests.
  risks:
  - Hidden `.package` callers outside loader tests can survive if the rename is treated
    as a local change.
  - Deleting `workflow/` too early can break strictness and docs suites before the
    replacement assertions exist.
  rollback:
  - Restore the directory deletion only long enough to land remaining caller ports;
    do not add a permanent shim.
  - Revert the field/property rename patch independently if payload consumers need
    one more proof pass.
- phase_id: strictness-docs-and-proof
  title: Strictness Docs And Proof
  objective: Lock the removed concepts out of the maintained tree, refresh active
    docs/examples to the final public surface, and complete targeted plus full-suite
    proof.
  status: planned
  in_scope:
  - Rewrite `tests/strictness/test_no_compat.py` to assert package deletion, forbidden
    symbols, forbidden import regexes, and the `_install_simple_workflow_step_handler`
    guard without importing `workflow`.
  - Update runtime/CLI/capability/loader/stdlib-facing tests for `workflow_py_path`,
    removed `ResolvedWorkflow.package`, and the new public primitive exports.
  - Refresh active docs and examples to import only from `autoloop` or `autoloop.simple`
    and remove forbidden compatibility terminology.
  - Treat the `cleanup.md` versus `cleanup3.md` mismatch as a pre-existing proof risk
    and touch that baseline only if the requested docs cleanup plus validation fail
    there.
  - Run the required targeted tests and then full `pytest`.
  out_of_scope:
  - Broad documentation rewrites outside the active maintained docs/test surface.
  - Behavior changes to workflow-step execution.
  - Any new migration or expansion command.
  dependencies:
  - workflow-surface-removal-and-runtime-renames
  acceptance_criteria:
  - id: AC-1
    text: Strictness tests forbid the exact removed symbols, deleted paths, and `workflow`
      import statements requested, while still allowing `workflow_package` and support-file
      `contracts.py` usage.
  - id: AC-2
    text: Active docs/examples no longer mention `workflow.primitives`, `from workflow`,
      `import workflow`, `legacy_workflow_path`, `RouteContract`, or `BoardMutation`.
  - id: AC-3
    text: The required targeted test list passes, and the final full `pytest` run
      passes.
  deliverables:
  - Updated strictness/tests/docs coverage for the final public surface.
  - Targeted and full-suite proof results.
  risks:
  - Strictness can over-ban the general word `workflow` instead of just the deleted
    imports and symbols.
  - Docs proof can fail on the pre-existing `cleanup.md` mismatch even if the requested
    docs cleanup itself is correct.
  rollback:
  - Revert only the strictness regex expansion if it blocks valid `workflow_package`
    or support-file references.
  - Revert any proof-only `cleanup.md` baseline correction separately if later repo
    history restores a different authoritative working-tree note path.
