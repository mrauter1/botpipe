phases:
- phase_id: converge-selected-workflow-serializers
  title: Converge Selected-Workflow Serializers
  objective: Centralize selected-workflow payload construction while preserving the
    current capability, authoring-surface, and decomposition artifact contracts.
  status: planned
  in_scope:
  - Refactor core/workflow_capabilities.py to expose authoritative payload builders
    for selected-workflow views.
  - Slim stdlib/adaptation.py, stdlib/refinement.py, and stdlib/decomposition.py into
    thin artifact writers over shared payload builders.
  - Keep selected_workflow_capability.json, selected_workflow_authoring_surface.json,
    and selected_workflow_decomposition_surface.json as separate artifacts.
  out_of_scope:
  - Any runtime-owned routing or execution behavior change.
  - Any new workflow package.
  - Any workflow.toml semantic expansion.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: Selected-workflow payload shaping is centralized behind shared helpers without
      changing existing artifact filenames or top-level JSON contracts.
  - id: AC-2
    text: Serializer duplication for editable path inventories, runtime test inference,
      and repo-relative path conversion is reduced in the stdlib selected-workflow
      helper family.
  deliverables:
  - Updated core/workflow_capabilities.py payload-builder helpers.
  - Migrated stdlib selected-workflow writer modules that reuse those helpers.
  risks:
  - A refactor could accidentally blur compiled capability and editable authoring
    surfaces.
  - Path-shape drift could break downstream refinement or decomposition consumers.
  rollback:
  - Revert the shared payload-builder extraction and restore the prior module-local
    serializers.
  - Keep existing artifact filenames and keys unchanged so rollback stays mechanical.
- phase_id: extract-selected-workflow-validators
  title: Extract Selected-Workflow Validators
  objective: Move repeated selected-workflow snapshot identity and alignment checks
    into shared validation helpers, then migrate the current workflow consumers.
  status: planned
  in_scope:
  - Add shared selected-workflow snapshot validators in stdlib/validation.py.
  - Migrate candidate_workflow_to_adapted_execution_plan, workflow_to_eval_suite,
    workflow_run_history_to_failure_modes, workflow_and_eval_to_refined_workflow_package,
    and workflow_package_to_composable_building_blocks.
  - Leave package-specific publication semantics inside each workflow.
  out_of_scope:
  - Generic publication-summary helpers unrelated to selected-workflow identity.
  - Portfolio/company workflow migrations that do not consume selected-workflow snapshots.
  dependencies:
  - converge-selected-workflow-serializers
  acceptance_criteria:
  - id: AC-1
    text: The affected workflows stop duplicating selected_workflow_name versus nested
      workflow_name identity checks and instead call shared validators.
  - id: AC-2
    text: Workflow-local code still owns domain-specific publication rules such as
      case counts, run-history evidence, overlay validation, and building-block policy.
  deliverables:
  - Shared validation helpers for selected-workflow capability, authoring, and decomposition
    snapshot alignment.
  - Migrated workflow packages with shorter publication and context-capture blocks.
  risks:
  - Validators could absorb workflow-specific behavior and make failures harder to
    diagnose.
  - Cross-artifact alignment helpers could inadvertently change existing error surfaces.
  rollback:
  - Restore the prior inline validation blocks in migrated workflows.
  - Limit helper scope back to serializer convergence only if validator extraction
    proves too coupled.
- phase_id: proof-docs-memory-sync
  title: Proof, Docs, And Memory Sync
  objective: Update docs and recursive memory, then run targeted proof so the selected-workflow
    seam consolidation lands with explicit boundaries and regression coverage.
  status: planned
  in_scope:
  - Update docs/authoring.md and any touched workflow docs that describe the selected-workflow
    helper family.
  - Run targeted unit and runtime suites for the migrated workflows plus architecture-baseline
    docs proof.
  - Update framework_roadmap.md, framework_gap_ledger.md, workflow_candidate_ledger.md,
    and validation_debt_ledger.md.
  out_of_scope:
  - Untargeted full-repo test expansion unless the focused proof exposes broader breakage.
  - Charter edits beyond an explicit no-doctrine-change note if needed.
  dependencies:
  - extract-selected-workflow-validators
  acceptance_criteria:
  - id: AC-1
    text: Docs describe the converged selected-workflow helper boundary without widening
      the runtime or root authoring surface.
  - id: AC-2
    text: Targeted proof covers the new shared helpers and the affected workflow family,
      and recursive memory records the resolved duplication plus any deferred local
      debt.
  deliverables:
  - Updated docs and recursive-memory files.
  - Targeted proof results for unit, runtime, and architecture-baseline doc coverage.
  risks:
  - Docs may lag the new helper boundaries and reintroduce confusion about capability
    versus authoring versus decomposition surfaces.
  - Memory updates may understate remaining workflow-local validation debt.
  rollback:
  - Revert docs and memory changes together with the helper migration if proof fails.
  - Keep the previous documented helper boundaries until targeted proof passes.
