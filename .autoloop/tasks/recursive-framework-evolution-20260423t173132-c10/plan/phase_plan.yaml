phases:
- phase_id: portfolio-health-snapshot-seam
  title: Portfolio Health Snapshot Seam
  objective: Add a narrow read-only portfolio run-health snapshot seam that governance
    workflows can publish under the workflow folder.
  status: planned
  in_scope:
  - Add shared grouped portfolio run-summary logic on top of existing read-only run
    records.
  - Extend `stdlib/portfolio.py` with `write_workflow_portfolio_health_snapshot(...)`.
  - Export the new helper from `stdlib/__init__.py`.
  - Document the helper boundary in `docs/authoring.md`.
  - Add helper coverage in `tests/unit/test_stdlib_and_extensions.py` and any targeted
    workspace summary tests.
  out_of_scope:
  - CLI changes.
  - Runtime-owned governance scoring or automatic recommendations.
  - New `workflow.toml` fields or static lifecycle metadata.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: The helper writes only under `ctx.workflow_folder` and does not mutate `.autoloop`
      run state or workflow packages.
  - id: AC-2
    text: The helper reuses shared workflow resolution and read-only run discovery
      while publishing grouped per-workflow run counts and recent-run excerpts with
      deterministic filtering.
  - id: AC-3
    text: Authoring docs and unit/runtime tests freeze the helper boundary and its
      non-goals, including no governance scoring or hidden downstream execution.
  deliverables:
  - runtime/workspace.py
  - stdlib/portfolio.py
  - stdlib/__init__.py
  - docs/authoring.md
  - tests/unit/test_stdlib_and_extensions.py
  - tests/runtime/test_workspace_and_context.py
  risks:
  - The helper may become too broad and start owning governance policy that should
    remain visible in workflow code and prompts.
  - Portfolio run-health capture may drift from the real workspace contract if it
    bypasses shared run-record seams.
  rollback:
  - Revert the additive run-summary logic, new stdlib helper/export, authoring-doc
    updates, and helper-specific tests together.
- phase_id: workflow-portfolio-to-operating-system
  title: Workflow Portfolio To Operating System
  objective: Ship `workflow_portfolio_to_operating_system` as an end-to-end governance
    workflow that turns portfolio evidence into explicit lifecycle recommendations
    and next actions.
  status: planned
  in_scope:
  - Add the workflow package under `workflows/workflow_portfolio_to_operating_system/`.
  - Implement params, contracts, explicit prompt templates, checklist asset, workflow
    logic, and publish-side validation.
  - Add the workflow decision/contract doc under `docs/workflows/workflow_portfolio_to_operating_system.md`.
  - Add runtime proof in `tests/runtime/test_workflow_portfolio_to_operating_system.py`.
  out_of_scope:
  - Auto-running builder, refinement, diagnostics, decomposition, merge, or retirement
    workflows.
  - Mutating authoritative workflow packages.
  - Public CLI or runtime-contract changes.
  dependencies:
  - portfolio-health-snapshot-seam
  acceptance_criteria:
  - id: AC-1
    text: Workflow discovery and compilation succeed from the repo root and expose
      explicit typed control contracts on the three pair steps.
  - id: AC-2
    text: A scripted runtime proof publishes the capability snapshot, health snapshot,
      lifecycle matrix, governance package, next actions, and deterministic receipt
      from mixed portfolio evidence.
  - id: AC-3
    text: Publish-time validation rejects missing capability or health artifacts,
      unknown focus-workflow references, summary drift, invalid lifecycle postures,
      and outputs that imply hidden downstream execution.
  - id: AC-4
    text: Each producer/verifier prompt makes required reads, required writes, legal
      routes, evidence expectations, and forbidden actions explicit for its step-local
      work item.
  deliverables:
  - workflows/workflow_portfolio_to_operating_system/
  - docs/workflows/workflow_portfolio_to_operating_system.md
  - tests/runtime/test_workflow_portfolio_to_operating_system.py
  risks:
  - Portfolio analysis may collapse into generic prioritization prose unless the lifecycle
    matrix and change-candidate artifacts stay explicit.
  - Governance packaging may blur into hidden execution unless the workflow stops
    at next-action publication and receipt validation.
  rollback:
  - Remove the new workflow package, workflow doc, and runtime test together if terminal
    governance publication proof does not hold.
