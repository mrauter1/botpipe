phases:
- phase_id: simple-policy-export-cleanup
  title: Clean Up Simple Policy Exports
  objective: Remove leaked policy type aliases from autoloop.simple while preserving
    canonical shared-policy exports and existing accepted policy-layer behavior.
  status: planned
  in_scope:
  - Update autoloop.simple so PolicyInput and ProviderPolicyInput are absent from
    the public module namespace.
  - Keep simple declaration annotations and normalization logic accepting Policy,
    ProviderPolicy, ProviderPolicyOverride, and None.
  - Adjust or extend surface tests to lock the export matrix and compatibility behavior.
  out_of_scope:
  - Changing the canonical PolicyInput export in autoloop.policy.
  - Changing the canonical PolicyInput export in autoloop.sdk.
  - Changing provider-policy merge semantics or adding new public aliases.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: from autoloop.simple import PolicyInput fails and getattr(autoloop.simple,
      "PolicyInput") raises AttributeError.
  - id: AC-2
    text: autoloop.simple no longer exposes ProviderPolicyInput or any replacement
      duplicate public policy type alias.
  - id: AC-3
    text: Simple workflow and step declarations continue accepting Policy, ProviderPolicy,
      ProviderPolicyOverride, and None without behavioral regression.
  - id: AC-4
    text: The required pytest commands for simple, policy, sdk facade, and sdk runtime
      policy coverage pass.
  deliverables:
  - Implementation-ready guidance for the autoloop.simple namespace cleanup.
  - Regression guard expectations for public import visibility and accepted policy
    inputs.
  risks:
  - Annotation refactoring could accidentally leave the leaked symbols public or break
    runtime type-hint resolution.
  - Over-cleaning could narrow simple declaration support for internal ProviderPolicyOverride
    usage.
  rollback:
  - Restore the pre-cleanup simple-module alias binding only long enough to isolate
    failures if internal annotation resolution breaks.
  - Reapply the cleanup with a private alias strategy that preserves runtime behavior
    but keeps public names absent.
