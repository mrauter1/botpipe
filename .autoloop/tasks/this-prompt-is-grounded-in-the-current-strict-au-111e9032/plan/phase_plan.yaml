phases:
  - phase_id: architecture-contract-freeze
    title: Freeze The Book Architecture Contract
    objective: Rewrite the architecture record, README, migration guidance, authoring docs, parity docs, risk docs, and ADR summaries so the codebase is explicitly targeting the final strict-kernel/generic-runtime/optional-extensions design before implementation work proceeds.
    status: planned
    in_scope:
      - Rewrite `ARCHITECTURE_DECISIONS.md` with candidate matrices for the final package layout, public surface, extension seam, session model, runtime boundary, stdlib, git placement, session paths, observability, and testing strategy.
      - Update `README.md`, `MIGRATION.md`, `docs/architecture.md`, `docs/authoring.md`, `docs/parity-matrix.md`, and `docs/risk-register.md` to the final requested shape.
      - Rebaseline doc-focused tests so they stop freezing the current observer-based architecture and instead freeze the requested extension-based strict surface.
      - Decide whether `docs/compatibility.md` remains as a narrow retained-compatibility note or is removed in favor of the updated migration/docs corpus.
    out_of_scope:
      - Engine, runtime, or workflow behavior changes beyond the minimum needed to keep rewritten docs/tests internally consistent.
      - Any parity behavior change not explicitly requested.
    dependencies: []
    acceptance_criteria:
      - id: AC-1
        text: The architecture record and docs describe `workflow` as the strict canonical kernel, `runtime` as workflow-agnostic, `stdlib` as tiny authoring sugar, and `extensions` as tiny optional cross-cutting modules.
      - id: AC-2
        text: The docs no longer present `workflow.observers`, compatibility-era behavior, or a broader authoring surface than the prompt allows.
      - id: AC-3
        text: Baseline documentation tests are updated to enforce the final architecture rather than the current observer-based design.
    deliverables:
      - Rewritten architecture and migration documents aligned to the prompt.
      - Updated ADR summaries reflecting the final design decisions.
      - Updated documentation baseline tests.
    risks:
      - The docs may preserve the current observer seam and pull later implementation back toward the wrong shape.
      - Narrowing the public surface in docs without updating tests could create false failures or missed regressions.
    rollback:
      - Revert the documentation and doc-test rewrite as one slice if the final architecture contract changes before implementation starts.
      - Do not mix old and new architecture assertions in the same baseline test set.

  - phase_id: strict-kernel-extension-seam
    title: Refactor The Strict Kernel
    objective: Replace the current observer-based extension story with the requested workflow-declared extension seam, narrow the canonical public surface, and enforce the final strict workflow contracts in validation, compilation, and execution.
    status: planned
    in_scope:
      - Add `autoloop_v3/workflow/extensions.py` with `RunBinding`, `StepStart`, `StepFinish`, `TerminalFinish`, `BoundWorkflowExtension`, and `WorkflowExtension`.
      - Add `Workflow.extensions` and bind/invoke extensions inside the engine without changing workflow semantics.
      - Narrow `autoloop_v3.workflow` and repo-root `workflow` to the requested canonical authoring exports.
      - Update `primitives.py`, `steps.py`, `validation.py`, `compiler.py`, `engine.py`, `context.py`, and related tests to the final contracts.
      - Remove obsolete observer-era and compatibility-era modules/tests that would leave two execution models in place.
    out_of_scope:
      - Runtime CLI/config wiring.
      - Workflow-specific parity logic, session filename policy, or git policy.
    dependencies:
      - architecture-contract-freeze
    acceptance_criteria:
      - id: AC-1
        text: The kernel exposes the requested canonical authoring surface and `workflow.primitives` surface, with no compat aliases or broad root exports left behind.
      - id: AC-2
        text: Extensions bind once per run and receive structured before-step, after-step, and terminal events without mutating workflow state or routing.
      - id: AC-3
        text: Validation, compilation, and engine behavior enforce explicit entry, strict handler signatures, required system handlers, typed checkpoints, required-artifact assertions, and deterministic routing.
    deliverables:
      - Refactored `autoloop_v3/workflow/*` kernel modules.
      - Updated repo-root `workflow/*` strict re-export shim.
      - Replacement contract tests for the final strict kernel.
    risks:
      - Carrying observers and extensions in parallel would recreate hidden architecture drift.
      - Narrowing exports could break repo-root workflows or tests if migration is incomplete.
    rollback:
      - Revert kernel export changes and extension-seam changes together if execution semantics regress.
      - Do not leave the repository in a mixed observer-plus-extension state.

  - phase_id: generic-runtime-filesystem-refactor
    title: Refactor The Generic Runtime
    objective: Reshape the runtime, filesystem stores, loader, and runner around the final strict kernel so workspace management, prompts, checkpoints, sessions, and generic events stay automatic while the runtime remains completely workflow-agnostic.
    status: planned
    in_scope:
      - Update `runtime/{runner,loader,workspace,events,prompts,config,cli}` to work with the refactored kernel and workflow-declared extensions.
      - Keep automatic request snapshots, `events.jsonl`, checkpoints, session persistence, and prompt resolution framework-owned.
      - Provide a generic session-path strategy surface without embedding Autoloop-v1 naming into runtime core.
      - Preserve generic persisted-session compatibility such as `thread_id` handling unless implementation proves a safe migration path is required.
    out_of_scope:
      - Autoloop-v1 raw log, decisions, clarification, or status policy.
      - Git commit timing/messages or workflow-specific topology semantics.
    dependencies:
      - strict-kernel-extension-seam
    acceptance_criteria:
      - id: AC-1
        text: The runtime owns only workflow-agnostic filesystem concerns and does not introduce phase, plan/implement/test, or Autoloop-specific knowledge.
      - id: AC-2
        text: The runner loads workflows strictly, binds declared extensions, persists generic events/checkpoints/sessions, and keeps deterministic prompt resolution intact.
      - id: AC-3
        text: Generic filesystem stores and runtime tests prove persisted session compatibility, checkpoint behavior, and runtime neutrality.
    deliverables:
      - Refactored runtime modules and filesystem store implementation.
      - Generic session-path strategy surface.
      - Runtime integration tests for workspace, request snapshot, checkpoints, events, sessions, prompts, and CLI wiring.
    risks:
      - Runtime refactors may accidentally absorb Autoloop-v1 policy while wiring parity-related needs.
      - Session-path strategy changes may regress existing persisted session files.
    rollback:
      - Revert runner/store/session-path changes together if runtime neutrality or persisted-session compatibility regresses.
      - Preserve any existing task/run workspace contents created during tests or local runs.

  - phase_id: stdlib-and-optional-extensions
    title: Add Tiny `stdlib` And Optional `extensions`
    objective: Introduce only the requested pure authoring helpers and optional extension families so cross-cutting concerns are reusable without turning config or inheritance into a second workflow language.
    status: planned
    in_scope:
      - Add `autoloop_v3/stdlib/{control,prompts,steps}.py` and `stdlib/state/cursor.py` with only the requested helpers.
      - Add `autoloop_v3/extensions/tracing.py`, `extensions/session_paths.py`, and `extensions/git/*`.
      - Keep git repo mechanics generic, raw delta separate from commit-eligibility filtering, and commit policy workflow-owned via typed policy/config objects.
      - Keep session-path strategy generic and tracing optional, without replacing generic `events.jsonl`.
    out_of_scope:
      - Behavioral mixins, base workflow families, decorator DSLs, metaclass magic, or config-driven topology.
      - Auto-enabling git or tracing from runtime config alone.
    dependencies:
      - strict-kernel-extension-seam
      - generic-runtime-filesystem-refactor
    acceptance_criteria:
      - id: AC-1
        text: '`stdlib` remains tiny, imports only standard library plus `autoloop_v3.workflow`, and compiles down to kernel primitives without hiding topology or workflow semantics.'
      - id: AC-2
        text: '`extensions` contains only tracing, session-path, and git, and all of them are invisible unless the workflow or harness explicitly opts in.'
      - id: AC-3
        text: Git extension tests prove generic repo mechanics, filtering, and workflow-owned policy separation without changing raw delta semantics.
    deliverables:
      - New `autoloop_v3/stdlib/*` package.
      - New `autoloop_v3/extensions/*` package with git/session-path/tracing support.
      - Unit tests covering stdlib helpers and extension helper logic.
    risks:
      - stdlib helpers may drift into a second DSL if they hide topology or semantic transitions.
      - Git/session-path extensions may accidentally encode Autoloop-v1 policy in reusable modules.
    rollback:
      - Revert `stdlib` and `extensions` as a slice if the helper surface grows beyond the requested minimal scope.
      - Keep kernel/runtime changes independent so optional packages can be removed without undoing the strict-core refactor.

  - phase_id: workflow-migrations-and-parity-harness
    title: Migrate Workflows And Parity Harnesses
    objective: Migrate `autoloop_v1.py`, `Ralph_loop.py`, and the Autoloop-v1 parity harness to the final architecture while keeping workflow semantics explicit, readable, and behaviorally equivalent to legacy Autoloop where required.
    status: planned
    in_scope:
      - Keep `autoloop_v1.py` explicit in reading order, explicit session opening, explicit transitions, inline artifact templates, and workflow-owned phase parsing.
      - Keep exact `phase_dir_key(...)` and exact Autoloop-v1 session filenames workflow-owned in conventions/parity modules, not runtime core.
      - Refactor `run_autoloop_v1(...)` into a thin composition root over generic runtime pieces plus workflow-owned parity/session-path/git policy.
      - Migrate `Ralph_loop.py` to the final strict surface and guarantee `goal_met=True` on every success route.
      - Add or update at least one unrelated toy workflow to prove generic runtime neutrality.
    out_of_scope:
      - Editing the legacy `autoloop/` oracle.
      - Introducing generic abstractions that only serve Autoloop-v1.
    dependencies:
      - strict-kernel-extension-seam
      - generic-runtime-filesystem-refactor
      - stdlib-and-optional-extensions
    acceptance_criteria:
      - id: AC-1
        text: '`autoloop_v1.py` remains at least as explicit/readable as the current strict workflow and does not reintroduce helper indirection such as `phase_artifact_template`.'
      - id: AC-2
        text: '`run_autoloop_v1(...)` is a thin composition root that wires generic runtime pieces with workflow-owned parity/session-path/git policy without teaching the runtime about phases.'
      - id: AC-3
        text: '`Ralph_loop.py` is strict, uses the canonical imports/signatures, and sets `goal_met=True` on all success paths.'
    deliverables:
      - Migrated repo-root workflows.
      - Refactored `autoloop_v3.workflows.autoloop_v1_parity` and `autoloop_v3.workflows.autoloop_v1_conventions`.
      - Workflow-focused tests for Autoloop-v1, Ralph, and at least one toy workflow.
    risks:
      - Workflow readability can regress if policy is pushed into helpers or config.
      - Parity harness refactors can silently change raw logs, decisions, or status mapping.
    rollback:
      - Revert workflow files and parity harness together if parity or readability regresses.
      - Do not partially mix old parity plumbing with new runtime/extension wiring.

  - phase_id: layered-tests-and-parity-proof
    title: Prove Strictness, Neutrality, And Parity
    objective: Replace the current test matrix with layered proof that the final architecture is strict, generic, extension-safe, and parity-correct against the legacy Autoloop runtime.
    status: planned
    in_scope:
      - Replace or rewrite unit, contract, runtime, strictness, workflow, and parity tests to match the final architecture.
      - Add parity proof against `autoloop/` for workspace layout, request snapshot, checkpoints, sessions, logs, decisions, clarification persistence, status mapping, and final run behavior.
      - Run the full suite and fix all regressions discovered during the refactor.
    out_of_scope:
      - New features beyond the requested architecture and parity proof.
      - Relaxing failing parity requirements by weakening assertions instead of fixing behavior.
    dependencies:
      - architecture-contract-freeze
      - strict-kernel-extension-seam
      - generic-runtime-filesystem-refactor
      - stdlib-and-optional-extensions
      - workflow-migrations-and-parity-harness
    acceptance_criteria:
      - id: AC-1
        text: The test suite proves the final strict public surface, no-compat guarantees, runtime neutrality, extension lifecycle semantics, workflow behavior, and legacy Autoloop-v1 parity requirements.
      - id: AC-2
        text: Full-suite results are clean, and any remaining residual risks are documented explicitly rather than hidden by weakened assertions.
      - id: AC-3
        text: The final plan/reporting artifacts can point to concrete passing tests for every major architectural claim in the request.
    deliverables:
      - Rewritten layered test suite.
      - Passing parity proof against the legacy `autoloop/` oracle.
      - Final verification notes suitable for the implementation report.
    risks:
      - Architectural changes may pass unit tests while missing a parity regression without end-to-end oracle checks.
      - Old tests may be accidentally retained and keep asserting the obsolete architecture.
    rollback:
      - Revert test rewrites only together with the code slice they validate if they prove to be asserting the wrong contract.
      - Treat unresolved parity failures as blockers rather than downgrading assertions.
