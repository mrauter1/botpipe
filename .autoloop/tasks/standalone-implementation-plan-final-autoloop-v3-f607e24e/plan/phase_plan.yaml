phases:
- phase_id: retry-aware-event-validation
  title: Retry-Aware Event Validation
  objective: Centralize Event validation in the engine and route provider-attributable
    invalid events through the existing retry loop without weakening strictness.
  status: planned
  in_scope:
  - Add _validate_event(...) in core/engine.py and reuse shared reserved-route payload
    checks where it reduces duplication safely.
  - Wire Event validation into system-step results, workflow-step child-result mapping,
    middleware-produced events, candidate events, and final events.
  - Preserve ProviderExecutionError retry metadata for provider-attributable invalid
    events and WorkflowExecutionError for deterministic workflow-code invalid events.
  - Add targeted retry and hard-failure tests for invalid question/blocked/failed
    payloads, hook retagging, and malformed child-workflow pause/fail mapping.
  out_of_scope:
  - Any new retry loop or checkpoint format.
  - Provider/model/effort override changes for simple declarations.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: Provider-attributable invalid Events raise ProviderExecutionError with retry
      metadata kind illegal_route or invalid_payload and retry when policy allows.
  - id: AC-2
    text: Deterministic invalid Events from system steps, workflow-step mapping, or
      explicit hook Events fail immediately with WorkflowExecutionError.
  - id: AC-3
    text: Invalid PAUSE/FAIL events are rejected before checkpointing and cannot be
      persisted.
  deliverables:
  - A concrete engine plan covering helper signatures, provider attribution rules,
    and exact validation call sites.
  - Targeted test additions for provider retries, retry exhaustion, system-step failures,
    hook behavior, and workflow-step child mapping.
  risks:
  - Misclassifying hook or middleware results could retry deterministic bugs.
  - Validating at the wrong stage could bypass artifact validation or double-raise.
  rollback:
  - Back out only the new Event-validation wiring if it destabilizes execution flow,
    while keeping the tests that define the intended behavior.
- phase_id: workflow-step-cleanup-and-effect-pruning
  title: Workflow-Step Cleanup And Effect Pruning
  objective: Delete generated workflow-step handler residue and remove the unimplemented
    BoardMutation surface from active code and exports.
  status: planned
  in_scope:
  - Remove generated workflow-step helper functions and now-unused imports from core/validation.py.
  - Confirm workflow_step(...) lowers only to core.steps.WorkflowStep and never installs
    on_<step> handlers.
  - Delete BoardMutation or make it private and unreachable, then remove engine, validation,
    export, doc, and test references.
  out_of_scope:
  - Any new workflow authoring API.
  - Reintroducing generated system-handler fallback paths.
  dependencies:
  - retry-aware-event-validation
  acceptance_criteria:
  - id: AC-1
    text: Compiled simple workflow steps are WorkflowStep instances with kind workflow
      and no compiled system handler.
  - id: AC-2
    text: Workflow classes do not receive generated on_<step> handlers.
  - id: AC-3
    text: BoardMutation is not importable from autoloop or core and is absent from
      active engine/validation branches.
  deliverables:
  - A deletion plan for dead workflow-step helper code plus simple-surface regression
    assertions.
  - A public-surface cleanup plan for BoardMutation across code, docs, and tests.
  risks:
  - Hidden dependence on generated handler installation could surface only in integration
    tests.
  - BoardMutation mentions may linger in docs or test fixtures after code deletion.
  rollback:
  - If workflow-step cleanup exposes an unexpected dependency, restore only the minimal
    deleted helper code temporarily and keep BoardMutation removal isolated.
- phase_id: route-info-rename-and-payload-cleanup
  title: Route-Info Rename And Payload Cleanup
  objective: Rename remaining stdlib contracts terminology and remove contracts_path
    from discovery, capability, and CLI payloads while keeping contracts.py discoverable
    through spec_paths.
  status: planned
  in_scope:
  - Rename stdlib/contracts.py to stdlib/route_infos.py and rename the helper functions
    to review_gate_infos(...) and publication_gate_infos(...).
  - Remove contracts_path and contracts_path_repo_relative from WorkflowCatalogEntry,
    WorkflowCapabilityEntry, selected-workflow payload builders, and runtime CLI JSON.
  - Delete contracts-path helper functions and include contracts.py in spec_paths
    and editable_paths when present.
  - Update tests that assert stdlib exports, catalog discovery, capability payloads,
    authoring surfaces, and decomposition payloads.
  out_of_scope:
  - Keeping aliases for the old stdlib helper names.
  - Changing runtime workflow resolution semantics beyond spec/support-file discovery.
  dependencies:
  - workflow-step-cleanup-and-effect-pruning
  acceptance_criteria:
  - id: AC-1
    text: stdlib/contracts.py, review_gate_contracts, and publication_gate_contracts
      are gone from active source.
  - id: AC-2
    text: contracts_path and contracts_path_repo_relative are absent from public capability,
      authoring-surface, decomposition, and CLI payloads.
  - id: AC-3
    text: contracts.py appears through spec_paths and therefore editable_paths when
      present.
  deliverables:
  - A rename map for stdlib exports and imports.
  - A payload-surface cleanup plan covering catalog entries, capability entries, JSON
    payload builders, and associated tests.
  risks:
  - Stale payload assertions are spread across multiple unit suites.
  - contracts.py support could be accidentally dropped instead of being normalized
    into spec_paths.
  rollback:
  - Do not restore contracts_path; if tests fail, fix callers to consume spec_paths/editable_paths
    instead.
- phase_id: strictness-and-doc-refresh
  title: Strictness And Documentation Refresh
  objective: Make removal of obsolete concepts enforceable and refresh stale compatibility
    language to match the greenfield authoring model.
  status: planned
  in_scope:
  - Expand tests/strictness/test_no_compat.py to scan the maintained tree for removed
    route-contract, contracts_path, BoardMutation, and generated-handler terms.
  - Add public API assertions for removed BoardMutation exports and workflow/primitives.py
    authoring-surface restrictions.
  - Update stale docstrings and docs in autoloop/, workflow/, and docs/ to remove
    additive, legacy, and future-lowering wording.
  - Keep workflow/primitives.py as a runtime primitive shim only and ensure docs import
    from autoloop.simple or autoloop.
  out_of_scope:
  - Restoring workflow or workflow.primitives as public authoring surfaces.
  - Archival-doc cleanup outside the maintained active tree.
  dependencies:
  - route-info-rename-and-payload-cleanup
  acceptance_criteria:
  - id: AC-1
    text: Strictness tests fail if removed compatibility terms or generated-handler
      identifiers reappear in active source/docs.
  - id: AC-2
    text: Public docs and docstrings describe autoloop.simple or autoloop as the active
      authoring surface.
  - id: AC-3
    text: workflow.primitives exports runtime primitives only and does not advertise
      authoring helpers or step classes.
  deliverables:
  - An anti-regression token scan plan with active-root scope and exclusions.
  - A documentation refresh checklist for active modules and docs.
  risks:
  - The strictness test can produce false positives if forbidden strings are written
    directly in the test body.
  - Doc refresh may miss non-obvious stale wording in module docstrings.
  rollback:
  - If the scan is too broad, narrow exclusions precisely rather than weakening the
    forbidden token set.
- phase_id: repository-verification
  title: Repository Verification
  objective: Run targeted and full verification so the cleanup lands with enforced
    invariants and no silent compatibility drift.
  status: planned
  in_scope:
  - Run targeted pytest suites for engine retries, simple-surface lowering, stdlib/capability
    payloads, and strictness/docs.
  - Run full pytest after targeted suites pass.
  - Run any existing lightweight repo-standard lint/type command if one is already
    established.
  out_of_scope:
  - Adding new infrastructure for verification.
  - Relaxing assertions to preserve removed compatibility surfaces.
  dependencies:
  - strictness-and-doc-refresh
  acceptance_criteria:
  - id: AC-1
    text: Targeted suites covering the edited surfaces pass before the full repository
      test run.
  - id: AC-2
    text: Full pytest passes with the new event-validation, export, payload, and strictness
      expectations.
  - id: AC-3
    text: Any remaining failures are triaged as pre-existing or fixed without restoring
      removed surfaces.
  deliverables:
  - A verification sequence that starts with focused suites and ends with full pytest.
  - A rollback note stating that deprecated surfaces stay removed even if callers/tests
    must be updated.
  risks:
  - Failures may appear late because payload and doc assertions are distributed broadly.
  - Existing compatibility-oriented tests may need replacement rather than patching.
  rollback:
  - Revert only the latest unstable code change, not the intentionally removed public
    surfaces, and rerun the focused suites first.
