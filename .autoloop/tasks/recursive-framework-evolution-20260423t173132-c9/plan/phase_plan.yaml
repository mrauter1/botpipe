phases:
- phase_id: diagnostic-run-history-seam
  title: Diagnostic Run-History Seam
  objective: Add a narrow read-only snapshot seam that lets workflows capture one
    selected workflow's run history as a workflow-local diagnostic artifact.
  status: planned
  in_scope:
  - Extend `runtime/workspace.py` read-only run records with the source paths needed
    for diagnostics.
  - Add `stdlib/diagnostics.py` with `write_selected_workflow_run_history_snapshot(...)`.
  - Export the new helper from `stdlib/__init__.py`.
  - Document the helper boundary in `docs/authoring.md`.
  - Extend helper coverage in `tests/unit/test_stdlib_and_extensions.py`.
  out_of_scope:
  - CLI changes.
  - Runtime-owned diagnostics automation or auto-indexing.
  - New `workflow.toml` semantics.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: The helper writes only under `ctx.workflow_folder` and does not mutate `.autoloop`
      run state or selected workflow files.
  - id: AC-2
    text: The helper reuses shared workflow resolution and read-only run discovery
      while capturing normalized run metadata, request text, parsed events, and parsed
      child-run records with deterministic filtering.
  - id: AC-3
    text: Authoring docs and unit tests freeze the helper boundary and its non-goals,
      including no runtime-owned failure-mode policy.
  deliverables:
  - '`runtime/workspace.py`'
  - '`stdlib/diagnostics.py`'
  - '`stdlib/__init__.py`'
  - '`docs/authoring.md`'
  - '`tests/unit/test_stdlib_and_extensions.py`'
  risks:
  - The helper may become too broad and start owning diagnostic policy that should
    remain visible in workflow code.
  - Run-history capture may drift from the real workspace contract if it bypasses
    shared loader or run-record seams.
  rollback:
  - Revert the additive run-record exposure, new stdlib helper, export, authoring-doc
    updates, and helper-specific unit tests together.
- phase_id: workflow-run-history-to-failure-modes
  title: Workflow Run History To Failure Modes
  objective: Ship `workflow_run_history_to_failure_modes` as a reusable diagnostic
    building block that turns selected-workflow history into failure modes, recurring
    weak points, and ranked next actions.
  status: planned
  in_scope:
  - Add the workflow package under `workflows/workflow_run_history_to_failure_modes/`.
  - Implement params, contracts, explicit prompt templates, checklist asset, workflow
    logic, and publish-side validation.
  - Add the workflow decision/contract doc under `docs/workflows/workflow_run_history_to_failure_modes.md`.
  - Add runtime proof in `tests/runtime/test_workflow_run_history_to_failure_modes.py`.
  out_of_scope:
  - Auto-running refinement or portfolio-governance workflows.
  - Mutating the authoritative selected workflow package.
  - Public CLI or runtime-contract changes.
  dependencies:
  - diagnostic-run-history-seam
  acceptance_criteria:
  - id: AC-1
    text: Workflow discovery and compilation succeed from the repo root and expose
      explicit typed control contracts on the three pair steps.
  - id: AC-2
    text: A scripted runtime proof publishes selected-workflow history, failure-mode
      artifacts, ranked improvement artifacts, and a deterministic receipt from mixed
      historical evidence.
  - id: AC-3
    text: Publish-time validation rejects empty filtered histories, selected-workflow
      mismatches, missing diagnostic artifacts, and outputs that leave workflow-local
      scope or imply hidden downstream execution.
  - id: AC-4
    text: Each producer/verifier prompt makes required reads, required writes, legal
      routes, evidence expectations, and forbidden actions explicit for its step-local
      work item.
  deliverables:
  - '`workflows/workflow_run_history_to_failure_modes/`'
  - '`docs/workflows/workflow_run_history_to_failure_modes.md`'
  - '`tests/runtime/test_workflow_run_history_to_failure_modes.py`'
  risks:
  - Failure-mode clustering may duplicate repeated retries or miss contrast from non-failed
    runs unless the history scope stays explicit.
  - Diagnostic packaging may blur into refinement unless the workflow stops at next-action
    recommendations and receipt publication.
  rollback:
  - Remove the new workflow package, workflow doc, and runtime test together if terminal
    diagnostic publication proof does not hold.
