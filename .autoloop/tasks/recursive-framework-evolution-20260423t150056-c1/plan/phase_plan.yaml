phases:
- phase_id: route-contract-normalization
  title: Normalize Route Contracts
  objective: Add an additive typed and normalized route-contract seam so evidence
    requirements and work-item effects are explicit without widening the runtime/provider
    boundary.
  status: planned
  in_scope:
  - Add a strict-surface route-contract helper and internal normalization for step
    route contracts.
  - Validate normalized route contracts against legal routes and known artifact names.
  - Keep existing mapping-style route contracts valid for current workflow packages.
  - Add targeted unit and contract coverage for the normalized route-contract surface.
  out_of_scope:
  - Public CLI syntax changes.
  - Recursive wrapper/template cleanup unless required to unblock the new workflow
    proof.
  - Broader workflow-composition runtime machinery.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: Workflow authors can declare typed route contracts while existing mapping-style
      route contracts still compile unchanged.
  - id: AC-2
    text: Normalized route contracts expose summary, required_artifacts, and work_item_effect
      semantics through the existing runtime-injected control contract only.
  - id: AC-3
    text: Validation and contract tests prove route legality, artifact-name checking,
      and backward-compatible behavior.
  deliverables:
  - Framework code for route-contract helper export, normalization, and validation.
  - Updated tests covering normalized and legacy route-contract declarations.
  risks:
  - Backward-compatibility regressions in the shipped workflow-builder package if
    normalization is too strict.
  - Over-validating artifact references may block legitimate upstream-evidence routes
    if inventory handling is wrong.
  rollback:
  - Revert the route-contract helper and normalization changes if existing packages
    no longer compile or runtime contract tests regress.
- phase_id: release-go-no-go-package
  title: Ship Release Go No-Go Workflow
  objective: Implement the end-to-end workflow package `release_candidate_to_go_no_go`
    with explicit prompts, artifact contracts, route grammar, and workflow-specific
    proof.
  status: planned
  in_scope:
  - Create the workflow package under workflows/ with manifest, workflow class, parameters,
    prompts, assets, and route contracts.
  - Add workflow-local docs and a runtime test that exercises the package with a scripted
    provider.
  - Use deterministic bootstrap and publish steps plus explicit producer/verifier
    work items for framing, evidence, assessment, and package assembly.
  - Keep artifact ownership, rework, and replan boundaries explicit in the package
    design.
  out_of_scope:
  - Authoring additional domain workflows in the same cycle.
  - Introducing hidden generator layers or runtime-only release heuristics.
  - General recursive wrapper/template remediation outside files touched by the new
    workflow.
  dependencies:
  - route-contract-normalization
  acceptance_criteria:
  - id: AC-1
    text: The repository contains a discoverable `release_candidate_to_go_no_go` package
      with explicit prompts, route grammar, and artifact-first step contracts.
  - id: AC-2
    text: The workflow produces a concrete release decision package and deterministic
      terminal receipt rather than only prose commentary.
  - id: AC-3
    text: Workflow-specific tests prove discovery, compilation, legal route flow,
      and creation of the terminal artifacts.
  deliverables:
  - New workflow package files under workflows/release_candidate_to_go_no_go/.
  - Workflow documentation under docs/workflows/release_candidate_to_go_no_go.md.
  - Workflow-specific runtime test coverage for the release decision package.
  risks:
  - The workflow may sprawl if evidence collection and assessment are not kept as
    separate coherent work items.
  - Missing or weak repo evidence could cause false confidence unless prompts and
    routes treat gaps as blockers or replan triggers.
  rollback:
  - Remove the release workflow package, its docs, and its test file if the package
    cannot be verified safely.
- phase_id: proof-docs-and-recursive-memory
  title: Close With Proof And Memory
  objective: Validate the shipped framework and workflow changes, capture residual
    risks, and update standing memory so later cycles inherit the right next moves.
  status: planned
  in_scope:
  - Run targeted regression and workflow-specific validation for the changed framework
    seam and new workflow package.
  - Update docs and recursive memory files to record the chosen addition, deferred
    candidates, chosen framework improvement, and known residual gaps.
  - Record compatibility notes, rollback-safe residuals, and non-obvious decisions
    in task artifacts and shared decisions.
  out_of_scope:
  - Unrelated repository cleanup.
  - Claiming full package-cli wrapper/template parity if recursive_autoloop remains
    untouched.
  - Editing verifier-owned criteria.md.
  dependencies:
  - release-go-no-go-package
  acceptance_criteria:
  - id: AC-1
    text: Targeted validation passes for the normalized route-contract seam and the
      new release workflow package, or any remaining residual is explicitly documented
      as out of scope.
  - id: AC-2
    text: Recursive memory files capture the release workflow choice, the deferred
      incident workflow, the builder-is-credible rationale, and the route-contract
      improvement.
  - id: AC-3
    text: The final change set remains scoped to the chosen framework seam, the release
      workflow package, targeted docs/tests, task artifacts, and required standing
      memory files.
  deliverables:
  - Validation evidence and closeout notes for the changed framework seam and new
    workflow.
  - Updated recursive memory files under .autoloop_recursive/.
  - Task-local feedback and shared decisions capturing the chosen direction and residual
    proof risk.
  risks:
  - Known recursive wrapper/template failures may still appear if broader CLI suites
    are run indiscriminately.
  - Recursive memory updates may accidentally preserve stale path references if not
    updated deliberately.
  rollback:
  - Keep proof scoped to targeted suites and remove the new workflow package if clean
    evidence cannot be produced.
