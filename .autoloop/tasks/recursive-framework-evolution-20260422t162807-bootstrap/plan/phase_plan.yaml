phases:
- phase_id: core-kernel-split
  title: Core Kernel Split
  objective: Move the internal kernel from autoloop_v3.workflow to autoloop_v3.core
    while preserving a strict top-level workflow authoring shim.
  status: planned
  in_scope:
  - Create autoloop_v3/core from the current workflow implementation modules.
  - Rewrite workflow/__init__.py and workflow/primitives.py as strict re-export shims
    for the approved authoring surface.
  - Update internal imports across runtime, stdlib, extensions, docs, and tests to
    point at autoloop_v3.core.
  - Add shim-surface tests that prevent engine/compiler/provider/store internals from
    leaking through workflow.
  out_of_scope:
  - Workflow package discovery and manifest scanning.
  - Workspace layout changes.
  - Public CLI redesign.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: Internal implementation modules live under autoloop_v3.core and runtime/extensions/stdlib
      no longer depend on autoloop_v3.workflow as the kernel namespace.
  - id: AC-2
    text: The top-level workflow authoring surface still supports the required imports
      and exposes no engine/compiler internals or compatibility aliases.
  deliverables:
  - autoloop_v3/core package populated from the existing kernel modules
  - workflow shim modules with strict exports
  - Updated import graph and shim regression tests
  risks:
  - Circular imports or accidental public-surface leaks during the package split.
  rollback:
  - Revert the package move and shim rewrite together if import or shim-surface tests
    fail.
- phase_id: workflow-package-discovery
  title: Workflow Package Discovery
  objective: Turn repo-root workflows/ into the real workflow namespace, migrate existing
    workflows into packages, and discover them through workflow.toml.
  status: planned
  in_scope:
  - Create regular workflow packages under workflows/ with __init__.py, workflow.py,
    and workflow.toml.
  - Migrate ../autoloop_v1.py into workflows/autoloop_v1/ and ../Ralph_loop.py into
    workflows/ralph_loop/.
  - Add discovery helpers in runtime/loader.py that scan <root>/workflows/*/workflow.toml
    and validate the package contract.
  - Resolve package-local prompts and assets from the workflow package root rather
    than cwd.
  out_of_scope:
  - Task/workflow/run workspace layout migration.
  - Package-based CLI commands.
  dependencies:
  - core-kernel-split
  acceptance_criteria:
  - id: AC-1
    text: Discovery lists packaged workflows from repo-root workflows/ and fails early
      for missing required files or bad __init__.py exports.
  - id: AC-2
    text: Direct imports such as from workflows.autoloop_v1 import AutoloopV1 and
      from workflows.ralph_loop import RalphLoop work without raw-target loading.
  - id: AC-3
    text: Relative prompt resolution prefers the workflow package root and never falls
      back to cwd.
  deliverables:
  - workflow package tree under repo-root workflows/
  - Manifest-driven discovery APIs
  - Migrated autoloop_v1 and ralph_loop packages
  risks:
  - Name drift between package directory, manifest metadata, and import path.
  - Prompt-path regressions during workflow migration.
  rollback:
  - Revert package migration and discovery changes together if packaged workflows
    are not importable.
- phase_id: workspace-message-model
  title: Workspace And Message Model
  objective: Replace the task-only run layout with task -> workflow -> runs and make
    message snapshots and bindings match the new scope model.
  status: planned
  in_scope:
  - Add TaskWorkspace, WorkflowWorkspace, and RunWorkspace support for .autoloop/tasks/<task>/wf_<workflow>/runs/<run>.
  - Create task-level messages.jsonl and current request.md plus run-local immutable
    request snapshots.
  - Persist workflow.json and run.json metadata for workflow scope and run scope.
  - Extend Context, RunBinding, and artifact placeholders with workflow_name, workflow_folder,
    package_folder, and workflow_params.
  - Keep checkpoint.json, sessions/, trace.jsonl, and other run artifacts run-local.
  out_of_scope:
  - Public CLI subcommand redesign.
  - Child workflow invocation.
  dependencies:
  - workflow-package-discovery
  acceptance_criteria:
  - id: AC-1
    text: New runs create .autoloop/tasks/<task-id>/wf_<workflow-name>/runs/<run-id>/
      with task-, workflow-, and run-scoped files in the expected locations.
  - id: AC-2
    text: messages.jsonl is append-only, task request.md reflects the latest task
      message state, and each run keeps an immutable request.md snapshot.
  - id: AC-3
    text: Artifact templates and extension bindings can resolve task_folder, workflow_folder,
      run_folder, package_folder, workflow_name, and state values correctly.
  deliverables:
  - New workspace abstractions and pathing logic
  - Message ledger and request snapshot persistence
  - Binding and placeholder contract updates with integration tests
  risks:
  - Resume/checkpoint/session lookups may break during path migration.
  rollback:
  - Revert workspace, metadata, and binding changes as one slice if run/resume tests
    fail.
- phase_id: package-cli-and-params
  title: Package CLI And Parameters
  objective: Replace the raw-target public runtime path with package-based CLI commands
    and validated workflow-specific parameters.
  status: planned
  in_scope:
  - Replace runtime/cli.py with the required package-based subcommand tree.
  - Make runtime/runner.py execute discovered workflow packages only.
  - Add repeatable -wf <name> <value> parsing and validation/coercion through an optional
    workflow Parameters model.
  - Persist resolved workflow parameters in run.json and keep them immutable for the
    life of the run.
  - Remove public raw module/file/class targeting and request_text/intent_mode semantics
    from the CLI.
  out_of_scope:
  - Child workflow invocation internals.
  - Autoloop-v1 parity migration.
  dependencies:
  - workspace-message-model
  acceptance_criteria:
  - id: AC-1
    text: The public CLI exposes only the package-based commands required by the request
      and rejects raw workflow targets and --class-name.
  - id: AC-2
    text: autoloop run/resume/answer operate on discovered package names and resolve
      the latest resumable run when --run-id is omitted.
  - id: AC-3
    text: -wf arguments are parsed as ordered pairs, validated by the target workflow
      package, persisted in run.json, and rejected when unknown or invalid.
  deliverables:
  - Rewritten runtime/cli.py and package-aware runtime/runner.py
  - Workflow-parameter validation path
  - CLI integration tests for run/resume/answer/workflows/runs/logs/init
  risks:
  - CLI removal may strand existing capabilities if packaged workflow execution is
    incomplete.
  - Resume resolution may become ambiguous without careful workflow/task scoping.
  rollback:
  - Revert the CLI and runner switch together; do not leave raw and package entrypoints
    mixed publicly.
- phase_id: subworkflow-and-parity
  title: Subworkflow Invocation And Parity
  objective: Add first-class child workflow execution and migrate Autoloop-v1 parity
    into package-local code that runs through the general runtime.
  status: planned
  in_scope:
  - Add Context.invoke_workflow(...) backed by a runtime invoker service.
  - Support child invocation by workflow package name and by imported workflow class.
  - Create parent/child metadata through children.jsonl and parent.json without nested
    folders.
  - Extend StepFinish with producer_raw_output and verifier_raw_output.
  - Move Autoloop-v1 parity logic into workflows/autoloop_v1/parity.py and workflows/autoloop_v1/conventions.py
    and delete run_autoloop_v1.
  out_of_scope:
  - Repository-wide docs rewrite and final cleanup sweep.
  dependencies:
  - package-cli-and-params
  acceptance_criteria:
  - id: AC-1
    text: A runtime-backed workflow can invoke a child by class or package name, and
      the child runs under the same task with its own workflow scope and run scope.
  - id: AC-2
    text: Parent runs write children.jsonl, child runs write parent.json, and no implicit
      session inheritance occurs between parent and child.
  - id: AC-3
    text: Autoloop-v1 parity artifacts and status mappings are reproduced through
      the general runtime only, with no framework-owned parity harness remaining.
  deliverables:
  - Runtime workflow invoker and invocation result contract
  - Parent/child run metadata support
  - Package-local Autoloop-v1 parity implementation and regression tests
  risks:
  - Recursive invocation bugs or parity gaps after removing the special harness.
  rollback:
  - Revert invoke_workflow and parity migration together if parent/child or Autoloop-v1
    parity tests regress.
- phase_id: git-docs-tests-cleanup
  title: Workflow Git Scope And Cleanup
  objective: Finish the redesign by scoping git tracking to workflow_folder, rewriting
    docs/tests, and removing the explicitly abandoned compatibility-only behavior.
  status: planned
  in_scope:
  - Change git tracking defaults and helper naming from task scope to workflow scope.
  - Remove .superloop fallback, superloop.* config discovery, legacy thread_id/session
    compatibility, and compatibility-only public loaders/status behavior.
  - Rewrite docs to describe autoloop_v3.core, workflow packages, package-based CLI,
    the message model, and the task -> workflow -> runs layout.
  - Rewrite tests to cover the requested discovery, CLI, workspace, placeholder, child-run,
    git-scope, tracing, Autoloop-v1 parity, and strict shim behavior.
  - Add final grep-style guards for forbidden legacy public terms and removed entrypoints.
  out_of_scope:
  - New plugin systems or additional extension seams.
  dependencies:
  - subworkflow-and-parity
  acceptance_criteria:
  - id: AC-1
    text: Git tracking defaults to workflow_folder and tests prove commits do not
      spill across workflows on the same task.
  - id: AC-2
    text: Docs no longer describe autoloop_v3.workflow as the kernel, framework-owned
      autoloop_v3.workflows helpers, raw-target CLI, retained compatibility posture,
      or the old workspace layout.
  - id: AC-3
    text: Compatibility-only runtime code and tests for thread_id, superloop.*, legacy
      status handling, and raw-target public execution are removed or redesigned in
      line with the new architecture.
  deliverables:
  - Workflow-scoped git tracking implementation
  - Rewritten docs and tests
  - Final compatibility cleanup and forbidden-surface guards
  risks:
  - Stale docs/tests may continue to encode removed behavior and hide regressions.
  rollback:
  - Revert the cleanup slice if rewritten docs/tests do not align with the final runtime
    behavior.
