phases:
- phase_id: typed-publication-contracts
  title: Typed Publication Contracts
  objective: Define workflow-local typed artifact contracts for the governance and
    diagnostic publish surfaces that still hand-parse summary or manifest JSON.
  status: planned
  in_scope:
  - Add JsonArtifactSpec-backed summary or manifest models in the target workflow
    contracts modules.
  - Preserve existing artifact filenames, JSON keys, enum values, and publication-boundary
    literals.
  - Keep domain-specific publication policy out of runtime-owned code.
  out_of_scope:
  - New workflows
  - CLI changes
  - workflow.toml schema changes
  - Runtime-owned publication orchestration
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: The target contracts modules expose typed artifact specs for the currently
      hand-parsed publication summaries or manifests without changing artifact names
      or boundary strings.
  - id: AC-2
    text: Any new helper remains additive, authoring-only, and mechanical rather than
      moving workflow-specific policy into runtime or stdlib.
  deliverables:
  - Workflow-local typed publication contract constants and payload models for the
    target governance and diagnostic family.
  - A narrowed implementation boundary for the subsequent workflow migrations.
  risks:
  - Over-typing could accidentally narrow accepted JSON shape earlier than the current
    handlers.
  - A new helper seam could become broader than the actual repeated pattern.
  rollback:
  - Drop the new contract constants and models while keeping the existing raw publish
    handlers unchanged.
  - Revert any helper addition that is not reused cleanly by the scoped workflows.
- phase_id: workflow-publication-migration
  title: Workflow Publish Migration
  objective: Refactor the target publish handlers to consume typed artifacts first
    and leave only cross-artifact and state-alignment checks inline.
  status: planned
  in_scope:
  - Migrate workflow_portfolio_to_operating_system publish-time summary handling.
  - Migrate company_operation_to_recursive_improvement_cycle publish-time summary
    handling.
  - Migrate workflow_run_history_to_failure_modes publish-time manifest and summary
    handling.
  - Include refinement or decomposition publish handlers only if they fit the exact
    same seam without widening scope.
  out_of_scope:
  - Prompt rewrites unrelated to the publish surface
  - Runtime/provider behavior changes
  - Artifact name changes
  dependencies:
  - typed-publication-contracts
  acceptance_criteria:
  - id: AC-1
    text: Target publish handlers stop using raw summary or manifest dict unpacking
      for the migrated artifacts and instead read typed models.
  - id: AC-2
    text: Cross-artifact drift checks, workflow-state alignment, hidden-execution
      checks, and markdown-boundary assertions remain explicit and behavior-compatible.
  - id: AC-3
    text: Targeted runtime tests cover the migrated publish paths and preserve receipt
      contents plus artifact compatibility.
  deliverables:
  - Shorter, clearer publish handlers in the target workflows.
  - Updated runtime and unit tests for the migrated contract surface.
  risks:
  - Existing tests may rely on exact error messages or validation order.
  - Secondary follow-on scope could dilute the core convergence goal.
  rollback:
  - Restore the previous raw publish-handler parsing if typed reads introduce incompatible
    behavior.
  - Defer refinement or decomposition migration and record it as residual debt instead
    of forcing it into this cycle.
- phase_id: proof-docs-memory-closeout
  title: Proof And Memory Closeout
  objective: Prove the migration, update authoring guidance, and record the consolidation
    outcome in recursive memory without changing public behavior.
  status: planned
  in_scope:
  - Run targeted unit, runtime, and docs proof.
  - Update docs/authoring.md with the typed publication-artifact preference.
  - Update the charter, roadmap, gap ledger, workflow candidate ledger, and validation
    debt ledger with the audit, outcome, and deferred debt.
  - Record boilerplate and readability metrics for the cycle closeout.
  out_of_scope:
  - Unrelated memory cleanup
  - Additional workflow additions after proof
  dependencies:
  - workflow-publication-migration
  acceptance_criteria:
  - id: AC-1
    text: The targeted proof suite passes for the migrated workflows and shared stdlib/docs
      coverage.
  - id: AC-2
    text: Authoring docs plus the charter, roadmap, gap ledger, workflow candidate
      ledger, and validation debt ledger explicitly describe the typed publication-contract
      boundary and any remaining deferred debt.
  - id: AC-3
    text: The closeout records that CLI behavior, workflow.toml semantics, runtime/provider
      boundaries, and ctx.invoke_workflow compatibility remain unchanged.
  deliverables:
  - Updated authoring guidance and recursive-memory ledgers.
  - A synchronized charter update or explicit charter-review note aligned with the
    cycle outcome.
  - Recorded proof results and cycle metrics.
  risks:
  - Docs or memory may drift from the actual implementation if proof is not run after
    the final code shape.
  - Residual debt could be left implicit and rediscovered later.
  rollback:
  - Revert docs and recursive-memory updates that no longer match the implemented
    seam.
  - Keep the cycle open until proof and memory reflect the final migrated behavior.
