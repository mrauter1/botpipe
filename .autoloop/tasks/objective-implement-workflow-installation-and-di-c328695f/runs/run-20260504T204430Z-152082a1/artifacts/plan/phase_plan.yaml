phases:
- phase_id: close-validation-gaps
  title: Close Validation Gaps
  objective: Align the remaining workflow reference and packaging smoke tests with
    the shipped discovery contract, then validate the affected runtime/package slice.
  status: planned
  in_scope:
  - Update tests/runtime/test_workflow_reference_resolution.py so implicit bare-name
    and alias coverage only targets autoloop/workflows and {workspace}/.autoloop/workflows.
  - Keep {workspace}/workflows coverage only through explicit filesystem-path references,
    and remove or relocate any workspace workflows.* module-reference expectations.
  - Align workspace-isolated module assertions with the _autoloop_workspace_workflows.<hash>
    namespace emitted by the loader.
  - Make tests/runtime/test_wheel_packaging_smoke.py runnable without assuming the
    validation interpreter already has the build frontend installed.
  - Re-run the named runtime and packaging suites in the normal project validation
    environment.
  out_of_scope:
  - Changing the runtime discovery implementation to restore legacy implicit bare-name
    lookup from {workspace}/workflows.
  - Broad packaging or dependency-management refactors outside the wheel smoke’s immediate
    build frontend dependency.
  - Unrelated runtime or workflow-surface test cleanup.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: No reference-resolution test still expects implicit bare-name or alias discovery
      from {workspace}/workflows.
  - id: AC-2
    text: Workspace-isolated import assertions match the loader’s _autoloop_workspace_workflows.<hash>
      namespace for explicit workspace-path loads, and no workspace workflows.* module-reference
      expectation remains in scope.
  - id: AC-3
    text: The wheel packaging smoke builds a wheel in the standard validation environment
      without relying on a globally installed build module, while preserving the existing
      install and packaged-asset checks.
  - id: AC-4
    text: tests/runtime/test_workflow_reference_resolution.py, tests/runtime/test_workflow_catalog_roots.py,
      tests/runtime/test_runtime_cli_metadata_integration.py, tests/runtime/test_package_cli.py,
      and tests/runtime/test_wheel_packaging_smoke.py pass in the standard project
      validation environment.
  deliverables:
  - Updated plan-aligned runtime test expectations for workflow reference resolution.
  - A wheel packaging smoke path that is runnable in the baseline validation environment.
  - Validation evidence for the affected runtime and packaging suites.
  risks:
  - Test fixture rewrites could accidentally drop explicit-path coverage for {workspace}/workflows
    while removing legacy bare-name discovery expectations.
  - A new wheel-build path could mask packaging regressions if it skips the same frontend
    behaviors the smoke test is intended to cover.
  - String-equality assertions on isolated module names may remain brittle unless
    they target the stable hashed namespace pattern.
  rollback:
  - Revert only the affected test updates if they prove inconsistent with the shipped
    runtime contract.
  - Revert only the wheel-build invocation change if it weakens the smoke semantics
    or fails in the standard validation environment.
