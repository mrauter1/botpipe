phases:
- phase_id: composition-helpers-and-contracts
  title: Add Composition Authoring Helpers
  objective: Introduce a pure-authoring helper seam for explicit child-workflow invocation
    and parent-local artifact adoption, then document and test that seam without widening
    runtime-owned control surfaces.
  status: planned
  in_scope:
  - Add a stdlib composition helper module for invoking child workflows and adopting
    selected child artifacts into the parent workflow folder.
  - Export the helper seam through stdlib/__init__.py and document the boundary in
    docs/authoring.md.
  - Add unit and runtime coverage proving the helper stays additive and preserves
    existing ctx.invoke_workflow semantics.
  out_of_scope:
  - New core or runtime step types such as SubworkflowStep.
  - Changes to public CLI flags, persisted run metadata, or provider/session payload
    shape.
  - Migrating the shipped release or incident workflows to the new helper in this
    cycle.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: A documented additive helper seam exists for explicit child-workflow invocation
      and parent-local artifact adoption without hidden runtime sequencing.
  - id: AC-2
    text: The helper remains authoring-level only and does not widen the runtime-injected
      control contract beyond expected_output_schema, available_routes, and route_contracts.
  - id: AC-3
    text: Targeted unit and runtime tests covering the helper seam and child-workflow
      context behavior pass under the repo-local .venv pytest.
  deliverables:
  - New stdlib composition helper module plus export wiring.
  - Authoring-doc updates describing the composition-helper boundary and intended
    usage.
  - Targeted test updates covering additive composition behavior.
  risks:
  - The helper may accidentally hide workflow semantics if it grows beyond explicit
    invocation, status checking, and artifact adoption.
  - Artifact adoption may blur parent versus child authority unless the helper stays
    workflow-folder-local and explicit.
  rollback:
  - Revert the helper seam entirely if it cannot remain additive and explicit.
  - Keep ctx.invoke_workflow-only behavior as the fallback if helper semantics prove
    unstable.
- phase_id: investigation-evidence-pack-building-block
  title: Ship Investigation Evidence-Pack Building Block
  objective: Implement investigation_request_to_evidence_pack as a discoverable reusable
    workflow building block with explicit prompts, artifact-first contracts, route
    grammar, and direct plus composed runtime proof.
  status: planned
  in_scope:
  - Create workflows/investigation_request_to_evidence_pack/ with workflow.py, workflow.toml,
    __init__.py, params.py, contracts.py, prompts/, and assets/.
  - Define explicit framing and evidence-pack work items with deterministic bootstrap
    and publish edges.
  - Add workflow-local docs under docs/workflows/investigation_request_to_evidence_pack.md.
  - Add a scripted-provider runtime test proving discovery, compilation, legal route
    flow, terminal artifacts, and evidence_pack_receipt.json creation.
  - Add one targeted composition proof that uses the new helper seam from a fixture
    parent workflow.
  out_of_scope:
  - Authoring security_finding_to_verified_remediation in the same cycle.
  - Migrating release_candidate_to_go_no_go or incident_to_hardening_program to consume
    the new building block.
  - Recursive wrapper or template cleanup unless implementation intentionally expands
    scope.
  dependencies:
  - composition-helpers-and-contracts
  acceptance_criteria:
  - id: AC-1
    text: The repository contains a discoverable investigation_request_to_evidence_pack
      package with explicit prompts, route contracts, parameters, and artifact contracts.
  - id: AC-2
    text: The building block produces a durable evidence pack and deterministic evidence_pack_receipt.json
      rather than only free-form prose.
  - id: AC-3
    text: Workflow-specific runtime proof passes and demonstrates both direct execution
      and composed usage through the helper seam.
  deliverables:
  - New workflow package files under workflows/investigation_request_to_evidence_pack/.
  - Workflow documentation under docs/workflows/investigation_request_to_evidence_pack.md.
  - Workflow-specific runtime test coverage for direct and composed evidence-pack
    execution.
  risks:
  - The package may become too generic if framing and evidence scope are not kept
    tight.
  - Composed proof may overfit to fixture behavior unless artifact and route contracts
    stay explicit and reusable.
  rollback:
  - Remove the new workflow package, its docs, and its test file if the building block
    cannot be verified safely.
  - Keep the helper seam only if the new package proves real reusable value.
- phase_id: proof-docs-and-recursive-memory
  title: Close With Proof And Memory
  objective: Run targeted validation, update standing recursive memory, and record
    the chosen building-block and composition-helper direction plus the explicit residual
    risks.
  status: planned
  in_scope:
  - Run the targeted validation set for stdlib helper reuse, child-workflow context
    behavior, the new evidence-pack building block, and baseline docs.
  - Update .autoloop_recursive/framework_evolution_charter.md, framework_roadmap.md,
    framework_gap_ledger.md, and workflow_candidate_ledger.md with the new building
    block, the chosen composition-helper improvement, and the deferred security workflow
    follow-up.
  - Record compatibility notes, rollback-safe residuals, and non-obvious decisions
    in task-local feedback and shared decisions.
  - If implementation intentionally edits recursive_autoloop/, rerun the targeted
    recursive package-cli tests and document the result explicitly.
  out_of_scope:
  - Claiming recursive wrapper or template parity if recursive_autoloop/ remains untouched.
  - Unrelated repository cleanup outside the scoped helper, new building block, docs,
    tests, task artifacts, and recursive memory.
  - Editing verifier-owned criteria.md.
  dependencies:
  - investigation-evidence-pack-building-block
  acceptance_criteria:
  - id: AC-1
    text: The targeted validation set passes under .venv/bin/pytest, or any unchanged
      pre-existing residual is explicitly documented as out of scope.
  - id: AC-2
    text: Standing recursive memory records that the builder remains credible, investigation_request_to_evidence_pack
      shipped this cycle, security_finding_to_verified_remediation remains deferred,
      and composition helpers were the chosen framework improvement.
  - id: AC-3
    text: The final scoped diff remains limited to the helper seam, the new building
      block package, targeted docs and tests, task artifacts, and required recursive
      memory updates.
  deliverables:
  - Validation evidence and closeout notes for the composition-helper seam and the
    new evidence-pack building block.
  - Updated recursive memory files under .autoloop_recursive/.
  - Updated task-local feedback and shared decisions capturing the selected direction
    and explicit residual risk.
  risks:
  - Known recursive wrapper and template failures may still appear if broader package-cli
    suites are run without intentionally fixing recursive_autoloop/.
  - Recursive memory may preserve stale repo-layout guidance unless the touched files
    are updated deliberately.
  rollback:
  - Keep proof scoped to targeted suites and document any untouched recursive residual
    explicitly.
  - Revert memory-only wording changes that overclaim behavior not actually validated.
