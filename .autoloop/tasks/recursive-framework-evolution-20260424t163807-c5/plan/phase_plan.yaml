phases:
- phase_id: older-domain-prompt-surface-migration
  title: Migrate Older Domain Prompt Families
  objective: Standardize the four older domain workflow prompt packages on the compact
    README-plus-step-contract style without changing workflow behavior.
  status: planned
  in_scope:
  - Rewrite prompts/README.md for release_candidate_to_go_no_go, investigation_request_to_evidence_pack,
    security_finding_to_verified_remediation, and incident_to_hardening_program to
    the shared README contract shape.
  - Rewrite the 26 prompt markdown files in those four packages to the compact Step
    Contract, Artifact Contract, Output Requirements, Evidence, Routes, and Forbidden
    section layout.
  - Replace legacy read/write scaffolding with compact artifact tables where that
    shortens the prompt materially while preserving the same artifact names and boundaries.
  - Add prompt-shape assertions to the four touched runtime suites and extend tests/test_architecture_baseline_docs.py
    to cover the older-domain README set.
  out_of_scope:
  - CLI, runtime, provider, route-contract, workflow-topology, or ctx.invoke_workflow
    changes.
  - Selected-workflow serializer convergence in stdlib/refinement.py or stdlib/decomposition.py.
  - Any new workflow package, helper seam, or workflow.toml semantic field.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: The four older domain prompt READMEs expose the shared README boundary,
      step surface, route surface, and verifier payload sections used by the compact
      prompt doctrine.
  - id: AC-2
    text: All 26 older-domain prompt files adopt the compact contract structure and
      no longer rely on the legacy Read these artifacts or Write these artifacts scaffolding.
  - id: AC-3
    text: Runtime suites and baseline docs assertions pin the new prompt shape while
      preserving the existing artifact names, routes, and workflow behavior.
  deliverables:
  - Updated prompt markdown and README files for the four older domain workflow packages.
  - Updated prompt-facing assertions in the four older-domain runtime suites and tests/test_architecture_baseline_docs.py.
  risks:
  - A prompt rewrite could accidentally drop a step-local restriction or artifact-handling
    rule that is only stated once in the current files.
  - README tables could drift from the real step writes, routes, or payload names
    if they are not updated from the compiled workflow surfaces.
  rollback:
  - Revert prompt markdown, README, and prompt-shape test updates together if the
    compact structure weakens any step contract.
  - Do not leave the older-domain workflow family half-migrated without an explicit
    deferral note.
- phase_id: proof-docs-and-memory-sync
  title: Prove And Sync Authoring Closeout
  objective: Validate the prompt migration with targeted proof and synchronize recursive
    memory and any necessary docs wording without overstating the scope.
  status: planned
  in_scope:
  - Run targeted proof for the four touched older-domain runtime suites plus tests/test_architecture_baseline_docs.py.
  - Update .autoloop_recursive/framework_evolution_charter.md, framework_roadmap.md,
    framework_gap_ledger.md, workflow_candidate_ledger.md, and validation_debt_ledger.md
    with the cycle outcome and remaining deferred debt.
  - Adjust docs/authoring.md only if implementation reveals wording drift against
    the already-frozen compact prompt doctrine; otherwise record an explicit no-doctrine-change
    outcome in recursive memory.
  - Record boilerplate reduction, net line movement, and preserved compatibility boundaries
    in implementation closeout.
  out_of_scope:
  - Claiming any CLI, runtime, provider, or ctx.invoke_workflow compatibility change.
  - Editing verifier-owned criteria.md.
  - Adding a new workflow or broadening this turn into serializer or runtime refactors.
  dependencies:
  - older-domain-prompt-surface-migration
  acceptance_criteria:
  - id: AC-1
    text: The targeted prompt-facing proof passes for the four touched runtime suites
      and tests/test_architecture_baseline_docs.py.
  - id: AC-2
    text: Recursive memory records this cycle as prompt-authoring compaction for the
      older domain workflow family with no new workflow and no CLI, runtime, provider,
      or ctx.invoke_workflow contract change.
  - id: AC-3
    text: Any docs update remains bounded to doctrine alignment rather than introducing
      a new prompt abstraction or widening the runtime-injected contract.
  deliverables:
  - Verified targeted proof covering the older domain prompt family.
  - Updated recursive-memory charter, roadmap, gap, candidate, and validation ledger
    entries for this cycle.
  - Any bounded docs alignment required by the completed prompt migration.
  risks:
  - The older-domain runtime suites currently do not pin prompt shape, so proof can
    stay shallow unless the tests are strengthened in the migration phase.
  - Recursive memory could overstate the change as a new doctrine or runtime capability
    instead of a migration to the existing prompt contract.
  rollback:
  - Revert memory and docs updates if proof or implementation changes the chosen scope.
  - Do not mark the prompt-family debt closed until targeted prompt-facing proof passes.
