phases:
- phase_id: provider-backend-boundary
  title: Add Built-In Provider Backend Resolver
  objective: Introduce a framework-owned provider resolution boundary so public CLI
    execution no longer depends on user-supplied factory strings.
  status: planned
  in_scope:
  - Add runtime/provider_backends.py as the only public CLI-to-provider resolution
    path.
  - Define minimal framework-owned Codex and Claude adapter entrypoints or precise
    ConfigError failures when a backend is unavailable.
  - Add resolver-focused tests before public CLI cleanup begins.
  out_of_scope:
  - Any plugin registry, dynamic import registry, or user-facing module:function syntax.
  - Changing the non-public cli.main(..., provider_factory=...) seam.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: resolve_provider_backend(config=...) dispatches by provider name and never
      accepts module:function input.
  - id: AC-2
    text: Selecting an unavailable provider backend raises a precise ConfigError instead
      of falling back to provider factories.
  deliverables:
  - runtime/provider_backends.py and any minimal internal adapter modules it requires.
  - Resolver tests covering success and failure paths.
  risks:
  - The repo currently has no built-in production provider adapters, so the new boundary
    must not strand the CLI between phases.
  rollback:
  - Revert the resolver and adapter files together if provider construction semantics
    are wrong.
- phase_id: public-cli-provider-contract
  title: Remove Public Provider Factory Surfaces
  objective: Replace public provider-factory selection with typed provider selection
    through config and generic CLI flags while preserving the non-public injection
    seam.
  status: planned
  in_scope:
  - Add --provider to mutating CLI commands.
  - Route generic config and CLI model/effort overrides through the effective provider
    instead of hard-coding Codex fields.
  - Remove --provider-factory, AUTOLOOP_PROVIDER_FACTORY, and load_provider_factory(...)
    from the public CLI path.
  - Keep runtime/runner.py cleanup narrow so run_workflow_package(..., provider=...)
    and execute_workflow_package(..., provider=...) remain available to non-CLI callers.
  - Preserve cli.main(..., provider_factory=...) as a direct non-public seam for tests
    and programmatic callers.
  out_of_scope:
  - Documenting the non-public provider_factory seam as a user-facing feature.
  - Any backward-compatibility alias for removed factory flags or env vars.
  dependencies:
  - provider-backend-boundary
  acceptance_criteria:
  - id: AC-1
    text: CLI help for mutating commands shows --provider and no --provider-factory.
  - id: AC-2
    text: Passing --provider-factory is rejected as an unknown argument while typed
      provider selection continues to work.
  - id: AC-3
    text: cli.main(..., provider_factory=...) still works for tests without being
      reachable from parser help, docs, or env vars.
  - id: AC-4
    text: Removing factory-loader helpers does not change the direct runtime runner
      surface for non-CLI callers using run_workflow_package(..., provider=...) or
      execute_workflow_package(..., provider=...).
  deliverables:
  - Updated runtime/cli.py, runtime/config.py, and runtime/runner.py public-provider
    contract with the non-CLI runner surface explicitly preserved.
  - CLI tests covering help text, unknown-argument rejection, typed provider selection,
    and the retained injection seam.
  risks:
  - Generic override routing can silently stay Codex-only if provider-name-aware merging
    is not corrected.
  rollback:
  - Revert phases 1 and 2 together if the public CLI cannot construct providers reliably.
- phase_id: session-id-schema-cleanup
  title: Canonicalize Session Continuation State
  objective: Remove framework/runtime thread_id compatibility while preserving resumability
    through canonical session_id and provider_metadata.
  status: planned
  in_scope:
  - Make runtime/stores/filesystem.py read and write only canonical session_id-based
    payloads.
  - Remove thread_id naming from runtime metadata and Autoloop-v1 parity raw-log helpers.
  - Keep SessionBinding and checkpoint semantics unchanged apart from the field cleanup.
  - Add payload-schema and resumability tests for the canonical session contract.
  out_of_scope:
  - A compatibility reader for old thread_id-only payloads.
  - Any provider-specific continuation naming outside provider-private adapters.
  dependencies:
  - public-cli-provider-contract
  acceptance_criteria:
  - id: AC-1
    text: Fresh placeholder and roundtrip session payloads contain session_id and
      do not contain thread_id.
  - id: AC-2
    text: Provider resumability and Autoloop-v1 parity continue to work through session_id
      and provider_metadata.
  - id: AC-3
    text: Active framework/runtime code and tests no longer refer to thread_id outside
      provider-private adapter code.
  deliverables:
  - Canonical session payload read/write code in runtime/stores/filesystem.py.
  - Updated Autoloop-v1 parity helper code and tests proving resumability still works.
  risks:
  - Existing on-disk runs that rely on thread_id compatibility will stop resuming
    after the cleanup.
  rollback:
  - Revert the entire session-schema slice as one change; do not mix old readers with
    new writers.
- phase_id: recursive-wrapper-package-only
  title: Remove Legacy Recursive Wrapper Paths
  objective: Make the recursive wrapper and templates package-CLI-only and align their
    repository guidance with the current workflow-package architecture.
  status: planned
  in_scope:
  - Remove AUTOLOOP_CLI_MODE, detect_autoloop_cli_mode, and legacy start/resume branches
    from recursive_autoloop/run_recursive_autoloop.sh.
  - Keep nested-git environment isolation, recovery hints, and package-mode task discovery
    behavior that is still architecture-neutral.
  - Rewrite bootstrap, cycle, charter, roadmap, and related templates to current repo
    layout and greenfield package-CLI doctrine.
  - Strengthen wrapper tests to fail on forbidden legacy strings and branches.
  out_of_scope:
  - Any support for non-package autoloop CLIs.
  - Any return to src/autoloop/... repository guidance.
  dependencies:
  - session-id-schema-cleanup
  acceptance_criteria:
  - id: AC-1
    text: The wrapper emits only package autoloop run/resume commands and contains
      no legacy CLI mode detection.
  - id: AC-2
    text: Recursive templates reference current repo structure and package workflows
      only.
  - id: AC-3
    text: Wrapper-focused tests assert the absence of --intent, --pairs, legacy --task-id
      invocation, and legacy mode branches.
  deliverables:
  - Updated recursive_autoloop/run_recursive_autoloop.sh.
  - Updated recursive template set under recursive_autoloop/run_recursive_autoloop_templates/.
  - Wrapper regression tests.
  risks:
  - One stale template or help hint can silently reintroduce old repo-shape guidance.
  rollback:
  - Revert the wrapper and template set together if generated recursive instructions
    become inconsistent.
- phase_id: docs-strictness-and-regression-proof
  title: Harden Docs And Regression Guards
  objective: Align maintained docs with the cleaned contract, add strictness guards
    against removed compatibility surfaces, and verify the full repo still passes.
  status: planned
  in_scope:
  - Update docs/architecture.md and docs/authoring.md for typed provider selection,
    opaque session_id resumability, and package-only recursive operation.
  - Scrub remaining active doc references to removed surfaces when they are within
    maintained docs scope.
  - Extend tests/test_architecture_baseline_docs.py and tests/strictness/test_no_compat.py
    to forbid removed compatibility surfaces across active source/docs/tests.
  - Run targeted suites and the full pytest suite, then fix any fallout needed to
    keep package CLI, parity, tracing, and workflow-folder git scoping passing.
  out_of_scope:
  - Scanning task artifacts or historical snapshots for forbidden strings.
  - Changing verifier-owned criteria artifacts.
  dependencies:
  - recursive-wrapper-package-only
  acceptance_criteria:
  - id: AC-1
    text: Maintained docs describe provider selection through typed config and generic
      flags only, describe resumability through session_id, and describe recursive
      execution as package-CLI-only.
  - id: AC-2
    text: Strictness tests fail if --provider-factory, AUTOLOOP_PROVIDER_FACTORY,
      thread_id, src/autoloop/, or wrapper legacy branches reappear in active source/docs/tests.
  - id: AC-3
    text: Targeted suites and the full pytest suite pass after the cleanup.
  deliverables:
  - Updated architecture and authoring docs.
  - Expanded strictness and doc-baseline tests.
  - Verification evidence from targeted and full test runs.
  risks:
  - Broad forbidden-string scans can become noisy if they include task artifacts that
    intentionally preserve historical text.
  rollback:
  - Roll back code changes before relaxing docs or strictness assertions; do not leave
    docs claiming a contract the code no longer implements.
