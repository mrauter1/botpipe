phases:
  - phase_id: "rename-package-and-public-api"
    title: "Rename Package And Public API"
    objective: "Establish Botlane as the only supported package and public-symbol identity."
    status: "planned"
    in_scope:
      - "Rename source package roots from autoloop/autoloop_optimizer to botlane/botlane_optimizer."
      - "Update pyproject package discovery, project metadata, package data, and console entry points to Botlane names."
      - "Rename branded public exports such as Autoloop and AutoloopSDKError and update __all__ surfaces without compatibility aliases."
    out_of_scope:
      - "Runtime workspace path and dynamic import namespace rewrites."
      - "Repository-wide docs and fixture text rewrites."
    dependencies: []
    acceptance_criteria:
      - id: "P1-AC1"
        text: "The repository builds around botlane/botlane_optimizer package roots and no maintained public import path or exported symbol still uses Autoloop branding."
      - id: "P1-AC2"
        text: "Packaging metadata and entry-point definitions no longer install or advertise autoloop."
    deliverables:
      - "Renamed package roots and updated packaging metadata."
      - "Updated public API exports and branded exception/facade names."
    risks:
      - "Leaving stale imports or __all__ exports behind will create mixed-brand public surfaces."
      - "Changing package roots before packaging metadata is aligned can break wheel installation and import resolution."
    rollback:
      - "Revert package-root and packaging edits together if imports or wheel metadata become inconsistent."

  - phase_id: "rewrite-runtime-and-workspace-identity"
    title: "Rewrite Runtime And Workspace Identity"
    objective: "Make CLI, workspace state, workflow discovery, and dynamic module loading Botlane-only."
    status: "planned"
    in_scope:
      - "Rename CLI prog/help/description strings, package-loading text, and workspace-loading text from autoloop to botlane."
      - "Move workspace and generated-state paths from .autoloop to .botlane, including SDK sentinel paths and runtime metadata fields."
      - "Rename workflow import namespaces, isolated workspace module prefixes, importlib targets, workflow catalog roots, and sys.modules cleanup keys."
      - "Remove legacy import modules, import-legacy commands, and compatibility-only flags or fallbacks tied to the old identity."
    out_of_scope:
      - "Historical text retained only for explicitly allowed historical documents."
      - "Non-product automation state under run-local task artifacts."
    dependencies:
      - "rename-package-and-public-api"
    acceptance_criteria:
      - id: "P2-AC1"
        text: "CLI help and runtime metadata describe Botlane only and no installed autoloop executable remains."
      - id: "P2-AC2"
        text: "Workspace discovery, generated module namespaces, and workflow catalog metadata use .botlane, botlane.workflows, and _botlane_workspace_workflows consistently."
    deliverables:
      - "Updated runtime CLI, workspace, loader, and workflow catalog identity contract."
      - "Removed legacy runtime compatibility surfaces tied to Autoloop naming."
    risks:
      - "Partial namespace rewrites can break package workflow resolution or workspace module isolation."
      - "Workspace-path changes can silently desynchronize SDK/runtime helpers if sentinel and metadata fields are missed."
    rollback:
      - "Revert loader/catalog/workspace changes as one slice if workflow discovery or run resumption breaks."

  - phase_id: "rewrite-schemas-workflows-and-fixtures"
    title: "Rewrite Schemas Workflows And Fixtures"
    objective: "Remove remaining live Autoloop identity from schemas, workflow packages, docs, examples, and embedded source strings."
    status: "planned"
    in_scope:
      - "Rename product-branded schema IDs and generated-by markers from autoloop.* to botlane.* while leaving unrelated families such as docloop.* intact."
      - "Update workflow packages, optimizer references, generated workflow source strings, and fixture snippets to import botlane and botlane_optimizer."
      - "Rewrite active docs, examples, and user-facing prose to Botlane/ botlane casing rules."
      - "Audit marker or header prefixes that still embed autoloop-* naming."
    out_of_scope:
      - "Historical allowlisted text that is intentionally retained outside the live product surface."
      - "New migration tooling for old autoloop persisted artifacts."
    dependencies:
      - "rewrite-runtime-and-workspace-identity"
    acceptance_criteria:
      - id: "P3-AC1"
        text: "All maintained schema constants and emitted serialized metadata use botlane.* only."
      - id: "P3-AC2"
        text: "Workflow packages, docs, examples, and embedded fixture source no longer present live Autoloop-branded imports or paths."
    deliverables:
      - "Updated schema registry and serializer literals."
      - "Rewritten workflow, docs, example, and fixture corpus with Botlane identity."
    risks:
      - "Missed embedded source strings can regenerate Autoloop imports even after code compiles."
      - "Broad text replacement can accidentally rename unrelated historical or non-product material without an explicit allowlist."
    rollback:
      - "Revert the schema and content rewrite slice if serializer output or workflow fixture generation becomes inconsistent."

  - phase_id: "prove-botlane-only-surface"
    title: "Prove Botlane Only Surface"
    objective: "Codify the intentional break with positive packaging checks and negative strictness checks so Autoloop identity cannot regress."
    status: "planned"
    in_scope:
      - "Update wheel-install smoke tests for botlane package and botlane CLI installation."
      - "Add or update strictness tests for failed autoloop imports, absent python -m autoloop, absent autoloop CLI, and Botlane-only CLI help text."
      - "Add workspace and schema emission tests proving .botlane and botlane.* outputs only."
      - "Widen repository grep enforcement to maintained code, workflow packages, tests, docs, examples, and fixtures, with explicit exclusions for historical text and automation-owned generated state."
    out_of_scope:
      - "Broad full-suite stabilization unrelated to the rename."
      - "Changing verifier-owned criteria artifacts."
    dependencies:
      - "rewrite-schemas-workflows-and-fixtures"
    acceptance_criteria:
      - id: "P4-AC1"
        text: "The validation suite proves Botlane installs and runs while Autoloop imports, module execution, and CLI entry points are unavailable."
      - id: "P4-AC2"
        text: "The final strictness grep gate fails on any live autoloop, Autoloop, AUTOLOOP, .autoloop, autoloop_optimizer, or _autoloop_workspace_workflows reference outside the explicit allowlist."
    deliverables:
      - "Updated wheel smoke, runtime, and strictness tests covering the breaking rename."
      - "A repo grep policy that guards live product files against Autoloop regressions."
    risks:
      - "A narrow grep scope can create a false sense of completion."
      - "A broad grep scope can fail on automation or generated directories that are not part of the maintained product surface."
    rollback:
      - "Revert only the proof-phase test changes if the assertions are mis-scoped, then re-land with a tighter maintained-tree contract."
