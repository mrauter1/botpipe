phases:
- phase_id: remove-runtime-compatibility
  title: Remove Runtime Compatibility
  objective: Delete all maintained production-code support for Autoloop names, roots,
    sentinels, schema aliases, and legacy runtime markers.
  status: planned
  in_scope:
  - Context and workflow-root detection in botlane/core/context.py and botlane/core/workflow_capabilities.py
  - Simple-flow sentinel handling in botlane/core/discovery.py
  - Legacy workspace/state/config/schema/sdk/optimizer compatibility paths in runtime,
    catalog, schema, operations, SDK, parity, and optimizer modules
  out_of_scope:
  - Historical legacy_docs content that remains on the explicit allowlist
  - Unrelated refactors outside Botlane rename cleanup
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: No maintained production file recognizes .autoloop workspace or state roots,
      legacy config filenames, legacy schema aliases, or __autoloop_simple_flow_spec__.
  - id: AC-2
    text: No maintained production file reconstructs Autoloop names indirectly through
      concatenated or adjacent string literals.
  deliverables:
  - Updated production modules with legacy compatibility paths removed
  - A concrete file inventory of deleted legacy helpers/constants for follow-on verification
  risks:
  - Resume/history/catalog flows may still depend on dual-root helpers and need coordinated
    updates.
  - Removing schema fallback can break persisted test fixtures if tests are not updated
    in the same slice.
  rollback:
  - Revert the full compat-removal change set together if Botlane-only runtime behavior
    fails core smoke tests.
- phase_id: harden-strictness-and-negative-tests
  title: Harden Strictness Tests
  objective: Make strictness coverage explicit and add negative tests that prove legacy
    names are unsupported rather than silently ignored.
  status: planned
  in_scope:
  - tests/strictness/test_no_compat.py literal constants, allowlists, and hidden-construction
    scanning
  - Negative behavior tests for .autoloop workspace markers, simple-flow sentinels,
    imports, CLI identity, and packaging identity
  - Removal or rewrite of tests that currently require legacy .autoloop behavior in
    runtime, catalog, and SDK suites
  out_of_scope:
  - Adding migration warnings or compatibility messaging
  - Broad path-prefix exclusions outside explicit historical documentation
  dependencies:
  - remove-runtime-compatibility
  acceptance_criteria:
  - id: AC-1
    text: Legacy literals are confined to tests/strictness/test_no_compat.py and explicit
      historical docs.
  - id: AC-2
    text: Strictness scanners fail on hidden Autoloop-name construction and do not
      ignore .autoloop directories by default.
  - id: AC-3
    text: Tests prove .autoloop/workflows is unsupported while .botlane/workflows
      and Botlane-only imports/CLI still work.
  deliverables:
  - Updated strictness suite with explicit legacy literals and hidden-construction
    checks
  - Rewritten runtime/catalog/SDK/package tests aligned to the Botlane-only contract
  risks:
  - Test rewrites may accidentally preserve legacy behavior expectations under different
    names.
  - A scanner that is too broad can flag allowed historical docs or the strictness
    file itself.
  rollback:
  - Restore the prior strictness assertions only by reverting this whole phase with
    the production changes, not by reintroducing new exclusions.
- phase_id: audit-and-validate
  title: Audit And Validate
  objective: Re-scan the maintained tree and run the full smoke/test matrix needed
    to prove the greenfield Botlane contract.
  status: planned
  in_scope:
  - Repo-wide literal old-name audit across maintained source, tests, docs, packaging,
    templates, scripts, and examples
  - Hidden-construction scan across maintained Python files
  - pytest, import smoke, negative import smoke, CLI help smoke, and wheel/package
    smoke execution
  out_of_scope:
  - Publishing artifacts or changing release/version metadata
  - Adding new observability beyond the tests and scans needed for this cleanup
  dependencies:
  - harden-strictness-and-negative-tests
  acceptance_criteria:
  - id: AC-1
    text: Repo-wide literal and hidden-construction audits report no unsupported Autoloop
      references outside the approved strictness file and explicit historical docs.
  - id: AC-2
    text: python -m pytest and the required Botlane/import/CLI/package smoke tests
      pass.
  deliverables:
  - Audit results clean enough to satisfy the follow-up acceptance criteria
  - A validated greenfield Botlane runtime surface with no supported Autoloop behavior
  risks:
  - Generated build artifacts can produce false positives if not excluded consistently
    as non-maintained outputs.
  - Wheel smoke may expose packaging references not exercised by source-only tests.
  rollback:
  - If validation fails, revert to the start of this phase, fix the failing runtime
    or strictness seam, and rerun the full audit.
