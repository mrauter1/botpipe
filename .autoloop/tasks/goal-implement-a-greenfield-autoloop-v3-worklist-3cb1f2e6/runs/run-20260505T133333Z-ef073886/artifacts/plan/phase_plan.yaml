phases:
  - phase_id: "restore-workflow-resolution-contract"
    title: "Restore Workflow Resolution Contract"
    objective: "Re-separate named catalog precedence from explicit path/class loading so repo-local workflows support remains without breaking alias visibility, isolated workspace namespaces, or Params lookup parity."
    status: "planned"
    in_scope:
      - "workflow catalog shadowing and alias resolution across repo-local workflows/, .autoloop/workflows/, and installed autoloop/workflows/"
      - "loader behavior for named references versus explicit file and explicit class references"
      - "package-export validation boundaries and source metadata preservation"
    out_of_scope:
      - "worklist selector or progress-board behavior"
      - "optimizer trace normalization beyond source-identity dependencies"
    dependencies: []
    acceptance_criteria:
      - id: "AC-1"
        text: "tests/runtime/test_workflow_reference_resolution.py passes with canonical-name precedence preserved, workspace-catalog aliases restored, and explicit repo-local file/class references retaining isolated workspace module semantics."
      - id: "AC-2"
        text: "Repo-local flow/workflow packages no longer require __init__.py workflow re-exports unless they are intentionally imported through the package-module contract."
    deliverables:
      - "Catalog and loader changes that preserve resolution-key precedence without dropping lower-precedence alias keys"
      - "Reference-loading behavior that distinguishes named catalog imports from explicit isolated loads"
    risks:
      - "Key-level shadowing changes can affect discovery/listing surfaces if runtime resolution and catalog metadata diverge."
      - "Overusing isolated loading can break package-relative imports for intentionally imported package modules."
    rollback:
      - "Revert catalog key-resolution and explicit-reference loader branching together if named resolution or Params loading regresses."
  - phase_id: "reconcile-optimizer-source-contracts"
    title: "Reconcile Optimizer Source Contracts"
    objective: "Restore optimizer compatibility by accepting supported legacy observability payloads, preserving eligible-run accounting, and normalizing selected-workflow source manifests against one canonical package-surface contract."
    status: "planned"
    in_scope:
      - "observability bundle schema migration and validation behavior"
      - "trace-corpus run inclusion and route-tag/runtime-control normalization"
      - "selected-workflow source manifest generation and mutation validation"
    out_of_scope:
      - "workflow-local route contract edits"
      - "non-optimizer runtime metadata formats unrelated to selected-workflow publication"
    dependencies:
      - "restore-workflow-resolution-contract"
    acceptance_criteria:
      - id: "AC-1"
        text: "tests/unit/test_optimization_helpers.py passes, including schemaless observability acceptance, eligible-run preservation, runtime-control observation capture, and source-manifest mutation detection."
      - id: "AC-2"
        text: "Optimizer-selected workflow manifests and downstream checks use one canonical workflow/package-surface contract instead of whichever discovery root happened to resolve the workflow."
    deliverables:
      - "Optimizer reader updates aligned with runtime schema-migration behavior"
      - "Canonical selected-workflow manifest/mutation helper behavior reused by downstream optimizer publication"
    risks:
      - "Relaxing bundle readers too far could hide malformed runtime evidence."
      - "Canonical package-path normalization can drift from actual source-loading behavior if identity and disk location are conflated."
    rollback:
      - "Revert observability-reader migration and source-manifest canonicalization together if optimizer publication or mutation checks drift."
  - phase_id: "repair-packaged-workflow-contracts-and-proof"
    title: "Repair Packaged Workflow Contracts And Proof"
    objective: "Fix the remaining packaged-workflow compile/runtime regressions by reusing shared route, artifact-path, and package-boundary contracts, then prove the broader repository is green."
    status: "planned"
    in_scope:
      - "packaged workflow route-contract constants missing authored blocked/failed routes"
      - "shared framework artifact path resolution for copied repo-local workflow packages"
      - "workflow-package/decomposition/refinement publication boundary validation aligned to the canonical package-surface contract"
      - "targeted failing packaged-workflow suites and final full-suite pytest proof"
    out_of_scope:
      - "reworking already-accepted greenfield worklist semantics"
      - "introducing legacy compatibility shims for selector aliases or progress-board shapes"
    dependencies:
      - "restore-workflow-resolution-contract"
      - "reconcile-optimizer-source-contracts"
    acceptance_criteria:
      - id: "AC-1"
        text: "The currently failing packaged-workflow/runtime suites listed in the request pass using shared route/artifact/path-contract fixes rather than scattered test-only patches."
      - id: "AC-2"
        text: "The focused green worklist suites remain green and .venv/bin/python -m pytest completes green for the full repository."
    deliverables:
      - "Workflow-package contract updates limited to suites proven stale by compile/runtime failures"
      - "Shared artifact-path and package-boundary behavior reused across packaged workflows plus final repository verification"
    risks:
      - "Shared framework-artifact path fixes can regress other packaged workflows if depth assumptions remain duplicated."
      - "Route-contract updates can hide real workflow-state gaps if blocked/failed are added mechanically rather than where prompt/runtime contracts already require them."
    rollback:
      - "Revert shared packaged-workflow helper changes with the affected workflow contract edits if full-suite validation exposes broader regressions."
