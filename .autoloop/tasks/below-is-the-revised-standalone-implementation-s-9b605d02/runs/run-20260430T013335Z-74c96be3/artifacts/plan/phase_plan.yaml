phases:
  - phase_id: "canonical-surface-pruning"
    title: "Prune Public And Top-Level Surfaces"
    objective: "Trim `autoloop.simple`, `autoloop`, and active top-level `core` exports to the documented canonical contract while defining the explicit compatibility boundary."
    status: "planned"
    in_scope:
      - "Reduce `autoloop.simple` to canonical authoring exports only."
      - "Remove legacy names from active `core/__init__.py` exports and evaluate the `core` to `autoloop_v3.core` alias shim."
      - "Add or update import-surface tests for removed public symbols."
    out_of_scope:
      - "Deleting persisted-run compatibility behavior that still normalizes historical on-disk payloads."
      - "Refactoring unrelated runtime/provider APIs."
    dependencies: []
    acceptance_criteria:
      - id: "AC-1"
        text: "`autoloop.simple` and `autoloop` expose only the documented canonical authoring API."
      - id: "AC-2"
        text: "Active top-level `core` imports no longer expose `SUCCESS`, `RouteInfo`, `Param`, `StateVar`, `AfterHookResult`, or legacy step classes unless moved behind an explicit internal compatibility module."
      - id: "AC-3"
        text: "The alias-shim decision is implemented explicitly and covered by tests or compatibility notes."
    deliverables:
      - "Canonical public/export surface updates."
      - "Explicit compatibility-boundary note in code and tests."
      - "Surface import regression tests."
    risks:
      - "Removing the alias shim can break import paths that currently rely on `autoloop_v3.core` indirection."
      - "Surface pruning can accidentally drop still-needed strict runtime imports if not separated from compatibility-only names."
    rollback:
      - "Restore only the removed export entries or a minimal explicit compat module."
      - "Re-enable the alias only as a short-term compatibility patch if import-path migration proves incomplete."
  - phase_id: "route-runtime-canonicalization"
    title: "Canonicalize Route And Runtime Internals"
    objective: "Remove live `SUCCESS`, `RouteInfo`, `route_infos`, `required_outputs`, and positional effect DSL handling from active compilation/runtime/static-graph/stdlib code."
    status: "planned"
    in_scope:
      - "Migrate active route metadata handling to `Route.required_writes` and canonical summaries/handoffs only."
      - "Move any remaining historical terminal normalization into explicit internal persisted-run compatibility helpers."
      - "Update `stdlib` helpers that still expose `PairStep` or `produces` vocabulary."
      - "Remove active static-graph/compiler fallback handling for legacy route or terminal names."
    out_of_scope:
      - "Changing the documented canonical route/write behavior."
      - "Broad redesign of effect objects beyond removing positional DSL from the active surface."
    dependencies:
      - "canonical-surface-pruning"
    acceptance_criteria:
      - id: "AC-1"
        text: "Active compiler/runtime/static-graph/provider code paths no longer depend on `SUCCESS`, `RouteInfo`, `route_infos`, `required_outputs`, or `route_required_outputs`."
      - id: "AC-2"
        text: "Any remaining legacy parsing is isolated to explicit persisted-run or migration-reader code."
      - id: "AC-3"
        text: "Maintained `stdlib` helpers no longer expose removed `PairStep` or `produces` vocabulary."
    deliverables:
      - "Canonical route/runtime/compiler implementation updates."
      - "Explicit internal compatibility helper for any retained persisted-run migration logic."
      - "Updated static-graph/runtime payload assertions."
    risks:
      - "Route metadata migration can break old in-memory fixtures if compatibility and active paths are not clearly separated."
      - "Removing `SUCCESS` too broadly can break run-history or checkpoint normalization."
    rollback:
      - "Temporarily restore the internal compat adapter only."
      - "Revert individual runtime/compiler call sites without reintroducing public export leakage."
  - phase_id: "strictness-and-suite-migration"
    title: "Migrate Active Suites And Tighten Strictness"
    objective: "Convert active tests to canonical vocabulary, quarantine intentional compatibility coverage, and enforce banned-name scanning on the maintained implementation/test surface."
    status: "planned"
    in_scope:
      - "Migrate active contract/unit/runtime/provider suites away from legacy names."
      - "Quarantine compatibility-only coverage and fixtures under explicit migration naming."
      - "Expand strictness scanning to maintained code and active tests while excluding only explicit compatibility fixtures."
      - "Run canonical verification and targeted compatibility regressions."
    out_of_scope:
      - "Weakening strictness by broadly excluding `core`, `runtime`, or all tests."
      - "Retaining active suites on legacy names for convenience."
    dependencies:
      - "route-runtime-canonicalization"
    acceptance_criteria:
      - id: "AC-1"
        text: "Strictness tests fail on banned names across active code/tests outside explicit migration fixtures."
      - id: "AC-2"
        text: "Named active suites such as engine-contract and validation tests use canonical `FINISH` and `required_writes` vocabulary."
      - id: "AC-3"
        text: "The canonical verification suite passes after the cleanup, and compatibility coverage remains clearly quarantined."
    deliverables:
      - "Updated active tests."
      - "Compatibility-only fixture/suite quarantine."
      - "Strictness scan coverage update and verification results."
    risks:
      - "Expanding strictness before fixture quarantine will create noisy failures."
      - "Test migrations may mask behavioral regressions if canonical assertions are not kept semantically equivalent."
    rollback:
      - "Temporarily narrow the strictness scan only to newly quarantined compatibility paths."
      - "Revert specific test migrations while preserving compatibility labeling."
