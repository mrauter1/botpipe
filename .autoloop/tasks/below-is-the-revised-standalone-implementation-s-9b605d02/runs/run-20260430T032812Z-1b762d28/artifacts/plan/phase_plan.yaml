phases:
  - phase_id: "canonicalize-core-produces-surface"
    title: "Canonicalize Core Vocabulary"
    objective: "Replace maintained core step/runtime usage of legacy produces vocabulary with canonical write/output names and remove the redundant dynamic package alias shim."
    status: "planned"
    in_scope:
      - "Rename maintained core step declaration fields and constructor kwargs from produces/review_produces to writes/producer_writes/verifier_writes."
      - "Update core validation, compiler, and engine paths to consume canonical write vocabulary only."
      - "Remove core.__init__ dynamic alias mirroring and keep autoloop_v3.core as the single explicit bridge."
    out_of_scope:
      - "Persisted session/checkpoint/run compatibility readers that still need legacy payload translation."
      - "Broad runtime/provider refactors unrelated to produces vocabulary cleanup."
    dependencies: []
    acceptance_criteria:
      - id: "AC-1"
        text: "Maintained core authoring/runtime/compiler/validation code no longer depends on step.produces, do_produces, or review_produces."
      - id: "AC-2"
        text: "The only remaining compatibility bridge for package naming is autoloop_v3.core importing core."
    deliverables:
      - "Updated core/steps.py, core/validation.py, core/compiler.py, core/engine.py, and core/__init__.py using canonical write terminology."
      - "Documented compatibility note in the plan that constructor-level produces aliases are intentionally removed from maintained core."
    risks:
      - "Maintained direct PromptStep or ProduceVerifyStep call sites may still rely on legacy kwargs."
      - "Import-order-sensitive paths may have relied on mirrored core/autoloop_v3.core submodule aliases."
    rollback:
      - "Revert the local canonical rename in the failing maintained file and rerun targeted tests before continuing."
      - "Do not restore the broad dynamic alias shim unless a concrete maintained dependency is proven and cannot be fixed locally."
  - phase_id: "migrate-tests-and-lock-strictness"
    title: "Migrate Tests And Strictness"
    objective: "Move maintained tests and fixtures to canonical write vocabulary, quarantine any legacy-only compatibility declarations, and tighten strictness so banned produces vocabulary cannot re-enter maintained code."
    status: "planned"
    in_scope:
      - "Migrate maintained unit, contract, and fixture workflow declarations away from produces vocabulary."
      - "Keep compatibility-only legacy coverage explicit and narrow within runtime compatibility tests or dedicated migration fixtures."
      - "Update strictness scanning and run targeted verification across the affected suites."
    out_of_scope:
      - "Changing persisted compatibility semantics that existing session/checkpoint readers still support."
      - "Repository-wide wording changes where produces appears only in prose or historical design notes."
    dependencies:
      - "canonicalize-core-produces-surface"
    acceptance_criteria:
      - id: "AC-1"
        text: "Active non-migration maintained tests and fixtures no longer author workflows with produces, review_produces, or do_produces."
      - id: "AC-2"
        text: "tests/strictness/test_no_compat.py fails on maintained-tree produces vocabulary outside explicit compatibility or migration fixture exclusions."
      - id: "AC-3"
        text: "Targeted pytest coverage for validation, engine contracts, compatibility runtime, runtime static graph, and strictness passes after the cleanup."
    deliverables:
      - "Updated tests/unit/test_validation.py, tests/contract/test_engine_contracts.py, tests/fixtures/toy_runtime_workflow.py, and any required compatibility fixtures."
      - "A tightened strictness scan with narrow, explicit exclusions only for compatibility or migration fixtures."
    risks:
      - "Compatibility tests may still need live in-memory legacy declarations and could tempt broad strictness exclusions."
      - "Renamed test authoring helpers may miss one maintained fixture path and leave the suite split across old and new vocabulary."
    rollback:
      - "If strictness starts hiding legitimate compatibility coverage, move that coverage into an explicit fixture file instead of widening exclusions."
      - "If a targeted suite fails due to missed legacy declarations, finish the migration rather than loosening the ban list."
