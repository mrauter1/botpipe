phases:
  - phase_id: decision-freeze-and-observer-core
    title: Freeze Book Architecture And Add Observer Core
    objective: Replace the outdated architectural record and add the minimal generic execution-observer seam to the strict engine without leaking Autoloop policy into core code.
    status: planned
    in_scope:
      - Rewrite autoloop_v3/ARCHITECTURE_DECISIONS.md to cover the required 17 final decisions with three candidates each.
      - Add a typed execution observer interface plus provider-turn, step-completion, and terminal event payloads under autoloop_v3.workflow.
      - Wire autoloop_v3/workflow/engine.py to emit observer events for success, pause, fail, and fatal exception flows.
      - Extend engine contract tests for observer delivery and non-interference.
    out_of_scope:
      - Autoloop-v1 parity harness rewiring.
      - Store helper migration.
      - Repo-root workflow cleanup.
    dependencies: []
    acceptance_criteria:
      - id: AC-1
        text: The architectural record contains the 17 required decisions, each with three candidates, a chosen Book Architecture option, and an explanation of why the other two lost.
      - id: AC-2
        text: The engine accepts zero or more observers and emits provider-turn, step-completion, and terminal events without adding Autoloop-specific imports or branches.
      - id: AC-3
        text: Existing strict engine invariants remain true, including explicit-session lookup, optional Pair/LLM handlers, and required SystemStep handlers.
    deliverables:
      - autoloop_v3/ARCHITECTURE_DECISIONS.md
      - autoloop_v3/workflow/engine.py
      - autoloop_v3/workflow/observers.py
      - engine contract tests for observer behavior
    risks:
      - Observer payloads may be too small for parity needs or too large and hook-like.
      - Fatal-exception observation can accidentally double-log terminal outcomes if runner logging is not adjusted carefully.
    rollback:
      - Revert only the observer wiring if necessary; do not restore wrapper or subclass mechanisms.
  - phase_id: runtime-session-store-ownership
    title: Move Session Payload Writes Into Runtime Store
    objective: Make filesystem session serialization fully runtime-owned while preserving legacy payload compatibility and generic path semantics.
    status: planned
    in_scope:
      - Promote generic session payload write and placeholder helpers into autoloop_v3/runtime/stores/filesystem.py.
      - Update callers to stop serializing session JSON inside workflow-owned Autoloop-v1 code.
      - Preserve thread_id compatibility, sparse metadata preservation, and generic session paths.
      - Add targeted runtime store tests for helper ownership and placeholder behavior.
    out_of_scope:
      - Autoloop-v1 phase/event policy changes.
      - Generic workspace augmentation hooks.
    dependencies:
      - decision-freeze-and-observer-core
    acceptance_criteria:
      - id: AC-1
        text: All session payload writing and placeholder creation helpers live in runtime.stores.filesystem, and Autoloop-v1 code no longer serializes session JSON directly.
      - id: AC-2
        text: Legacy thread_id payloads still load, and sparse metadata is preserved across restore and upsert operations.
      - id: AC-3
        text: Runtime store tests cover the new helper ownership without introducing workflow-specific path semantics into the generic store.
    deliverables:
      - autoloop_v3/runtime/stores/filesystem.py
      - updated runtime store exports/callers
      - runtime store compatibility tests
    risks:
      - Helper promotion can accidentally hard-code Autoloop defaults into generic runtime code.
      - Placeholder helper changes can overwrite existing metadata if merge behavior is not preserved.
    rollback:
      - Keep the helper API stable and revert only the internal factoring if metadata preservation regresses.
  - phase_id: autoloop-v1-parity-split
    title: Replace The Support Mini-Runtime With Workflow-Owned Parity Modules
    objective: Delete the mixed Autoloop-v1 support module and rebuild parity behavior as workflow-owned conventions plus an observer-driven parity harness.
    status: planned
    in_scope:
      - Replace autoloop_v3/workflows/autoloop_v1_support.py with autoloop_v3/workflows/autoloop_v1_conventions.py and autoloop_v3/workflows/autoloop_v1_parity.py.
      - Remove _AutoloopV1LoggingProvider and _AutoloopV1Engine.
      - Keep run_autoloop_v1(...) as a thin composition root over generic runtime pieces, session-path conventions, explicit workspace augmentation, and parity-only observer/state.
      - Keep clarification ledger, raw phase log format, cycle/attempt tracking, and terminal-status mapping strictly workflow-owned.
      - Preserve legacy session filenames and parity behavior via the observer seam, not provider wrapping or engine subclassing.
    out_of_scope:
      - Generic runtime phase awareness.
      - Any new generic workspace hook or plugin system.
    dependencies:
      - decision-freeze-and-observer-core
      - runtime-session-store-ownership
    acceptance_criteria:
      - id: AC-1
        text: autoloop_v1_support.py, _AutoloopV1LoggingProvider, and _AutoloopV1Engine are gone, with functionality replaced by the new parity modules.
      - id: AC-2
        text: run_autoloop_v1(...) only wires generic runtime pieces plus parity-only conventions and observer logic; it does not become a second runtime.
      - id: AC-3
        text: Parity tests still pass for raw logs, decisions persistence, clarification resume behavior, legacy session filenames, and blocked/question/failed status mapping.
    deliverables:
      - autoloop_v3/workflows/autoloop_v1_conventions.py
      - autoloop_v3/workflows/autoloop_v1_parity.py
      - updated autoloop_v3/workflows/__init__.py
      - updated Autoloop parity tests
    risks:
      - Cycle/attempt tracking on resume is subtle once session-metadata persistence is removed.
      - Event logger updates can double-emit or mis-order parity events if observer and runner responsibilities overlap.
    rollback:
      - Revert only the parity-module split if parity assertions regress; keep the new core observer/store ownership intact.
  - phase_id: strict-workflow-cleanup
    title: Restore Repo-Root Workflow Clarity
    objective: Make autoloop_v1.py and Ralph_loop.py fully strict, readable, and self-contained with workflow semantics expressed directly in workflow code.
    status: planned
    in_scope:
      - Remove phase_artifact_template from autoloop_v1.py and replace it with explicit Artifact(...) templates.
      - Inline parse_phase_ids into autoloop_v1.py.
      - Keep exact phase_dir_key behavior in the tiny workflow-owned conventions module shared with the parity harness.
      - Fix Ralph_loop.py so strict validation passes and all success paths leave goal_met=True.
      - Add workflow tests for explicit artifacts, strict compilation, and goal_met correctness.
    out_of_scope:
      - Reintroducing helper wrappers around phase artifact paths.
      - Moving Autoloop-v1 workflow semantics into runtime or engine code.
    dependencies:
      - autoloop-v1-parity-split
    acceptance_criteria:
      - id: AC-1
        text: phase_artifact_template is gone and autoloop_v1.py uses explicit artifact templates directly in the workflow definition.
      - id: AC-2
        text: parse_phase_ids is workflow-owned and phase_dir_key remains workflow-owned parity policy rather than framework semantics.
      - id: AC-3
        text: Ralph_loop.py compiles strictly and preserves goal_met=True on direct and reflected success paths.
    deliverables:
      - repo-root autoloop_v1.py
      - repo-root Ralph_loop.py
      - workflow strictness tests
    risks:
      - Workflow readability can regress if helper removal is replaced by a different indirection layer.
      - Shared conventions can accidentally grow into a new mini-runtime if the file is not kept tiny.
    rollback:
      - None; these are required architecture and correctness fixes.
  - phase_id: docs-and-full-verification
    title: Update Documentation And Prove The Final Shape
    objective: Align the docs and automated proof surface with the final Book Architecture and confirm that parity and generic runtime behavior both still hold.
    status: planned
    in_scope:
      - Update README.md, MIGRATION.md, docs/architecture.md, docs/authoring.md, docs/parity-matrix.md, docs/risk-register.md, and the final ARCHITECTURE_DECISIONS.md.
      - Update baseline doc tests to freeze the observer boundary and the new workflow-owned Autoloop-v1 module layout.
      - Run the relevant engine, runtime, workflow, parity, and toy-workflow test suites.
      - Confirm no new generic workspace-hook system or Autoloop-specific engine branching exists.
    out_of_scope:
      - New public APIs beyond the minimal observer seam and preserved run_autoloop_v1(...) entrypoint.
      - Broad new framework packages.
    dependencies:
      - decision-freeze-and-observer-core
      - runtime-session-store-ownership
      - autoloop-v1-parity-split
      - strict-workflow-cleanup
    acceptance_criteria:
      - id: AC-1
        text: Documentation consistently describes the strict public API, explicit session model, minimal execution observer, and workflow-owned Autoloop-v1 parity logic.
      - id: AC-2
        text: The full relevant test matrix passes, including parity and toy-workflow neutrality checks.
      - id: AC-3
        text: No references remain to provider-wrapper or engine-subclass parity mechanisms, and no new compatibility layer or generic workspace-hook system has been introduced.
    deliverables:
      - updated architecture/migration/parity docs
      - updated baseline doc tests
      - final verification results captured in implementation output
    risks:
      - Documentation can drift toward the removed support-module shape if module references are not updated consistently.
      - Test updates can mask regressions if assertions are weakened instead of retargeted to the new mechanism.
    rollback:
      - Do not relax tests to force a green build; fix the architecture or revert the specific drifting change.
