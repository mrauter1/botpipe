request_snapshot_ref: /home/rauter/autoloop_v3_bkp/autoloop_v3/.autoloop/tasks/spec-flat-enum-backed-policy-and-policyoverride-2b5811aa/runs/run-20260508T122931Z-61a77361/request.md
phases:
- phase_id: flat-policy-facade
  title: Implement Flat Policy Facade
  objective: Add enum-backed Policy and PolicyOverride helpers that lower into the
    existing nested provider policy schema without changing engine-facing policy types
    or runtime policy semantics.
  status: planned
  in_scope:
  - Add flat public enums and Policy/PolicyOverride helpers in autoloop/simple.py.
  - Implement the exact public keyword signatures, exact helper signatures, and exact
    request docstrings for the new public helpers.
  - Centralize flat-field coercion, inference, and incompatibility validation in one
    shared lowering helper.
  - Export new public names from autoloop/simple.py and autoloop/__init__.py.
  - Add targeted unit and runtime tests for lowering, sparsity, dangerous-access inference,
    exports, and operation/workflow integration.
  out_of_scope:
  - Changing autoloop/core/provider_policy.py schema definitions or validators.
  - Changing provider emitters, runtime config parsing, merge order, or strict-policy
    semantics.
  - Adding alternate constructors, uppercase aliases, namespaced kwargs, or raw-string
    support for enum-backed facade fields.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: Policy() and PolicyOverride() use the exact public keyword signatures from
      the request, do not expose allow_dangerous_bypass or disable_dangerous_bypass
      kwargs, and return ProviderPolicy and ProviderPolicyOverride respectively.
  - id: AC-2
    text: The helper signatures for _policy_enum_value, _policy_tuple, _policy_optional_tuple,
      and _policy_string_mapping match the request and enforce the specified enum,
      tuple, Path, mapping, and bytes-rejection behavior.
  - id: AC-3
    text: Policy() builds a full ProviderPolicy from SYSTEM_DEFAULT_PROVIDER_POLICY,
      PolicyOverride() stays sparse, and dangerous-access, read-only, workspace-write,
      and limited-network inference rules match the request without modifying the
      core schema.
  - id: AC-4
    text: Policy and PolicyOverride carry the exact request docstrings, every new
      public name is exported from autoloop.simple and autoloop.__all__, and the targeted
      workflow, operation, export, and regression test suite passes.
  deliverables:
  - Updated autoloop/simple.py flat policy facade, exact signatures, exact docstrings,
    and shared helper logic.
  - Updated autoloop/__init__.py public exports and __all__.
  - Focused policy facade tests in unit/runtime suites.
  risks:
  - Override sparsity can regress if untouched sandbox or permissions sections are
    materialized.
  - Facade inference can conflict with existing dangerous-access validation if compatibility
    checks are incomplete.
  - Public-surface ordering can regress test expectations if __all__ changes are not
    synchronized.
  rollback:
  - Revert simple-surface helper/export additions and remove the new flat-facade tests.
  - Leave core provider policy schema and runtime layers untouched, keeping rollback
    local to the authoring facade.
