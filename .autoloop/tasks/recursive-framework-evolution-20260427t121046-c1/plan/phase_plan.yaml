phases:
- phase_id: optimization-helper-consolidation
  title: Consolidate Optimizer Helpers
  objective: Move deterministic optimizer context and publication mechanics out of
    the monolithic workflow file while preserving all existing workflow contracts.
  status: planned
  in_scope:
  - Refactor `workflows/workflow_run_traces_to_optimization_candidates/workflow.py`
    to consume shared deterministic helpers instead of carrying repeated pass-finalization
    and publication-validation logic inline.
  - Extend `stdlib/optimization.py` with the authoritative optimization pass/context/publication
    seam needed by the optimizer.
  - Preserve the optimizer's current artifact filenames, route tags, publication boundary,
    and refinement-handoff schema.
  out_of_scope:
  - Add a new workflow package.
  - Change CLI, runtime/provider, or `workflow.toml` behavior.
  - Execute selected-workflow reruns, ablations, or refinement automatically.
  dependencies: []
  acceptance_criteria:
  - id: AC-1
    text: The optimizer workflow file is materially shorter and its top-level flow
      remains obvious without changing public artifact or route contracts.
  - id: AC-2
    text: Deterministic selected-workflow context capture, optional-pass finalization,
      and scorecard publication validation live behind one authoritative helper surface.
  - id: AC-3
    text: The optimizer still rejects source drift, malformed candidate artifacts,
      and scorecard count mismatches exactly as before.
  deliverables:
  - Refactored optimizer workflow implementation.
  - Expanded `stdlib/optimization.py` helper surface with clear non-goals.
  - Updated optimizer unit/runtime tests covering helper and workflow behavior.
  risks:
  - Skip-route behavior could change if empty-artifact publication rules drift during
    extraction.
  - Scorecard validation could weaken if helper boundaries collapse workflow-specific
    assertions.
  rollback:
  - Revert the optimizer/helper refactor as one patch if targeted proof fails.
  - Do not keep partial helper extraction without the matching workflow refactor.
- phase_id: proof-docs-memory-closeout
  title: Proof, Docs, And Memory Sync
  objective: Verify the optimizer consolidation, keep docs aligned with the helper
    boundary, and update recursive memory so later cycles inherit the correct architecture
    picture.
  status: planned
  in_scope:
  - Run targeted optimizer, refinement-integration, and docs baseline tests.
  - Update recursive memory files to record the optimizer as an active portfolio surface
    and this consolidation as the cycle outcome.
  - Record closeout metrics required by the recursive architecture request.
  out_of_scope:
  - Broader portfolio reshaping beyond documenting deferred debt.
  - Runtime-owned automation or new authoring primitives.
  dependencies:
  - optimization-helper-consolidation
  acceptance_criteria:
  - id: AC-1
    text: Targeted proof passes for optimizer helpers, optimizer runtime behavior,
      refinement evidence handoff, and architecture-doc baselines.
  - id: AC-2
    text: Recursive memory files mention the optimizer and the new consolidation seam
      without contradicting the live codebase.
  - id: AC-3
    text: Closeout notes report boilerplate reduction and confirm no CLI, runtime/provider,
      or composition compatibility break.
  deliverables:
  - Passing targeted test record.
  - Updated roadmap, gap ledger, candidate ledger, and validation debt ledger.
  - Cycle closeout metrics captured in the recursive memory artifacts.
  risks:
  - Recursive memory may stay stale if code lands without matching ledger updates.
  - Docs could overstate helper reuse if the final seam stays optimizer-specific.
  rollback:
  - Revert docs/memory updates alongside code if the implementation direction changes
    before merge.
  - Do not mark the optimizer seam as canonical without proof and code landing together.
